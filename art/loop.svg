<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Loop cover art">
  <defs>
    <radialGradient id="lp-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0" stop-color="#17204b"/>
      <stop offset="0.55" stop-color="#0b1026"/>
      <stop offset="1" stop-color="#060916"/>
    </radialGradient>
    <linearGradient id="lp-pipe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39d6c8"/>
      <stop offset="0.55" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="lp-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes lpPulse{0%,100%{opacity:.72}50%{opacity:1}}
      @keyframes lpSpin{to{transform:rotate(90deg)}}
      .lp-path{animation:lpPulse 2.4s ease-in-out infinite}
      .lp-tile{transform-box:fill-box;transform-origin:center}
      .lp-tile.a{animation:lpSpin 7s steps(1,end) infinite}
      .lp-tile.b{animation:lpSpin 8s steps(1,end) infinite reverse}
    </style>
  </defs>
  <rect width="640" height="400" fill="url(#lp-bg)"/>
  <g opacity=".2" stroke="#e8ecff" stroke-width="1">
    <path d="M40 80H600M40 160H600M40 240H600M40 320H600"/>
    <path d="M120 40V360M220 40V360M320 40V360M420 40V360M520 40V360"/>
  </g>
  <g transform="translate(160 80)" fill="#111735" stroke="#3a4474" stroke-width="3">
    <rect x="0" y="0" width="80" height="80" rx="12"/>
    <rect x="80" y="0" width="80" height="80" rx="12"/>
    <rect x="160" y="0" width="80" height="80" rx="12"/>
    <rect x="240" y="0" width="80" height="80" rx="12"/>
    <rect x="0" y="80" width="80" height="80" rx="12"/>
    <rect x="80" y="80" width="80" height="80" rx="12"/>
    <rect x="160" y="80" width="80" height="80" rx="12"/>
    <rect x="240" y="80" width="80" height="80" rx="12"/>
    <rect x="0" y="160" width="80" height="80" rx="12"/>
    <rect x="80" y="160" width="80" height="80" rx="12"/>
    <rect x="160" y="160" width="80" height="80" rx="12"/>
    <rect x="240" y="160" width="80" height="80" rx="12"/>
  </g>
  <g class="lp-path" transform="translate(160 80)" fill="none" stroke="url(#lp-pipe)" stroke-width="18" stroke-linecap="round" filter="url(#lp-glow)">
    <path d="M40 80V40H120"/>
    <path d="M120 40H200V120"/>
    <path class="lp-tile a" d="M200 120Q200 200 280 200"/>
    <path d="M280 200V280H200"/>
    <path d="M200 280H120V200"/>
    <path class="lp-tile b" d="M120 200Q40 200 40 120"/>
    <path d="M40 120Q40 80 80 80"/>
    <path d="M280 120Q320 120 320 80"/>
    <path d="M320 80Q320 40 280 40"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="320" y="342" fill="#e8ecff" font-size="48" font-weight="800" letter-spacing="8">LOOP</text>
    <text x="320" y="370" fill="#8b93c4" font-size="16" letter-spacing="3">CONNECT EVERY PATH</text>
  </g>
</svg>
