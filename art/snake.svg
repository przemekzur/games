<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Snake: Childhood Remix cover art">
  <defs>
    <linearGradient id="sn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#03140e"/><stop offset="1" stop-color="#02080a"/>
    </linearGradient>
    <linearGradient id="sn-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39ff9e"/><stop offset="1" stop-color="#16c2a3"/>
    </linearGradient>
    <style>
      @keyframes snPulse{0%,100%{opacity:.35}50%{opacity:.9}}
      @keyframes snApple{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
      @keyframes snSeg{0%,100%{opacity:.7}50%{opacity:1}}
      .sn-grid{animation:snPulse 4s ease-in-out infinite}
      .sn-apple{transform-origin:center;transform-box:fill-box;animation:snApple 1.8s ease-in-out infinite}
      .sn-seg{animation:snSeg 2.2s ease-in-out infinite}
    </style>
  </defs>
  <rect width="640" height="400" fill="url(#sn-bg)"/>
  <g class="sn-grid" stroke="#0e3a2c" stroke-width="1">
    <path d="M40 0V400M120 0V400M200 0V400M280 0V400M360 0V400M440 0V400M520 0V400M600 0V400"/>
    <path d="M0 40H640M0 120H640M0 200H640M0 280H640M0 360H640"/>
  </g>
  <!-- snake body, blocky -->
  <g fill="url(#sn-body)">
    <rect class="sn-seg" x="130" y="280" width="36" height="36" rx="8"/>
    <rect class="sn-seg" style="animation-delay:.1s" x="170" y="280" width="36" height="36" rx="8"/>
    <rect class="sn-seg" style="animation-delay:.2s" x="210" y="280" width="36" height="36" rx="8"/>
    <rect class="sn-seg" style="animation-delay:.3s" x="250" y="280" width="36" height="36" rx="8"/>
    <rect class="sn-seg" style="animation-delay:.4s" x="250" y="240" width="36" height="36" rx="8"/>
    <rect class="sn-seg" style="animation-delay:.5s" x="250" y="200" width="36" height="36" rx="8"/>
    <rect class="sn-seg" style="animation-delay:.6s" x="290" y="200" width="36" height="36" rx="8"/>
    <rect class="sn-seg" style="animation-delay:.7s" x="330" y="200" width="36" height="36" rx="8"/>
  </g>
  <!-- head -->
  <g transform="translate(370 200)">
    <rect x="0" y="0" width="40" height="36" rx="9" fill="#5dffb4"/>
    <circle cx="30" cy="11" r="3.6" fill="#04140e"/><circle cx="30" cy="25" r="3.6" fill="#04140e"/>
    <path d="M40 18 H58" stroke="#ff5a7a" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- apple -->
  <g class="sn-apple" transform="translate(486 280)">
    <circle r="17" fill="#ff5a7a"/><circle r="17" fill="#ff90a8" opacity="0.3"/>
    <rect x="-2" y="-24" width="4" height="12" rx="2" fill="#6cff9e"/>
    <ellipse cx="9" cy="-16" rx="9" ry="5" fill="#6cff9e" transform="rotate(35 9 -16)"/>
  </g>
</svg>
