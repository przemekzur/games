<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Space Invaders: Neon Siege cover art">
  <defs>
    <linearGradient id="si-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0322"/><stop offset="1" stop-color="#04010f"/>
    </linearGradient>
    <style>
      @keyframes siMarch{0%,100%{transform:translateX(-22px)}50%{transform:translateX(22px)}}
      @keyframes siCannon{0%,100%{transform:translateX(40px)}50%{transform:translateX(-40px)}}
      @keyframes siShot{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-150px)}}
      @keyframes siStar{0%,100%{opacity:.2}50%{opacity:.9}}
      .si-fleet{animation:siMarch 4s ease-in-out infinite}
      .si-cannon{animation:siCannon 4s ease-in-out infinite}
      .si-shot{animation:siShot 1.1s linear infinite}
      .si-star{animation:siStar 2.6s ease-in-out infinite}
    </style>
  </defs>
  <rect width="640" height="400" fill="url(#si-bg)"/>
  <g fill="#9af0ff"><circle class="si-star" cx="90" cy="60" r="1.4"/><circle class="si-star" cx="300" cy="40" r="1.6" style="animation-delay:.7s"/><circle class="si-star" cx="540" cy="70" r="1.3" style="animation-delay:1.3s"/></g>
  <!-- invader generator -->
  <g class="si-fleet">
    <g fill="#5dff9e">
      <use href="#si-inv" x="120" y="80"/><use href="#si-inv" x="240" y="80"/><use href="#si-inv" x="360" y="80"/><use href="#si-inv" x="480" y="80"/>
    </g>
    <g fill="#b987ff">
      <use href="#si-inv" x="120" y="150"/><use href="#si-inv" x="240" y="150"/><use href="#si-inv" x="360" y="150"/><use href="#si-inv" x="480" y="150"/>
    </g>
  </g>
  <defs>
    <g id="si-inv">
      <rect x="6" y="0" width="6" height="6"/><rect x="30" y="0" width="6" height="6"/>
      <rect x="12" y="6" width="6" height="6"/><rect x="24" y="6" width="6" height="6"/>
      <rect x="0" y="12" width="42" height="6"/>
      <rect x="0" y="18" width="6" height="6"/><rect x="12" y="18" width="18" height="6"/><rect x="36" y="18" width="6" height="6"/>
      <rect x="6" y="24" width="6" height="6"/><rect x="30" y="24" width="6" height="6"/>
    </g>
  </defs>
  <!-- player cannon -->
  <g class="si-cannon" transform="translate(300 330)">
    <rect x="-26" y="14" width="52" height="16" rx="4" fill="#5ad1ff"/>
    <rect x="-8" y="0" width="16" height="16" rx="3" fill="#5ad1ff"/>
    <rect x="-3" y="-12" width="6" height="14" fill="#5ad1ff"/>
  </g>
  <rect class="si-shot" x="297" y="300" width="6" height="20" rx="3" fill="#ffe44c"/>
</svg>
