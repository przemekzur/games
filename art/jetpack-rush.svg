<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Jetpack Rush: Neon Run cover art">
  <defs>
    <linearGradient id="jr-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0838"/><stop offset="1" stop-color="#08041a"/>
    </linearGradient>
    <linearGradient id="jr-flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff2a8"/><stop offset="0.5" stop-color="#ff8a3c"/><stop offset="1" stop-color="#ff3a6a"/>
    </linearGradient>
    <style>
      @keyframes jrFly{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
      @keyframes jrFlame{0%,100%{transform:scaleY(1);opacity:.9}50%{transform:scaleY(1.4);opacity:1}}
      @keyframes jrScroll{from{transform:translateX(0)}to{transform:translateX(-120px)}}
      @keyframes jrCoin{0%,100%{opacity:.6}50%{opacity:1}}
      @keyframes jrZap{0%,100%{opacity:.4}50%{opacity:1}}
      .jr-hero{animation:jrFly 2.4s ease-in-out infinite}
      .jr-flame{transform-origin:top center;transform-box:fill-box;animation:jrFlame .25s ease-in-out infinite}
      .jr-scroll{animation:jrScroll 2s linear infinite}
      .jr-coin{animation:jrCoin 1.4s ease-in-out infinite}
      .jr-zap{animation:jrZap .6s ease-in-out infinite}
    </style>
  </defs>
  <rect width="640" height="400" fill="url(#jr-bg)"/>
  <!-- scrolling neon city -->
  <g class="jr-scroll" opacity="0.6">
    <g fill="#2a1a55">
      <rect x="40" y="240" width="50" height="160"/><rect x="120" y="200" width="44" height="200"/><rect x="200" y="260" width="56" height="140"/>
      <rect x="300" y="210" width="48" height="190"/><rect x="380" y="250" width="52" height="150"/><rect x="470" y="200" width="44" height="200"/>
      <rect x="560" y="240" width="50" height="160"/><rect x="640" y="210" width="48" height="190"/><rect x="720" y="250" width="52" height="150"/>
    </g>
    <g fill="#5ad1ff" opacity="0.7"><rect x="52" y="256" width="8" height="8"/><rect x="132" y="216" width="8" height="8"/><rect x="312" y="226" width="8" height="8"/><rect x="482" y="216" width="8" height="8"/></g>
  </g>
  <!-- laser zapper -->
  <g class="jr-zap"><rect x="500" y="120" width="10" height="180" rx="5" fill="#ff3a6a"/><circle cx="505" cy="120" r="10" fill="#ffd24c"/><circle cx="505" cy="300" r="10" fill="#ffd24c"/></g>
  <!-- coins -->
  <g fill="#ffd24c">
    <circle class="jr-coin" cx="360" cy="150" r="10"/><circle class="jr-coin" style="animation-delay:.3s" cx="400" cy="150" r="10"/><circle class="jr-coin" style="animation-delay:.6s" cx="440" cy="150" r="10"/>
  </g>
  <!-- hero with jetpack -->
  <g class="jr-hero" transform="translate(180 200)">
    <rect x="-22" y="-8" width="16" height="34" rx="6" fill="#3a2a5a"/>
    <polygon class="jr-flame" points="-20,26 -8,26 -14,58" fill="url(#jr-flame)"/>
    <circle cx="6" cy="-26" r="13" fill="#ffd9b0"/>
    <rect x="-6" y="-14" width="26" height="34" rx="9" fill="#ff5a7a"/>
    <rect x="-2" y="20" width="9" height="22" rx="4" fill="#3a2a5a"/><rect x="12" y="20" width="9" height="22" rx="4" fill="#3a2a5a"/>
  </g>
</svg>
