<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Red Frontier: The Long Launch cover art">
  <defs>
    <linearGradient id="rfe-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070b16"/><stop offset="0.55" stop-color="#101a2e"/><stop offset="1" stop-color="#1a2436"/>
    </linearGradient>
    <linearGradient id="rfe-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#202531"/><stop offset="1" stop-color="#11141c"/>
    </linearGradient>
    <radialGradient id="rfe-flood" cx="0.5" cy="0" r="1">
      <stop offset="0" stop-color="#fff0c0" stop-opacity="0.5"/><stop offset="1" stop-color="#fff0c0" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes rfeMoon{0%,100%{opacity:.85}50%{opacity:1}}
      @keyframes rfeFlick{0%,100%{opacity:.35}50%{opacity:.95}}
      @keyframes rfeBeacon{0%,100%{opacity:.25}50%{opacity:1}}
      @keyframes rfeScan{from{transform:translateY(0)}to{transform:translateY(26px)}}
      .rfe-moon{animation:rfeMoon 5s ease-in-out infinite}
      .rfe-orion{animation:rfeFlick 2.4s ease-in-out infinite}
      .rfe-beacon{animation:rfeBeacon 1.6s ease-in-out infinite}
      .rfe-scan{animation:rfeScan 3s linear infinite alternate}
    </style>
  </defs>
  <rect width="640" height="400" fill="url(#rfe-sky)"/>
  <!-- stars -->
  <g fill="#bcd0ff"><circle cx="80" cy="50" r="1.3"/><circle cx="160" cy="90" r="1"/><circle cx="300" cy="40" r="1.4"/><circle cx="420" cy="70" r="1"/><circle cx="540" cy="44" r="1.2"/><circle cx="600" cy="110" r="1"/><circle cx="240" cy="120" r="1"/></g>
  <!-- moon -->
  <circle class="rfe-moon" cx="120" cy="80" r="34" fill="#dfe6ff"/>
  <circle cx="120" cy="80" r="34" fill="#0a0e1a" opacity="0.08"/>
  <!-- ground -->
  <path d="M0 250 L640 250 L640 400 L0 400 Z" fill="url(#rfe-ground)"/>
  <!-- launch pad apron -->
  <ellipse cx="360" cy="300" rx="200" ry="40" fill="#262a34"/>
  <ellipse cx="360" cy="300" rx="150" ry="28" fill="none" stroke="#3a4150" stroke-width="2"/>
  <!-- floodlight beams -->
  <polygon points="70,120 30,300 130,300" fill="url(#rfe-flood)"/>
  <polygon points="600,120 540,300 640,300" fill="url(#rfe-flood)"/>
  <!-- floodlight towers -->
  <g stroke="#3a4150" stroke-width="5"><line x1="70" y1="300" x2="70" y2="120"/><line x1="600" y1="300" x2="600" y2="120"/></g>
  <g class="rfe-orion" fill="#fff0c0"><rect x="58" y="110" width="24" height="12"/><rect x="588" y="110" width="24" height="12"/></g>
  <!-- gantry -->
  <g stroke="#42474f" stroke-width="4" fill="none"><line x1="300" y1="300" x2="300" y2="90"/><line x1="300" y1="120" x2="340" y2="120"/><line x1="300" y1="160" x2="340" y2="160"/><line x1="300" y1="200" x2="340" y2="200"/><line x1="300" y1="240" x2="340" y2="240"/></g>
  <!-- unfinished rocket -->
  <g>
    <rect x="344" y="110" width="48" height="190" fill="#c9d2dc"/>
    <rect x="344" y="150" width="48" height="14" fill="#ff7536"/>
    <!-- open/unfinished top -->
    <path d="M344 110 L356 84 L380 84 L392 110 Z" fill="none" stroke="#8a929c" stroke-width="3"/>
    <circle class="rfe-beacon" cx="368" cy="80" r="5" fill="#ff3b3b"/>
    <rect x="334" y="296" width="68" height="12" fill="#2a2e36"/>
  </g>
  <!-- dead solar field -->
  <g transform="translate(470 300)">
    <g transform="skewX(-12)">
      <rect x="0" y="-26" width="40" height="20" fill="#0e1a2a" stroke="#1f6fae" stroke-width="1.5"/>
      <rect x="46" y="-26" width="40" height="20" fill="#0e1a2a" stroke="#1f6fae" stroke-width="1.5"/>
      <rect x="92" y="-26" width="40" height="20" fill="#0e1a2a" stroke="#1f6fae" stroke-width="1.5"/>
    </g>
  </g>
  <!-- ORION terminal (glowing) -->
  <g transform="translate(150 268)">
    <rect x="0" y="0" width="46" height="34" fill="#2a2e38"/>
    <rect class="rfe-orion" x="5" y="-26" width="40" height="26" fill="#0a2630" stroke="#5fd0e6" stroke-width="2"/>
    <line class="rfe-scan" x1="6" y1="-22" x2="44" y2="-22" stroke="#5fd0e6" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- crates -->
  <g fill="#7a5a32" stroke="#9a7a44" stroke-width="1.5"><rect x="232" y="282" width="26" height="22"/><rect x="266" y="286" width="22" height="18"/></g>
  <!-- HUD label -->
  <g transform="translate(40 48)" font-family="monospace">
    <rect x="-6" y="-16" width="250" height="26" fill="#0a0e1a" opacity="0.5" stroke="#5fd0e6" stroke-opacity="0.5"/>
    <text x="2" y="2" font-size="14" fill="#5fd0e6" letter-spacing="2">CAPE HELIOS</text>
    <text x="120" y="2" font-size="11" fill="#ff9a6a">// SYS OFFLINE</text>
  </g>
</svg>
