<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Stellar Siege cover art">
  <defs>
    <linearGradient id="ss-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1230"/><stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <radialGradient id="ss-planet" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#7ad6ff"/><stop offset="0.5" stop-color="#3a6bd6"/><stop offset="1" stop-color="#171a52"/>
    </radialGradient>
    <linearGradient id="ss-crys" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9affd0"/><stop offset="1" stop-color="#1f7a6a"/>
    </linearGradient>
    <style>
      @keyframes ssTwinkle{0%,100%{opacity:.2}50%{opacity:1}}
      @keyframes ssPulse{0%,100%{opacity:.35}50%{opacity:.9}}
      @keyframes ssShip{0%{transform:translate(0,0)}50%{transform:translate(18px,-10px)}100%{transform:translate(0,0)}}
      .ss-star{animation:ssTwinkle 3s ease-in-out infinite}
      .ss-glow{animation:ssPulse 2.6s ease-in-out infinite}
      .ss-ship{animation:ssShip 6s ease-in-out infinite}
    </style>
  </defs>
  <rect width="640" height="400" fill="url(#ss-sky)"/>
  <g fill="#bfe6ff">
    <circle class="ss-star" cx="70" cy="60" r="1.6"/><circle class="ss-star" cx="180" cy="40" r="1.2" style="animation-delay:.6s"/>
    <circle class="ss-star" cx="300" cy="70" r="1.8" style="animation-delay:1.1s"/><circle class="ss-star" cx="470" cy="50" r="1.3" style="animation-delay:.3s"/>
    <circle class="ss-star" cx="560" cy="90" r="1.6" style="animation-delay:1.6s"/><circle class="ss-star" cx="610" cy="40" r="1.2" style="animation-delay:.9s"/>
    <circle class="ss-star" cx="120" cy="120" r="1.1" style="animation-delay:2s"/><circle class="ss-star" cx="420" cy="110" r="1.4" style="animation-delay:1.3s"/>
  </g>
  <circle cx="500" cy="120" r="120" fill="url(#ss-planet)"/>
  <ellipse cx="500" cy="120" rx="160" ry="34" fill="none" stroke="#7ad6ff" stroke-opacity="0.5" stroke-width="3" transform="rotate(-18 500 120)"/>
  <!-- ground -->
  <path d="M0 300 L640 250 L640 400 L0 400 Z" fill="#10183a"/>
  <path d="M0 300 L640 250" fill="none" stroke="#2a6bff" stroke-opacity="0.5" stroke-width="2"/>
  <!-- command base hex -->
  <g transform="translate(150 320)">
    <polygon points="0,-46 40,-23 40,23 0,46 -40,23 -40,-23" fill="#13245c" stroke="#64d5ff" stroke-width="3"/>
    <polygon class="ss-glow" points="0,-26 22,-13 22,13 0,26 -22,13 -22,-13" fill="#64d5ff" fill-opacity="0.4"/>
  </g>
  <!-- vespene crystals -->
  <g transform="translate(380 330)">
    <polygon class="ss-glow" points="0,-44 12,-6 0,12 -12,-6" fill="url(#ss-crys)"/>
    <polygon class="ss-glow" points="26,-30 36,0 26,14 16,0" fill="url(#ss-crys)" style="animation-delay:.8s"/>
    <polygon class="ss-glow" points="-26,-26 -16,0 -26,12 -36,0" fill="url(#ss-crys)" style="animation-delay:1.4s"/>
  </g>
  <!-- ship -->
  <g class="ss-ship" transform="translate(300 160)">
    <polygon points="0,-12 28,0 0,12 8,0" fill="#cdeeff" stroke="#64d5ff" stroke-width="1.5"/>
    <circle cx="-6" cy="0" r="3" fill="#b987ff"/>
  </g>
  <rect width="640" height="400" fill="none"/>
</svg>
