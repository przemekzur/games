<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Pong: Neon Rally cover art">
  <defs>
    <linearGradient id="pn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06101e"/><stop offset="1" stop-color="#03070f"/>
    </linearGradient>
    <style>
      @keyframes pnBall{0%{transform:translate(0,0)}25%{transform:translate(220px,90px)}50%{transform:translate(440px,-30px)}75%{transform:translate(220px,70px)}100%{transform:translate(0,0)}}
      @keyframes pnL{0%,100%{transform:translateY(0)}50%{transform:translateY(70px)}}
      @keyframes pnR{0%,100%{transform:translateY(40px)}50%{transform:translateY(-40px)}}
      @keyframes pnNet{0%,100%{opacity:.3}50%{opacity:.7}}
      .pn-ball{animation:pnBall 3.2s ease-in-out infinite}
      .pn-l{animation:pnL 3.2s ease-in-out infinite}
      .pn-r{animation:pnR 3.2s ease-in-out infinite}
      .pn-net{animation:pnNet 2s ease-in-out infinite}
    </style>
  </defs>
  <rect width="640" height="400" fill="url(#pn-bg)"/>
  <g class="pn-net" stroke="#3aa0ff" stroke-width="6" stroke-dasharray="18 22" stroke-linecap="round">
    <line x1="320" y1="30" x2="320" y2="370"/>
  </g>
  <!-- score -->
  <text x="240" y="70" text-anchor="middle" font-family="monospace" font-size="44" font-weight="700" fill="#5ad1ff" opacity="0.85">5</text>
  <text x="400" y="70" text-anchor="middle" font-family="monospace" font-size="44" font-weight="700" fill="#ff7ad1" opacity="0.85">3</text>
  <!-- paddles -->
  <rect class="pn-l" x="44" y="150" width="16" height="90" rx="8" fill="#5ad1ff"/>
  <rect class="pn-r" x="580" y="150" width="16" height="90" rx="8" fill="#ff7ad1"/>
  <!-- ball with trail -->
  <g class="pn-ball" transform="translate(90 200)">
    <circle r="12" fill="#ffffff"/>
    <circle r="12" fill="#9af0ff" opacity="0.35"/>
  </g>
</svg>
