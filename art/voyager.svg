<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Star Trek Voyager cover art">
  <defs>
    <radialGradient id="vy-neb" cx="0.7" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#3a2a6a"/><stop offset="0.5" stop-color="#141033"/><stop offset="1" stop-color="#05040f"/>
    </radialGradient>
    <linearGradient id="vy-hull" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cfe2f5"/><stop offset="1" stop-color="#7d93ad"/>
    </linearGradient>
    <style>
      @keyframes vyStar{0%,100%{opacity:.2}50%{opacity:1}}
      @keyframes vyDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(-10px,6px)}}
      @keyframes vyNac{0%,100%{opacity:.5}50%{opacity:1}}
      .vy-star{animation:vyStar 3s ease-in-out infinite}
      .vy-ship{animation:vyDrift 8s ease-in-out infinite}
      .vy-nac{animation:vyNac 2.4s ease-in-out infinite}
    </style>
  </defs>
  <rect width="640" height="400" fill="url(#vy-neb)"/>
  <g fill="#cfe0ff">
    <circle class="vy-star" cx="60" cy="70" r="1.5"/><circle class="vy-star" cx="160" cy="130" r="1.2" style="animation-delay:.5s"/>
    <circle class="vy-star" cx="100" cy="280" r="1.4" style="animation-delay:1s"/><circle class="vy-star" cx="520" cy="90" r="1.6" style="animation-delay:1.4s"/>
    <circle class="vy-star" cx="600" cy="240" r="1.3" style="animation-delay:.8s"/><circle class="vy-star" cx="420" cy="320" r="1.4" style="animation-delay:1.8s"/>
    <circle class="vy-star" cx="260" cy="60" r="1.2" style="animation-delay:2.2s"/>
  </g>
  <!-- ship -->
  <g class="vy-ship" transform="translate(320 210)">
    <!-- saucer -->
    <ellipse cx="-60" cy="-30" rx="78" ry="34" fill="url(#vy-hull)" stroke="#5a7090" stroke-width="2"/>
    <ellipse cx="-60" cy="-34" rx="40" ry="14" fill="#9fb6d2"/>
    <!-- engineering hull -->
    <path d="M-30,-6 L90,4 Q110,8 90,18 L-20,20 Z" fill="url(#vy-hull)" stroke="#5a7090" stroke-width="2"/>
    <!-- pylons + nacelles -->
    <path d="M40,8 L70,-30 M55,14 L92,46" stroke="#7d93ad" stroke-width="6"/>
    <rect class="vy-nac" x="60" y="-44" width="70" height="14" rx="7" fill="#9fb6d2"/>
    <rect class="vy-nac" style="animation-delay:.5s" x="78" y="40" width="70" height="14" rx="7" fill="#9fb6d2"/>
    <circle class="vy-nac" cx="64" cy="-37" r="5" fill="#ff5a4c"/><circle class="vy-nac" style="animation-delay:.5s" cx="82" cy="47" r="5" fill="#ff5a4c"/>
  </g>
</svg>
