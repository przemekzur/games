<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Grass Frenzy cover art">
  <defs>
    <linearGradient id="gf-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fe0ff"/><stop offset="1" stop-color="#d8f6e0"/>
    </linearGradient>
    <linearGradient id="gf-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6cd44a"/><stop offset="1" stop-color="#2f9a3a"/>
    </linearGradient>
    <style>
      @keyframes gfHop{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes gfStar{0%,100%{transform:scale(1) rotate(0);opacity:.85}50%{transform:scale(1.15) rotate(12deg);opacity:1}}
      @keyframes gfClover{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
      @keyframes gfCloud{from{transform:translateX(0)}to{transform:translateX(30px)}}
      .gf-cow{animation:gfHop 2s ease-in-out infinite}
      .gf-star{transform-origin:center;transform-box:fill-box;animation:gfStar 1.6s ease-in-out infinite}
      .gf-clover{transform-origin:center;transform-box:fill-box;animation:gfClover 2.4s ease-in-out infinite}
      .gf-cloud{animation:gfCloud 7s ease-in-out infinite alternate}
    </style>
  </defs>
  <rect width="640" height="400" fill="url(#gf-sky)"/>
  <!-- sun -->
  <circle cx="540" cy="80" r="46" fill="#ffe27a"/>
  <!-- clouds -->
  <g class="gf-cloud" fill="#ffffff" opacity="0.92">
    <ellipse cx="140" cy="80" rx="44" ry="22"/><ellipse cx="178" cy="70" rx="34" ry="20"/><ellipse cx="108" cy="72" rx="28" ry="16"/>
  </g>
  <!-- grass -->
  <path d="M0 240 Q160 210 320 240 T640 240 L640 400 L0 400 Z" fill="url(#gf-grass)"/>
  <!-- clovers -->
  <g class="gf-clover" transform="translate(110 320)"><g fill="#1f8a2a"><circle cx="0" cy="-8" r="8"/><circle cx="8" cy="0" r="8"/><circle cx="0" cy="8" r="8"/><circle cx="-8" cy="0" r="8"/></g><rect x="-1.5" y="8" width="3" height="20" fill="#1f7a26"/></g>
  <g class="gf-clover" style="animation-delay:.8s" transform="translate(520 330)"><g fill="#1f8a2a"><circle cx="0" cy="-8" r="8"/><circle cx="8" cy="0" r="8"/><circle cx="0" cy="8" r="8"/><circle cx="-8" cy="0" r="8"/></g><rect x="-1.5" y="8" width="3" height="20" fill="#1f7a26"/></g>
  <!-- golden stars -->
  <g class="gf-star" transform="translate(250 150)"><polygon points="0,-18 5,-6 18,-6 7,3 11,16 0,8 -11,16 -7,3 -18,-6 -5,-6" fill="#ffd24c" stroke="#e0a52c" stroke-width="1.5"/></g>
  <g class="gf-star" style="animation-delay:.5s" transform="translate(420 170)"><polygon points="0,-14 4,-5 14,-5 6,2 9,12 0,6 -9,12 -6,2 -14,-5 -4,-5" fill="#ffd24c" stroke="#e0a52c" stroke-width="1.5"/></g>
  <!-- cow -->
  <g class="gf-cow" transform="translate(300 280)">
    <ellipse cx="0" cy="0" rx="62" ry="42" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M-40,-22 q14,-10 26,2 q-14,10 -26,-2Z" fill="#1a1a1a"/>
    <path d="M22,18 q16,-6 28,8 q-16,8 -28,-8Z" fill="#1a1a1a"/>
    <!-- head -->
    <g transform="translate(56 -6)">
      <ellipse cx="0" cy="0" rx="30" ry="26" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
      <ellipse cx="10" cy="8" rx="18" ry="13" fill="#ffc6d0"/>
      <circle cx="-6" cy="-6" r="3.4" fill="#1a1a1a"/><circle cx="12" cy="-8" r="3.4" fill="#1a1a1a"/>
      <ellipse cx="6" cy="10" rx="2.6" ry="3.4" fill="#1a1a1a"/><ellipse cx="16" cy="10" rx="2.6" ry="3.4" fill="#1a1a1a"/>
      <path d="M-22,-20 q-10,-6 -6,6" fill="none" stroke="#caa86a" stroke-width="5" stroke-linecap="round"/>
      <path d="M14,-22 q10,-8 8,4" fill="none" stroke="#caa86a" stroke-width="5" stroke-linecap="round"/>
    </g>
    <!-- legs -->
    <rect x="-34" y="34" width="10" height="26" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="22" y="34" width="10" height="26" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  </g>
</svg>
