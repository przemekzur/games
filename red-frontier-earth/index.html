<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Red Frontier — The Long Launch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07080d;
    --glass:rgba(14,18,28,0.74); --glass-2:rgba(9,12,20,0.9);
    --line:rgba(120,180,220,0.20); --line-2:rgba(120,180,220,0.45);
    --ink:#eaf2ff; --muted:#8fa6c2;
    --rust:#ff7536; --rust-2:#ffb060; --amber:#ffc46b;
    --cyan:#5fd0e6; --good:#74e0a0; --warn:#ffce5b; --bad:#ff6f6f;
    --shadow:0 22px 60px rgba(0,0,0,.62);
    --ui:"Chakra Petch","Segoe UI",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--ui);-webkit-font-smoothing:antialiased;}
  canvas{display:block}
  #app{position:fixed;inset:0}
  #app::after{content:"";position:fixed;inset:0;z-index:3;pointer-events:none;
    background:repeating-linear-gradient(transparent 0 2px,rgba(0,0,0,.05) 2px 3px),
      radial-gradient(circle at 50% 46%,transparent 56%,rgba(0,0,0,.5) 100%);}
  .frame{position:relative}
  .frame::before,.frame::after{content:"";position:absolute;width:14px;height:14px;pointer-events:none;opacity:.85}
  .frame::before{top:-1px;left:-1px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
  .frame::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}

  /* loader */
  #loader{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:radial-gradient(circle at 50% 34%,#101a2a,#07080d 72%);transition:opacity .6s}
  #loader h1{font-size:clamp(26px,5.5vw,58px);margin:0;letter-spacing:.24em;font-weight:700;text-align:center;
    background:linear-gradient(90deg,var(--rust),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  #loader p{color:var(--muted);letter-spacing:.5em;margin:.6em 0 1.6em;font-size:12px;text-transform:uppercase;text-align:center}
  .bar{width:min(340px,70vw);height:5px;background:rgba(255,255,255,.08);overflow:hidden;margin:0 auto}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rust),var(--cyan));transition:width .3s}

  #hud{position:fixed;inset:0;pointer-events:none;z-index:10}
  /* brand + resources, top-left */
  .topleft{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:8px}
  .brand{background:var(--glass-2);border:1px solid var(--line);border-top:2px solid var(--rust);padding:7px 13px;backdrop-filter:blur(8px)}
  .brand .b1{font-weight:700;font-size:14px;letter-spacing:.14em}
  .brand .b2{font-size:9px;letter-spacing:.4em;color:var(--rust-2);text-transform:uppercase;margin-top:1px}
  .res{display:flex;flex-wrap:wrap;gap:6px;max-width:min(60vw,420px)}
  .chip{display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--line);padding:4px 9px;backdrop-filter:blur(8px)}
  .chip .cl{font-size:8.5px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-family:var(--mono)}
  .chip .cv{font-family:var(--mono);font-weight:600;font-size:13px}
  .chip.power.on .cv{color:var(--good)}
  .chip.power.off .cv{color:var(--bad)}

  /* mission tracker, top-center */
  #mtrack{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;
    background:var(--glass-2);border:1px solid var(--line);border-top:2px solid var(--cyan);padding:6px 15px;backdrop-filter:blur(8px);box-shadow:var(--shadow)}
  #mtrack .ic{font-size:15px;color:var(--cyan)}
  #mtrack .lab{font-size:8.5px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;font-family:var(--mono)}
  #mtrack .ti{font-size:13px;font-weight:600}
  #mtrack .pr{font-family:var(--mono);font-size:11px;color:var(--rust-2)}

  /* mission log, top-right */
  #mlog{position:absolute;top:12px;right:12px;width:min(260px,70vw);background:var(--glass-2);border:1px solid var(--line);
    padding:11px 13px;backdrop-filter:blur(8px);box-shadow:var(--shadow)}
  #mlog h3{margin:0 0 8px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan)}
  .mrow{display:flex;gap:9px;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(120,180,220,.1)}
  .mrow:last-child{border-bottom:none}
  .mrow .md{width:18px;height:18px;flex:0 0 auto;display:grid;place-items:center;font-size:10px;font-family:var(--mono);border:1px solid var(--line);color:var(--muted)}
  .mrow.done .md{background:linear-gradient(135deg,var(--rust),var(--amber));color:#0a0a0a;border-color:transparent}
  .mrow.active .md{border-color:var(--cyan);color:var(--cyan)}
  .mrow .mt{font-size:11.5px;line-height:1.25}
  .mrow.done .mt{color:var(--muted)}
  .mrow.active .mt{font-weight:600}
  .mrow.todo{opacity:.5}

  /* ORION feed, bottom-left */
  #feed{position:absolute;left:12px;bottom:14px;width:min(380px,76vw);display:flex;flex-direction:column;gap:5px}
  .msg{font-size:12px;padding:8px 11px;background:var(--glass);border:1px solid var(--line);border-left:2px solid var(--muted);backdrop-filter:blur(6px);animation:slide .35s}
  .msg.orion{border-left-color:var(--cyan);background:rgba(12,24,32,.86)}
  .msg.sys{border-left-color:var(--rust)}
  .otag{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--cyan);border:1px solid rgba(95,208,230,.45);padding:1px 5px;margin-right:7px;vertical-align:1px}
  @keyframes slide{from{transform:translateX(-24px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* interaction prompt, bottom-center */
  #prompt{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);pointer-events:none;opacity:0;transition:opacity .15s;
    background:var(--glass-2);border:1px solid var(--cyan);padding:8px 16px;backdrop-filter:blur(8px);font-size:13px;white-space:nowrap;box-shadow:var(--shadow)}
  #prompt.show{opacity:1}
  #prompt b{display:inline-grid;place-items:center;min-width:22px;height:22px;padding:0 5px;margin-right:8px;background:var(--cyan);color:#06121a;font-family:var(--mono);font-weight:700;border-radius:3px}

  /* drone construction progress, bottom-center */
  #droneprog{position:absolute;left:50%;bottom:138px;transform:translateX(-50%);pointer-events:none;opacity:0;transition:opacity .2s;
    background:var(--glass-2);border:1px solid var(--line);border-top:2px solid var(--cyan);padding:6px 14px;backdrop-filter:blur(8px);
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--muted);white-space:nowrap}
  #droneprog.show{opacity:1}
  #droneprog b{color:var(--cyan);letter-spacing:0;margin:0 6px}

  /* controls hint, bottom-right */
  #ctrls{position:absolute;right:12px;bottom:14px;font-size:10.5px;color:var(--muted);font-family:var(--mono);text-align:right;line-height:1.7;background:var(--glass);border:1px solid var(--line);padding:7px 11px;backdrop-filter:blur(6px)}
  #ctrls b{color:var(--ink)}

  /* modal */
  #modal{position:fixed;inset:0;z-index:40;display:none;place-items:center;background:rgba(4,6,12,.78);backdrop-filter:blur(5px)}
  #modal.show{display:grid}
  .mcard{width:min(520px,92vw);border:1px solid var(--line-2);background:var(--glass-2);box-shadow:var(--shadow);padding:28px}
  .mcard .emoji{font-size:46px;text-align:center}
  .mcard h2{margin:10px 0 6px;font-size:22px;letter-spacing:.04em;text-align:center}
  .mcard .who{text-align:left;margin:14px 0;font-size:12.5px;color:var(--muted);line-height:1.6;border-left:2px solid var(--rust);padding-left:11px}
  .mcard p.story{text-align:left;font-size:13px;line-height:1.7;margin:0 0 13px;color:var(--ink)}
  .mcard .tbc{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--rust-2);text-transform:uppercase;margin-top:14px}
  .mbtns{display:flex;gap:10px;justify-content:center;margin-top:18px}
  .btn{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);padding:9px 18px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--ui);transition:.15s}
  .btn:hover{filter:brightness(1.12)}
  .btn.go{background:var(--rust);color:#180a04;border-color:var(--rust)}
  .btn.cy{background:var(--cyan);color:#06121a;border-color:var(--cyan)}
  a.btn{text-decoration:none;display:inline-block}

  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(120,180,220,.3)}
</style>
</head>
<body>
<div id="app"></div>

<div id="loader"><div><h1>THE LONG LAUNCH</h1><p>Red Frontier · Cape Helios</p><div class="bar"><i id="lbar"></i></div></div></div>

<div id="hud" style="display:none">
  <div class="topleft">
    <div class="brand frame"><div class="b1">RED FRONTIER</div><div class="b2">The Long Launch</div></div>
    <div class="res" id="res"></div>
  </div>
  <div id="mtrack"><span class="ic">◷</span><div><div class="lab">Current Objective</div><div class="ti" id="mtTitle">—</div></div><span class="pr" id="mtProg"></span></div>
  <div id="mlog" class="frame"><h3>Mission Log · Cape Helios</h3><div id="mlogRows"></div></div>
  <div id="feed"></div>
  <div id="prompt"></div>
  <div id="droneprog"></div>
  <div id="ctrls"><b>WASD</b> move · <b>Mouse-drag</b> look · <b>Wheel</b> zoom · <b>E</b> interact</div>
</div>

<div id="modal"><div class="mcard frame" id="mcard"></div></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { getCurrentMission, isComplete, advanceCompletedMissions, missionRows } from '../shared/red-frontier-missions.js';

/* ============================================================= *
 *  RED FRONTIER — THE LONG LAUNCH (Earth prequel vertical slice) *
 *  Cape Helios launch yard. Wake ORION, restore power, authorise *
 *  the robotic Mars cargo program. Self-contained, Three.js CDN. *
 * ============================================================= */

/* ---------- state ---------- */
const G={
  res:{scrap:0,electronics:0,power:0,trust:8,compute:0},
  powerOn:false, powerLevel:0,           // 0..1 visual ramp once the grid is restored
  mission:{idx:0},                        // shared mission-chain state {idx}
  started:false, over:false,
  // mission flags (mission `done` predicates read these)
  orionAwake:false, inverterRepaired:false, batteryConnected:false, cratesLooted:0,
  powerOn:false, workshopOnline:false, droneDeployed:false, foundationPrinted:false,
  droneProofComplete:false, authorised:false,
};
const CRATE_COUNT=3;

// Data-driven mission chain (shared schema). `done(g)` reads flags on the game state;
// `intro` is ORION's line when the mission becomes the active objective.
const MISSIONS=[
  {id:'wake', title:'Wake ORION',
    hint:'Reach the ORION terminal and bring the dormant AI online.',
    done:g=>g.orionAwake},
  {id:'scav', title:'Scavenge the yard',
    hint:`Salvage scrap & electronics from the ${CRATE_COUNT} crates around the pad.`,
    intro:'Inventory is thin. There are supply crates scattered across the apron — bring me scrap and electronics and I can work with it.',
    done:g=>g.cratesLooted>=CRATE_COUNT},
  {id:'power',title:'Restore power',
    hint:'Repair the solar inverter, then connect the battery to energise the grid.',
    intro:'The grid is dead. Repair the solar inverter, then connect the battery. I cannot run a launch program on backup cells forever.',
    done:g=>g.powerOn},
  {id:'shop', title:'Bring the workshop online',
    hint:'Spend salvage at the fabrication-bay console to power it up.',
    intro:'Power holds. The fabrication bay is next — bring it online and we can actually build something.',
    done:g=>g.workshopOnline},
  {id:'drone', title:'Deploy first construction drone',
    hint:'Deploy the dormant construction unit and let it print a foundation and set a cargo beacon.',
    intro:'There is a construction unit dormant in the bay. We have the power and tooling to wake it now — deploy it and let it print a foundation and plant a cargo beacon before we commit to anything.',
    done:g=>g.droneProofComplete},
  {id:'auth', title:'Authorise robotic cargo program',
    hint:'Return to the ORION terminal and authorise the Mars cargo program.',
    intro:'Everything is nominal — power, tooling, and a working pair of hands. Return to my terminal and authorise the robotic cargo program. After that… Mars.',
    done:g=>g.authorised},
];

/* ---------- three.js ---------- */
let renderer,scene,camera;
let moon,sunLight,hemi,ambient,fillCyan;
const clock=new THREE.Clock();
const floodlights=[];         // {lamp(mesh), light(SpotLight)}
const glowParts=[];           // {mesh, color, max} emissive parts that light up with power
const interactables=[];       // {id, group, pos, radius, label, available, action, ring}
let player, playerYaw=0;
const keys={};
const dust=[];
let rocketBeacon;
// first construction drone (Iteration 3B) — one unit, one scripted task
let drone=null, slab=null, foundationMarker=null, beacon=null;
const DRONE_BAY=new THREE.Vector3(-13,0,7), FOUNDATION=new THREE.Vector3(3,0,1.5), BEACON_SITE=new THREE.Vector3(7.5,0,3.5);
const jobs=[]; // active robot jobs (data-driven; see startJob/runJobs)

const vw=()=>innerWidth||1280, vh=()=>innerHeight||720;

/* camera orbit (third person) */
const cam={yaw:Math.PI*0.15, pitch:0.42, dist:15};

function init(){
  renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
  renderer.setSize(vw(),vh());renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;
  renderer.setClearColor(0x0a0e1a);
  document.getElementById('app').appendChild(renderer.domElement);

  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x0a0e1a,0.018);
  camera=new THREE.PerspectiveCamera(55,vw()/vh(),0.1,800);

  // dusk lighting — dim until power is restored
  hemi=new THREE.HemisphereLight(0x33405e,0x0a0c12,0.32);scene.add(hemi);
  ambient=new THREE.AmbientLight(0x4a5a78,0.18);scene.add(ambient);
  sunLight=new THREE.DirectionalLight(0x9fb8e6,0.35);sunLight.position.set(-40,30,-30);scene.add(sunLight); // low moonlight
  fillCyan=new THREE.PointLight(0x5fd0e6,0.0,120);fillCyan.position.set(0,18,0);scene.add(fillCyan); // grid glow once powered

  buildSky();buildGround();buildYard();buildPlayer();initDust();
  addInput();
  updateCamera();
}

/* ---------- sky ---------- */
function buildSky(){
  const n=1400,arr=[];
  for(let i=0;i<n;i++){const v=new THREE.Vector3().randomDirection().multiplyScalar(400);if(v.y<0)v.y=-v.y*0.4;arr.push(v.x,v.y,v.z);}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xbcd0ff,size:1.2,sizeAttenuation:false,transparent:true,opacity:0.7,fog:false})));
  moon=new THREE.Mesh(new THREE.SphereGeometry(9,24,24),new THREE.MeshBasicMaterial({color:0xdfe6ff,fog:false}));
  moon.position.set(-120,90,-200);scene.add(moon);
  const halo=new THREE.Mesh(new THREE.SphereGeometry(16,24,24),new THREE.MeshBasicMaterial({color:0x8fb0ff,transparent:true,opacity:0.16,blending:THREE.AdditiveBlending,depthWrite:false,fog:false}));
  moon.add(halo);
}

/* ---------- ground ---------- */
const M=(c,r=0.8,m=0.1,e=0,ei=1)=>new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m,emissive:e,emissiveIntensity:e?ei:0});
function buildGround(){
  const geo=new THREE.PlaneGeometry(140,140,1,1);geo.rotateX(-Math.PI/2);
  const mat=M(0x1a1c22,0.95,0.05);
  const ground=new THREE.Mesh(geo,mat);scene.add(ground);
  // concrete apron under the pad
  const apron=new THREE.Mesh(new THREE.CircleGeometry(20,40),M(0x26282f,0.9,0.05));apron.rotation.x=-Math.PI/2;apron.position.set(0,0.02,-6);scene.add(apron);
  // painted ground markings
  const ringMat=new THREE.MeshBasicMaterial({color:0x3a3f4a});
  for(const r of [14,9]){const ring=new THREE.Mesh(new THREE.RingGeometry(r-0.25,r,48),ringMat);ring.rotation.x=-Math.PI/2;ring.position.set(0,0.03,-6);scene.add(ring);}
  // faint grid lines
  const grid=new THREE.GridHelper(140,28,0x2a3550,0x191c24);grid.position.y=0.01;grid.material.transparent=true;grid.material.opacity=0.25;scene.add(grid);
}

/* ---------- reusable prop builders ---------- */
function addGlow(mesh,color,max){mesh.material.emissive=new THREE.Color(color);mesh.material.emissiveIntensity=0;glowParts.push({mesh,color,max});return mesh;}
function floodTower(x,z,aimX,aimZ){
  const g=new THREE.Group();g.position.set(x,0,z);
  g.add(mesh(new THREE.CylinderGeometry(0.18,0.24,9,8),M(0x3a3f48,0.7,0.4),0,4.5,0));
  const head=mesh(new THREE.BoxGeometry(1.6,0.9,0.5),M(0x2a2e36,0.6,0.4),0,9,0.3);g.add(head);
  // lamp lenses
  for(let i=-1;i<=1;i++){const l=mesh(new THREE.BoxGeometry(0.42,0.7,0.12),M(0x10131a,0.4,0.3),i*0.5,9,0.58);addGlow(l,0xfff0c0,2.6);g.add(l);}
  scene.add(g);
  const light=new THREE.SpotLight(0xfff0d0,0,70,Math.PI/5,0.5,1.2);
  light.position.set(x,9,z);light.target.position.set(aimX,0,aimZ);
  scene.add(light);scene.add(light.target);
  floodlights.push({light});
  return g;
}
function mesh(geo,mat,x=0,y=0,z=0){const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);return m;}

/* ---------- the yard ---------- */
function buildYard(){
  // distant unfinished rocket on the pad
  const rk=new THREE.Group();rk.position.set(0,0,-6);
  rk.add(mesh(new THREE.CylinderGeometry(2.0,2.2,26,24),M(0xc9d2dc,0.5,0.5),0,13,0));
  rk.add(mesh(new THREE.CylinderGeometry(2.0,2.0,1.2,24),M(0xff7536,0.5,0.3),0,20,0));
  // unfinished nose (scaffolded, no cap)
  rk.add(mesh(new THREE.CylinderGeometry(1.2,2.0,4,24,1,true),M(0x8a929c,0.6,0.5),0,28,0));
  // gantry tower beside it
  const gantry=new THREE.Group();gantry.position.set(5.2,0,0);
  for(let i=0;i<6;i++)gantry.add(mesh(new THREE.BoxGeometry(0.25,0.25,5),M(0x3a3f48,0.7,0.4),0,4+i*4,0));
  for(const px of [-1.4,1.4])gantry.add(mesh(new THREE.CylinderGeometry(0.16,0.16,26,6),M(0x42474f,0.7,0.4),px,13,0));
  rk.add(gantry);
  // hold-down clamps base
  rk.add(mesh(new THREE.CylinderGeometry(3.2,3.6,1.2,24),M(0x2a2e36,0.8,0.3),0,0.6,0));
  scene.add(rk);
  // beacon light on the rocket tip
  rocketBeacon=mesh(new THREE.SphereGeometry(0.4,12,12),new THREE.MeshBasicMaterial({color:0xff3b3b}),0,30.5,-6);scene.add(rocketBeacon);

  // hangar (distant backdrop)
  const hangar=new THREE.Group();hangar.position.set(-30,0,-22);
  hangar.add(mesh(new THREE.BoxGeometry(22,11,16),M(0x20242c,0.85,0.2),0,5.5,0));
  hangar.add(mesh(new THREE.BoxGeometry(23.5,1,17.5),M(0x2a2e36,0.8,0.3),0,11.3,0)); // roof slab
  const hd=mesh(new THREE.BoxGeometry(9,8,0.4),M(0x0c0f15,0.5,0.3),0,4,8.1);addGlow(hd,0x3a8acc,1.0);hangar.add(hd); // big door, glows with power
  scene.add(hangar);

  // dead solar field (rows of panels) — glow cyan when powered
  for(let r=0;r<3;r++)for(let c=0;c<6;c++){
    const p=new THREE.Group();p.position.set(20+r*4,0,6+c*4);
    p.add(mesh(new THREE.CylinderGeometry(0.1,0.1,1.4,6),M(0x3a3f48,0.7,0.4),0,0.7,0));
    const panel=mesh(new THREE.BoxGeometry(3,0.12,2),M(0x0e1a2a,0.4,0.6),0,1.4,0);panel.rotation.x=-0.5;
    addGlow(panel,0x1f6fae,1.4);p.add(panel);
    scene.add(p);
  }

  // workshop / fabrication bay
  const shop=new THREE.Group();shop.position.set(-20,0,10);
  shop.add(mesh(new THREE.BoxGeometry(14,7,11),M(0x23272f,0.85,0.2),0,3.5,0));
  // roll-up door (dark window that glows when online)
  const door=mesh(new THREE.BoxGeometry(6,5,0.3),M(0x0c0f15,0.5,0.3),0,2.6,5.6);addGlow(door,0x3a8acc,1.6);shop.add(door);
  shop.add(mesh(new THREE.BoxGeometry(15,0.6,12),M(0x2a2e36,0.8,0.3),0,7.2,0));
  // interior fill light when online
  const shopLight=new THREE.PointLight(0x8fd0ff,0,22);shopLight.position.set(-20,4,12);scene.add(shopLight);floodlights.push({light:shopLight,soft:true});
  scene.add(shop);

  // scattered scrap, tanks, containers, fences
  scatterProps();

  // floodlight towers around the pad

/* ---------- input ---------- */
function addInput(){
  addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;
    if(e.key.toLowerCase()==='e'){e.preventDefault();tryInteract();}});
  addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
  const el=renderer.domElement;let drag=false,lx=0;
  el.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;});
  addEventListener('mouseup',()=>drag=false);
  addEventListener('mousemove',e=>{if(drag){cam.yaw-=(e.clientX-lx)*0.006;lx=e.clientX;}});
  el.addEventListener('wheel',e=>{e.preventDefault();cam.dist=THREE.MathUtils.clamp(cam.dist*(1+Math.sign(e.deltaY)*0.1),8,26);},{passive:false});
  el.addEventListener('contextmenu',e=>e.preventDefault());
  // touch: one finger rotates camera
  let tx=0;
  el.addEventListener('touchstart',e=>{if(e.touches.length)tx=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchmove',e=>{if(e.touches.length){cam.yaw-=(e.touches[0].clientX-tx)*0.008;tx=e.touches[0].clientX;}},{passive:true});
  addEventListener('resize',()=>{camera.aspect=vw()/vh();camera.updateProjectionMatrix();renderer.setSize(vw(),vh());});
}

function updateCamera(){
  const cp=Math.cos(cam.pitch),sp=Math.sin(cam.pitch);
  const ox=Math.sin(cam.yaw)*cp*cam.dist, oy=sp*cam.dist, oz=Math.cos(cam.yaw)*cp*cam.dist;
  camera.position.set(player.position.x+ox, player.position.y+oy+1, player.position.z+oz);
  camera.lookAt(player.position.x,player.position.y+1.2,player.position.z);
}

/* ---------- minimal robot job system ----------------------------------------
 * A job is data: a `unit` (Object3D) drives from->to, then "works" for
 * `duration` seconds, calling `onDone()` once. The main loop ticks every active
 * job via runJobs(). One drone, one job today — but the shape generalises to
 * more units/sites without per-task special-casing.
 *   { id, unit, from, to, duration, label?, speed?, onDone?,
 *     state:'moving'|'working'|'done', progress }
 */
function startJob(job){
  job.state='moving'; job.progress=0;
  job.unit.position.copy(job.from);
  jobs.push(job);
}
function runJobs(dt,t){
  for(const job of jobs){
    const u=job.unit, ud=u.userData||{};
    if(job.state==='moving'){
      const dx=job.to.x-u.position.x, dz=job.to.z-u.position.z, d=Math.hypot(dx,dz);
      if(d>1.7){const s=(job.speed||6)*dt; u.position.x+=dx/d*s; u.position.z+=dz/d*s; u.rotation.y=Math.atan2(dx,dz);}
      else{job.state='working'; job.progress=0; if(job.label)$('#droneprog').classList.add('show');}
    } else if(job.state==='working'){
      job.progress=Math.min(1,job.progress+dt/job.duration);
      if(ud.arm)ud.arm.rotation.x=-0.5+Math.sin(t*14)*0.35;                 // tool-arm motion
      if(ud.spark){ud.spark.visible=Math.sin(t*40)>0; ud.spark.material.color.setHex(Math.random()<0.5?0xfff0b0:0xff9a4a);}
      if(job.label){const bars=Math.round(job.progress*10);
        $('#droneprog').innerHTML=`${job.label} <b>${'▰'.repeat(bars)}${'▱'.repeat(10-bars)}</b> ${Math.round(job.progress*100)}%`;}
      if(job.progress>=1){
        job.state='done';
        if(ud.spark)ud.spark.visible=false; if(ud.arm)ud.arm.rotation.x=-0.5;
        if(job.label)$('#droneprog').classList.remove('show');
        if(job.onDone)job.onDone(job);
      }
    } else if(job.state==='done'){
      u.position.y=Math.abs(Math.sin(t*2))*0.04;                           // idle hover
    }
    if(ud.eye)ud.eye.material.color.setHSL(0.52,0.8,0.5+Math.sin(t*5)*0.18); // pulsing cyan eye
  }
}

function deployDrone(bay){
  if(G.res.scrap<20||G.res.electronics<10||G.res.compute<1){sys('The drone needs 20 scrap, 10 electronics and 1 AI compute.');return;}
  G.res.scrap-=20;G.res.electronics-=10;G.res.compute-=1;G.res.trust+=3;
  G.droneDeployed=true;
  if(bay&&bay.dorm)bay.dorm.visible=false;            // dormant cue → live unit
  drone=makeDrone();scene.add(drone);
  startJob({ id:'print-foundation', unit:drone, from:DRONE_BAY, to:FOUNDATION,
    duration:4.5, label:'PRINTING FOUNDATION', onDone:()=>finishConstruction() });
  sys('Construction drone deployed. Routing to print site…');beep(620,0.12);
  orion('Construction unit online. It has one arm, half a navigation stack, and more discipline than most launch committees. Good enough.');
  updateHUD();                                        // M05 completes later, after foundation + cargo beacon
}

  slab=new THREE.Group();slab.position.copy(FOUNDATION);
  slab.add(mesh(new THREE.BoxGeometry(3,0.3,3),M(0x46505c,0.85,0.2),0,0.15,0));

  scene.add(slab);
  if(foundationMarker)foundationMarker.material.opacity=0;
  beep(520,0.16);
  G.foundationPrinted=true;
  sys('Foundation printed. Routing drone to set a cargo beacon…');
  orion('Foundation down — level, anchored, ours. Now a navigation marker, so the next lander knows exactly where home is.');
  // second authored job, same drone, reusing the job abstraction
  startJob({ id:'place-cargo-beacon', unit:drone, from:FOUNDATION, to:BEACON_SITE,
    duration:2.5, label:'PLACING CARGO BEACON', onDone:()=>placeCargoBeacon() });

  G.droneProofComplete=true;                           // NOW M05 completes (gates authorisation)
  sys('Cargo beacon placed. Construction pattern validated.');
  orion('Beacon live. Print a slab, plant a marker — the same pattern, repeated, is how you build a world. Mars is next.');
  checkMissions();                                     // M05 → M06 Authorise robotic cargo program
}

/* ---------- HUD ---------- */
const RES=[['scrap','Scrap'],['electronics','Elec'],['power','Power'],['trust','Trust'],['compute','AI Compute']];
function buildHUD(){
  $('#res').innerHTML=RES.map(([k,l])=>`<div class="chip" id="chip-${k}"><div><div class="cl">${l}</div><div class="cv" id="cv-${k}">0</div></div></div>`).join('');
  $('#mlogRows').innerHTML=MISSIONS.map((m,i)=>`<div class="mrow" id="mrow-${i}"><div class="md">${i+1}</div><div class="mt">${m.title}</div></div>`).join('');
  updateHUD();
}
function updateHUD(){
  for(const [k] of RES){const el=$('#cv-'+k);if(el)el.textContent=k==='power'?(G.powerOn?'ONLINE':'OFFLINE'):Math.floor(G.res[k]);}
  $('#chip-power')?.classList.toggle('on',G.powerOn);$('#chip-power')?.classList.toggle('off',!G.powerOn);
  const done=isComplete(MISSIONS,G.mission);
  $('#mtTitle').textContent=done?'Cargo program authorised':getCurrentMission(MISSIONS,G.mission).title;
  $('#mtProg').textContent=`${Math.min(G.mission.idx,MISSIONS.length)}/${MISSIONS.length}`;
  $('#mtrack').querySelector('.ic').textContent=done?'✓':'◷';
  for(const r of missionRows(MISSIONS,G.mission)){const row=$('#mrow-'+r.index);if(!row)continue;
    row.className='mrow '+r.status;
    row.querySelector('.md').textContent=r.status==='done'?'✓':r.status==='active'?'▸':(r.index+1);}
}

/* ---------- modals ---------- */
function showIntro(){
  $('#mcard').innerHTML=`<div class="emoji">🛰️</div><h2>CAPE HELIOS</h2>
   <div class="who"><b>Earth — Project Red Frontier, before Mars.</b> You are the engineer sent to recommission an abandoned launch yard. Nothing flies until this place works again.</div>
   <p class="story">The floodlights are dark. The solar field is dead. Somewhere in the control shack, an old operations AI sits dormant, waiting for a trickle of power. Wake it, scavenge what you can, restore the grid, and authorise the first robotic cargo program bound for Mars.</p>
   <p class="story" style="color:var(--muted);font-size:12px">Move with <b style="color:var(--ink)">WASD</b>, look with <b style="color:var(--ink)">mouse-drag</b>, and press <b style="color:var(--ink)">E</b> to interact when a marker glows.</p>
   <div class="mbtns"><button class="btn go" id="introGo">Step onto the yard ▸</button></div>`;
  $('#modal').classList.add('show');
  $('#introGo').onclick=()=>{$('#modal').classList.remove('show');G.started=true;
    setTimeout(()=>sys('Cape Helios: perimeter clear. Head to the control terminal and wake ORION.'),500);};
}
function showComplete(){
  $('#mcard').innerHTML=`<div class="emoji">🚀</div><h2>CARGO PROGRAM AUTHORISED</h2>
   <p class="story">Cape Helios is alive again. With ORION online, the grid restored, the fabrication bay running, and the <b>first construction-drone pattern validated</b>, Project Red Frontier can begin assembling and launching <b>robotic cargo missions</b> — the landers, power systems, and supply caches that will prepare Mars long before the first crew arrives.</p>
   <div class="who" style="border-left-color:var(--cyan)">ORION: "The first construction-drone pattern holds. Mars will not receive just supplies — it will receive hands. The next time we speak, it may be across twenty light-minutes of vacuum."</div>
   <div class="tbc">To be continued — Prepare Mars Cargo</div>
   <div class="mbtns"><a class="btn" href="../mars-colony/">Play the Mars colony →</a><button class="btn cy" id="again">Replay the yard</button></div>`;
  $('#modal').classList.add('show');
  $('#again').onclick=()=>location.reload();
}

/* ---------- audio ---------- */
let actx;
function beep(f=440,d=0.1){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();
  o.frequency.value=f;o.type='triangle';g.gain.setValueAtTime(0.05,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);
  o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+d);}catch(e){}}

/* ---------- main loop ---------- */
const _m=new THREE.Vector3();
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),0.05),t=performance.now()*0.001;

  // movement (camera-relative)
  if(G.started&&!G.over){
    const f=(keys['w']||keys['arrowup']?1:0)-(keys['s']||keys['arrowdown']?1:0);
    const r=(keys['d']||keys['arrowright']?1:0)-(keys['a']||keys['arrowleft']?1:0);
    if(f||r){
      const fwd=_m.set(-Math.sin(cam.yaw),0,-Math.cos(cam.yaw));
      const rx=Math.cos(cam.yaw),rz=-Math.sin(cam.yaw);
      let mx=fwd.x*f+rx*r, mz=fwd.z*f+rz*r;const len=Math.hypot(mx,mz)||1;mx/=len;mz/=len;
      const spd=8.5*dt;
      player.position.x=THREE.MathUtils.clamp(player.position.x+mx*spd,-38,38);
      player.position.z=THREE.MathUtils.clamp(player.position.z+mz*spd,-2,38); // keep player out of the pad/rocket core
      playerYaw=Math.atan2(mx,mz);
    }
  }
  // smooth player facing
  player.rotation.y+=(playerYaw-player.rotation.y)*Math.min(1,dt*12);
  // bob while walking
  const moving=(keys['w']||keys['a']||keys['s']||keys['d']||keys['arrowup']||keys['arrowdown']||keys['arrowleft']||keys['arrowright'])&&G.started&&!G.over;
  player.position.y=moving?Math.abs(Math.sin(t*10))*0.06:0;

  updateCamera();

  // power ramp — light the yard up smoothly once restored
  const target=G.powerOn?1:0;
  if(Math.abs(G.powerLevel-target)>0.001){
    G.powerLevel+=(target-G.powerLevel)*Math.min(1,dt*1.5);
    const p=G.powerLevel;
    hemi.intensity=0.32+p*0.7; ambient.intensity=0.18+p*0.32;
    fillCyan.intensity=p*0.6;
    for(const f of floodlights)f.light.intensity=p*(f.soft?1.6:2.2);
    for(const g of glowParts)g.mesh.material.emissiveIntensity=p*g.max;
    renderer.toneMappingExposure=1.05+p*0.15;
  }
  // ORION screen always lit once woken (independent of grid)
  // (set directly in wakeOrion)

  // proximity interaction
  let best=null,bestD=1e9;
  for(const o of interactables){
    const av=o.available();o.ring.material.opacity=0;
    if(!av)continue;
    const d=Math.hypot(o.group.position.x-player.position.x,o.group.position.z-player.position.z);
    if(d<o.radius){o.ring.material.opacity=0.5+Math.sin(t*4)*0.3;if(d<bestD){bestD=d;best=o;}}
    else o.ring.material.opacity=0.18;
  }
  activeInteract=best;
  const pr=$('#prompt');
  if(best&&G.started&&!G.over){pr.innerHTML=`<b>E</b>${best.label()}`;pr.classList.add('show');}
  else pr.classList.remove('show');

  // ambient animation
  if(rocketBeacon)rocketBeacon.material.opacity=0.5+Math.sin(t*3)*0.5;
  for(const d of dust){d.rotation.y+=dt*0.02;}
  if(G.orionScreen&&G.mission.idx>=1){G.orionScreen.material.emissiveIntensity=2.4+Math.sin(t*5)*0.6;}

  // robot jobs — tick the data-driven job list (drive → work → onDone)
  runJobs(dt,t);
  if(beacon)beacon.userData.lamp.material.opacity=0.45+Math.sin(t*5)*0.55; // blinking cargo beacon

  renderer.render(scene,camera);
}

/* ---------- boot ---------- */
function boot(){let p=0;const b=$('#lbar');const iv=setInterval(()=>{p=Math.min(100,p+13+Math.random()*16);b.style.width=p+'%';if(p>=100){clearInterval(iv);start();}},90);}
function start(){
  init();buildHUD();
  setTimeout(()=>{const l=$('#loader');l.style.opacity=0;setTimeout(()=>l.remove(),600);$('#hud').style.display='block';showIntro();},250);
  loop();
}
boot();
</script>
