<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Red Frontier — Mars Colony</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0705;
    --glass:rgba(26,16,11,0.74); --glass-2:rgba(18,11,8,0.9);
    --line:rgba(255,138,74,0.20); --line-2:rgba(255,138,74,0.45);
    --ink:#ffeede; --muted:#bb9882;
    --rust:#ff7536; --rust-2:#ffb060; --amber:#ffc46b;
    --good:#74e0a0; --warn:#ffce5b; --bad:#ff6f6f; --sci:#9fb8ff; --joy:#ffcaa0; --cyan:#5fd0e6;
    --shadow:0 22px 60px rgba(0,0,0,.62);
    --ui:"Chakra Petch","Segoe UI",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,"Cascadia Mono",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:var(--ui);-webkit-font-smoothing:antialiased;}
  canvas{display:block}
  #app{position:fixed;inset:0}
  /* subtle CRT/scanline atmosphere between canvas and HUD */
  #app::after{content:"";position:fixed;inset:0;z-index:3;pointer-events:none;
    background:repeating-linear-gradient(transparent 0 2px,rgba(0,0,0,.05) 2px 3px),
      radial-gradient(circle at 50% 42%,transparent 55%,rgba(0,0,0,.45) 100%);}

  /* corner-bracket HUD frame */
  .frame{position:relative}
  .frame::before,.frame::after{content:"";position:absolute;width:15px;height:15px;pointer-events:none;opacity:.85}
  .frame::before{top:-1px;left:-1px;border-top:2px solid var(--rust);border-left:2px solid var(--rust)}
  .frame::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--rust);border-right:2px solid var(--rust)}

  #loader{position:fixed;inset:0;z-index:50;display:grid;place-items:center;
    background:radial-gradient(circle at 50% 32%,#3a1606,#0b0705 72%);transition:opacity .6s;}
  #loader .lwrap{text-align:center}
  #loader h1{font-size:clamp(30px,6vw,68px);margin:0;letter-spacing:.26em;font-weight:700;
    background:linear-gradient(90deg,var(--rust),var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 46px rgba(255,120,60,.4);}
  #loader p{color:var(--muted);letter-spacing:.5em;margin:.6em 0 1.6em;font-size:12px;text-transform:uppercase}
  .bar{width:min(360px,70vw);height:5px;border-radius:0;background:rgba(255,255,255,.08);overflow:hidden;margin:0 auto;
    clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rust),var(--amber));transition:width .3s}

  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column;justify-content:space-between}

  /* ===== top telemetry rail ===== */
  .topbar{pointer-events:auto;display:flex;gap:0;flex-wrap:wrap;align-items:stretch;padding:8px 12px;
    background:linear-gradient(180deg,rgba(11,7,5,.94),rgba(11,7,5,.55) 70%,transparent);
    border-bottom:1px solid var(--line)}
  .brand{display:flex;flex-direction:column;justify-content:center;padding:2px 16px 2px 4px;margin-right:6px;
    border-right:1px solid var(--line)}
  .brand .bd1{font-weight:700;font-size:14px;letter-spacing:.16em;color:var(--ink)}
  .brand .bd2{font-size:9px;letter-spacing:.42em;color:var(--rust);text-transform:uppercase;margin-top:1px}
  .res{display:flex;align-items:center;gap:7px;padding:4px 12px;font-variant-numeric:tabular-nums;min-width:0;
    border-right:1px solid rgba(255,138,74,.1)}
  .res .ic{width:18px;height:18px;flex:0 0 auto;opacity:.92}
  .res .v{font-family:var(--mono);font-weight:600;font-size:13px;letter-spacing:-.02em;line-height:1.1}
  .res .r{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono)}
  .res .r.pos{color:var(--good)}.res .r.neg{color:var(--bad)}
  .res.alert .v{color:var(--bad);animation:flick 2.4s ease-in-out infinite}
  @keyframes flick{0%,100%{opacity:1}50%{opacity:.72}}
  .spacer{flex:1}
  .clock{display:flex;align-items:center;gap:12px;padding:3px 4px 3px 14px;border-left:1px solid var(--line)}
  .clock .sol{font-family:var(--mono);font-weight:600;font-size:15px;letter-spacing:.04em}
  .clock .tod{font-size:10px;color:var(--muted);width:80px;text-transform:uppercase;letter-spacing:.1em}
  .speed{display:flex;gap:4px}
  .speed button{pointer-events:auto;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--ink);
    width:30px;height:30px;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--mono);transition:.15s}
  .speed button:hover{border-color:var(--rust);color:var(--rust)}
  .speed button.on{background:var(--rust);color:#180a04;border-color:var(--rust)}

  /* ===== build dock ===== */
  .dock{pointer-events:auto;align-self:center;margin-bottom:16px;display:flex;gap:6px;padding:11px 12px;
    border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(11px);box-shadow:var(--shadow);
    max-width:min(97vw,1260px);overflow-x:auto;scrollbar-width:thin}
  .bcard{position:relative;width:82px;flex:0 0 auto;border:1px solid transparent;padding:9px 6px 8px;
    background:rgba(255,255,255,.025);cursor:pointer;text-align:center;transition:transform .16s,background .16s,border-color .16s;user-select:none}
  .bcard::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--rust);transform:scaleX(0);transition:transform .18s}
  .bcard:hover{background:rgba(255,138,74,.12);border-color:var(--line-2);transform:translateY(-4px)}
  .bcard:hover::after{transform:scaleX(1)}
  .bcard.sel{border-color:var(--rust);background:rgba(255,117,54,.2)}
  .bcard.sel::after{transform:scaleX(1)}
  .bcard.locked{opacity:.38;cursor:not-allowed;filter:grayscale(.6)}
  .bcard.unaff{opacity:.6}
  .bcard svg{width:34px!important;height:34px!important;margin:0 auto 5px;display:block;flex:0 0 auto}
  .bcard .bn{font-size:10.5px;line-height:1.15;color:var(--ink);font-weight:600}
  .bcard .bc{font-size:9px;color:var(--muted);margin-top:3px;font-family:var(--mono);letter-spacing:-.02em}
  .bcard .lk{position:absolute;top:5px;right:6px;font-size:10px}

  /* ===== tool rail ===== */
  .leftcol{position:fixed;left:12px;top:96px;display:flex;flex-direction:column;gap:7px;pointer-events:none}
  .tool{pointer-events:auto;width:44px;height:44px;border:1px solid var(--line);background:var(--glass);
    color:var(--ink);cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(8px);transition:.15s;font-size:18px}
  .tool:hover{border-color:var(--rust);background:var(--glass-2);transform:translateX(2px)}
  .tool.on{background:var(--rust);color:#180a04;border-color:var(--rust)}

  /* ===== side panel ===== */
  .side{position:fixed;right:12px;top:96px;width:min(366px,88vw);max-height:calc(100vh - 200px);overflow:auto;
    border:1px solid var(--line);background:var(--glass-2);backdrop-filter:blur(12px);box-shadow:var(--shadow);
    pointer-events:auto;padding:16px 16px 18px;transform:translateX(125%);transition:transform .38s cubic-bezier(.2,.85,.25,1);scrollbar-width:thin}
  .side.open{transform:none}
  .side h3{margin:0 0 4px;font-size:15px;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:8px;
    text-transform:uppercase}
  .side .close{margin-left:auto;cursor:pointer;color:var(--muted);font-size:18px;line-height:1}
  .side .close:hover{color:var(--rust)}
  .side .sub{color:var(--muted);font-size:12px;margin:0 0 13px;line-height:1.5}
  .stat{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px solid rgba(255,138,74,.1)}
  .stat b{font-weight:600;font-family:var(--mono)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--line);background:rgba(255,255,255,.04);
    color:var(--ink);padding:9px 12px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--ui);transition:.15s;width:100%;letter-spacing:.02em}
  .btn:hover{border-color:var(--rust);background:rgba(255,117,54,.14)}
  .btn.danger:hover{border-color:var(--bad);color:var(--bad);background:rgba(255,111,111,.1)}
  .btn:disabled{opacity:.38;cursor:not-allowed}

  .tech{border:1px solid var(--line);padding:11px;margin-bottom:9px;background:rgba(255,255,255,.02)}
  .tech.done{border-color:rgba(116,224,160,.4);background:rgba(116,224,160,.06)}
  .tech h4{margin:0 0 4px;font-size:13px;display:flex;align-items:center;gap:6px;font-weight:600}
  .tech p{margin:0 0 9px;font-size:11.5px;color:var(--muted);line-height:1.45}
  .tech .cost{font-size:11px;color:var(--sci);font-weight:600;font-family:var(--mono)}
  .branchTag{font-size:9px;text-transform:uppercase;letter-spacing:.1em;padding:2px 8px;background:rgba(255,138,74,.12);color:var(--rust-2);margin-left:auto}

  .mile{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid rgba(255,138,74,.1)}
  .mile .dot{width:26px;height:26px;display:grid;place-items:center;flex:0 0 auto;font-size:13px;
    border:1px solid var(--line);background:rgba(255,255,255,.04)}
  .mile.done .dot{background:linear-gradient(135deg,var(--rust),var(--amber));color:#180a04;border-color:transparent}
  .mile .mt{font-size:12.5px;font-weight:600}
  .mile .md{font-size:11px;color:var(--muted);line-height:1.45;margin-top:2px}
  .order{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid var(--line);padding:9px 11px;margin-bottom:7px;font-size:12px}
  .order .ob{flex:0 0 auto;width:auto;padding:7px 11px;font-family:var(--mono);font-size:11.5px}

  #tip{position:fixed;z-index:30;max-width:244px;padding:11px 13px;border:1px solid var(--line-2);
    background:var(--glass-2);backdrop-filter:blur(8px);font-size:12px;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:var(--shadow)}
  #tip h5{margin:0 0 6px;font-size:13px;color:var(--rust-2);font-weight:700;letter-spacing:.03em;text-transform:uppercase}
  #tip .row{display:flex;justify-content:space-between;gap:14px;color:var(--muted);line-height:1.55}
  #tip .row b{color:var(--ink);font-family:var(--mono);font-weight:500}
  #tip .desc{color:var(--muted);margin-top:7px;font-style:italic;line-height:1.45}
  #tip .biomes{margin-top:7px;font-size:11px;color:var(--rust-2)}

  #log{position:fixed;left:12px;bottom:14px;width:min(340px,72vw);pointer-events:none;display:flex;flex-direction:column;gap:5px}
  .logitem{font-size:12px;padding:8px 11px;background:var(--glass);border:1px solid var(--line);border-left:2px solid var(--muted);
    backdrop-filter:blur(6px);animation:slideIn .35s;opacity:.97}
  .logitem.good{border-left-color:var(--good)}
  .logitem.warn{border-left-color:var(--warn)}
  .logitem.bad{border-left-color:var(--bad)}
  .logitem.disc{border-left-color:var(--cyan)}
  @keyframes slideIn{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:.97}}

  #modal{position:fixed;inset:0;z-index:40;display:none;place-items:center;background:rgba(5,3,2,.74);backdrop-filter:blur(5px)}
  #modal.show{display:grid}
  .mcard{width:min(500px,92vw);border:1px solid var(--line-2);background:var(--glass-2);
    box-shadow:var(--shadow);padding:28px;text-align:center;animation:pop .35s}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .mcard .emoji{font-size:48px}
  .mcard h2{margin:10px 0 8px;font-size:23px;letter-spacing:.03em}
  .mcard p{color:var(--muted);font-size:13.5px;line-height:1.65;margin:0 0 20px}
  .mcard .mbtns{display:flex;gap:10px}
  /* Sol Event choice buttons — stacked, label + consequence line */
  .mcard .evbtns{flex-direction:column;gap:9px}
  .mcard .evchoice{flex-direction:column;align-items:flex-start;gap:2px;padding:12px 14px;text-align:left}
  .mcard .evchoice b{font-size:14px;color:var(--ink);letter-spacing:.02em}
  .mcard .evchoice .evd{font-family:var(--mono);font-size:11px;color:var(--amber);letter-spacing:0}
  .mcard .evchoice:hover b{color:var(--rust-2)}

  .hint{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);pointer-events:none;
    font-size:12px;color:var(--ink);background:var(--glass-2);border:1px solid var(--line-2);
    padding:7px 16px;backdrop-filter:blur(6px);opacity:0;transition:opacity .3s;text-align:center;max-width:90vw;letter-spacing:.02em}
  .hint.show{opacity:1}

  /* ===== tutorial ===== */
  #tut{position:fixed;left:50%;bottom:124px;transform:translateX(-50%);z-index:46;width:min(404px,93vw);
    border:1px solid var(--rust);background:var(--glass-2);box-shadow:var(--shadow);
    padding:17px 19px;display:none;pointer-events:auto;backdrop-filter:blur(12px)}
  #tut.show{display:block;animation:pop .3s}
  #tut h4{margin:0 0 7px;font-size:15px;color:var(--rust-2);font-weight:700;letter-spacing:.03em}
  #tut p{margin:0 0 14px;font-size:12.5px;color:var(--ink);line-height:1.6}
  #tut .tb{display:flex;justify-content:space-between;align-items:center;gap:10px}
  #tut .dots{display:flex;gap:5px}
  #tut .dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:.2s}
  #tut .dots i.on{background:var(--rust);transform:scale(1.25)}
  #tut .tbtns{display:flex;gap:8px}
  #tut button{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);
    padding:8px 15px;cursor:pointer;font-size:12.5px;font-weight:700;font-family:var(--ui);transition:.15s}
  #tut button.skip{color:var(--muted);font-weight:600}
  #tut button.next{background:var(--rust);color:#180a04;border-color:var(--rust)}
  #tut button:hover{filter:brightness(1.08)}
  .tut-hl{outline:2px solid var(--rust)!important;outline-offset:4px;
    animation:tutPulse 1.2s infinite;position:relative;z-index:20}
  @keyframes tutPulse{0%,100%{outline-color:rgba(255,117,54,.95)}50%{outline-color:rgba(255,117,54,.3)}}

  /* ===== campaign: ORION feed, mission tracker & log ===== */
  .logitem.orion{border-left-color:var(--cyan);background:rgba(18,28,38,.86)}
  .otag{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--cyan);
    border:1px solid rgba(95,208,230,.45);padding:1px 5px;margin-right:7px;vertical-align:1px}
  #mtrack{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9;pointer-events:auto;cursor:pointer;
    display:flex;align-items:center;gap:11px;max-width:min(560px,92vw);
    background:var(--glass-2);border:1px solid var(--line);border-top:2px solid var(--rust);
    padding:6px 15px;backdrop-filter:blur(8px);box-shadow:var(--shadow);transition:border-color .2s,opacity .3s;opacity:0}
  #mtrack.show{opacity:1}
  #mtrack:hover{border-color:var(--rust)}
  #mtrack .mt-ic{font-size:16px;color:var(--rust-2);flex:0 0 auto}
  #mtrack .mt-label{font-size:8.5px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;font-family:var(--mono)}
  #mtrack .mt-title{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2}
  #mtrack .mt-prog{font-family:var(--mono);font-size:11px;color:var(--rust-2);margin-left:4px;flex:0 0 auto}
  .mlog{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,138,74,.1)}
  .mlog .mdot{width:22px;height:22px;display:grid;place-items:center;flex:0 0 auto;font-size:12px;font-family:var(--mono);
    border:1px solid var(--line);color:var(--muted)}
  .mlog.done .mdot{background:linear-gradient(135deg,var(--rust),var(--amber));color:#180a04;border-color:transparent}
  .mlog.active .mdot{border-color:var(--rust);color:var(--rust)}
  .mlog .mtt{font-size:12.5px;font-weight:600}
  .mlog.done .mtt{color:var(--muted)}
  .mlog .mhint{font-size:11px;color:var(--cyan);line-height:1.45;margin-top:3px}
  .mcard p.story{text-align:left;font-size:13px;line-height:1.7;color:var(--ink);margin:0 0 14px}
  .mcard .who{text-align:left;margin:0 0 16px;font-size:12px;color:var(--muted);line-height:1.55;
    border-left:2px solid var(--cyan);padding-left:11px}
  .mcard .who b{color:var(--rust-2)}

  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(255,138,74,.32)}
</style>
</head>
<body>
<div id="app"></div>

<div id="loader"><div class="lwrap">
  <h1>RED FRONTIER</h1><p>Mars Colony</p>
  <div class="bar"><i id="lbar"></i></div>
</div></div>

<div id="hud" style="display:none">
  <div class="topbar" id="resbar"></div>
  <div class="spacer"></div>
  <div class="dock frame" id="dock"></div>
</div>

<div class="leftcol" id="leftcol" style="display:none">
  <button class="tool" id="tInfo" title="Colony overview">📊</button>
  <button class="tool" id="tMission" title="Mission log">🎯</button>
  <button class="tool" id="tTech" title="Research & inventions">🧪</button>
  <button class="tool" id="tEvo" title="Evolution & frontier">🪐</button>
  <button class="tool" id="tShop" title="Earth supply & trade">📦</button>
  <button class="tool" id="tDemo" title="Demolish (toggle)">⛏️</button>
  <button class="tool" id="tSave" title="Save colony">💾</button>
  <button class="tool" id="tHelp" title="How to play">❔</button>
</div>

<div class="side frame" id="side"></div>
<div id="tip"></div>
<div id="log"></div>
<div id="mtrack" title="Open mission log"><span class="mt-ic">◷</span><div class="mt-body"><div class="mt-label">Current Objective</div><div class="mt-title" id="mtrackTitle">—</div></div><span class="mt-prog" id="mtrackProg"></span></div>
<div class="hint" id="hint"></div>
<div id="tut"></div>
<div id="modal"><div class="mcard frame" id="mcard"></div></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { getCurrentMission, isComplete, advanceCompletedMissions, reconcileMissionState, missionRows, fireStoryBeats } from '../shared/red-frontier-missions.js';

/* ============================================================= *
 *  RED FRONTIER — 3D Mars colonization strategy (single file)    *
 * ============================================================= */

/* ---------- value noise ---------- */
function makeNoise(seed){
  const p=new Uint8Array(512);let s=seed>>>0;
  const rnd=()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};
  const perm=[...Array(256).keys()];
  for(let i=255;i>0;i--){const j=(rnd()*(i+1))|0;[perm[i],perm[j]]=[perm[j],perm[i]];}
  for(let i=0;i<512;i++)p[i]=perm[i&255];
  const fade=t=>t*t*t*(t*(t*6-15)+10);
  const lerp=(a,b,t)=>a+(b-a)*t;
  const grad=(h,x,y)=>{const u=(h&1)?x:-x,v=(h&2)?y:-y;return u+v;};
  return (x,y)=>{
    const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);
    const u=fade(x),v=fade(y);const A=p[X]+Y,B=p[X+1]+Y;
    return lerp(lerp(grad(p[A],x,y),grad(p[B],x-1,y),u),lerp(grad(p[A+1],x,y-1),grad(p[B+1],x-1,y-1),u),v);
  };
}
function fbm(n,x,y,oct=4){let v=0,a=.5,f=1;for(let i=0;i<oct;i++){v+=a*n(x*f,y*f);f*=2;a*=.5;}return v;}

/* ============================================================= *
 *  CONFIG                                                        *
 * ============================================================= */
const GRID=44;                  // lon columns & lat rows
const R=70;                     // planet radius (bigger!)
const TILE=4.0;                 // building footprint scale
const SOL_SECONDS=10;
const STORAGE_BASE={oxygen:240,water:240,food:240,materials:360,science:99999,credits:99999};
const SAVE_KEY='redfrontier3';
const noiseH=makeNoise(13577);
const UP=new THREE.Vector3(0,1,0);

function noise3(x,y,z){return (fbm(noiseH,x+11,y-7,4)+fbm(noiseH,y+5,z+3,4)+fbm(noiseH,z-9,x+2,4))/3;}
function heightAt(dir){
  const f=2.0;
  const n=noise3(dir.x*f,dir.y*f,dir.z*f);
  const ridge=Math.abs(noise3(dir.x*f*2.4+3,dir.y*f*2.4,dir.z*f*2.4));
  return (n - ridge*0.5)*5.0;
}

function biomeAt(gx,gz){
  const d=gridToDir(gx,gz);

/* ---------- planet ---------- */
function buildTerrain(){
  const geo=new THREE.SphereGeometry(R,200,150);
  const pos=geo.attributes.position;const colors=[];
  const cLow=new THREE.Color(0x37150a),cMid=new THREE.Color(0x8f3c1a),cHi=new THREE.Color(0xd0743a),
        cDust=new THREE.Color(0xe6a05a),cPolar=new THREE.Color(0xf2e8d8),cBasin=new THREE.Color(0x53241a),
        cDark=new THREE.Color(0x2a1208);
  const v=new THREE.Vector3();
  for(let i=0;i<pos.count;i++){
    v.fromBufferAttribute(pos,i).normalize();
    const h=heightAt(v);const rr=R+h;
    pos.setXYZ(i,v.x*rr,v.y*rr,v.z*rr);
    const t=THREE.MathUtils.clamp((h+5)/10,0,1);
    let c=cLow.clone().lerp(cMid,Math.min(1,t*2)).lerp(cHi,Math.max(0,t*2-1));
    // broad regional albedo — dark basaltic maria vs bright dusty highlands (low-freq noise)
    const region=(noise3(v.x*2.1+3.7,v.y*2.1,v.z*2.1)+1)*0.5;
    c.lerp(cDark,(1-THREE.MathUtils.smoothstep(region,0.12,0.42))*0.4);
    c.lerp(cDust,THREE.MathUtils.smoothstep(region,0.62,0.94)*0.22);
    if(h<-2.2)c.lerp(cBasin,0.55);
    // fine wind-blown dust speckle
    const sp=(noise3(v.x*11,v.y*11,v.z*11)+1)*0.5;
    c.lerp(cDust,sp*0.12);
    // crisper polar caps with a ragged, noise-broken edge
    const edge=noise3(v.x*7,v.y*7,v.z*7)*0.03;
    const cap=THREE.MathUtils.smoothstep(Math.abs(v.y)+edge,0.83,0.95);
    c.lerp(cPolar,cap*0.9);
    colors.push(c.r,c.g,c.b);
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  terrain=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.92,metalness:0.04}));
  terrain.receiveShadow=true;scene.add(terrain);

  // craters / boulders for flair — varied palette (4 shared materials keep RAM low)
  const rockGeo=new THREE.IcosahedronGeometry(1,0);
  const rockMats=[0x6a3320,0x7a4028,0x4a2214,0x8a5a38].map(c=>new THREE.MeshStandardMaterial({color:c,roughness:1,flatShading:true}));
  for(let i=0;i<84;i++){
    const dir=new THREE.Vector3().randomDirection();
    const m=new THREE.Mesh(rockGeo,rockMats[i&3]);
    const sc=0.5+Math.random()*2.4;m.scale.set(sc*(0.8+Math.random()*0.4),sc*0.55,sc*(0.8+Math.random()*0.4));
    m.position.copy(dir.multiplyScalar(R+heightAt(dir)));
    orientToNormal(m,dir);m.rotateY(Math.random()*6);m.castShadow=true;m.receiveShadow=true;
    scene.add(m);
  }

  // tile grid overlay
  const grid=new THREE.Mesh(new THREE.SphereGeometry(R+0.3,GRID,GRID),
    new THREE.MeshBasicMaterial({color:0xff8a4a,wireframe:true,transparent:true,opacity:0.05}));
  scene.add(grid);

  // Fresnel atmosphere rim glow — tight bright limb
  atmMesh=new THREE.Mesh(new THREE.SphereGeometry(R*1.14,64,48),new THREE.ShaderMaterial({
    uniforms:{glow:{value:new THREE.Color(0xff7a3c)},strength:{value:1.0}},
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vN;uniform vec3 glow;uniform float strength;void main(){float i=pow(max(0.0,0.72-dot(vN,vec3(0.0,0.0,1.0))),2.2)*strength;gl_FragColor=vec4(glow,1.0)*i;}`,
    side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false}));
  scene.add(atmMesh);
  // wider, softer haze bloom around the limb — reads as a real atmosphere from orbit
  atmMesh2=new THREE.Mesh(new THREE.SphereGeometry(R*1.30,48,36),new THREE.ShaderMaterial({
    uniforms:{glow:{value:new THREE.Color(0xff6a7a)},strength:{value:1.0}},
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vN;uniform vec3 glow;uniform float strength;void main(){float i=pow(max(0.0,0.62-dot(vN,vec3(0.0,0.0,1.0))),3.4)*0.5*strength;gl_FragColor=vec4(glow,1.0)*i;}`,
    side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false}));
  scene.add(atmMesh2);
}

/* ---------- terraforming visualisation ----------
 * Two overlays driven every frame by G.tf (temp / oxygen / pressure):
 *  · seaMesh — a translucent ocean sphere whose radius + opacity rise with warmth
 *    & pressure, so water fills the basins and lowlands, leaving highlands as land.
 *  · vegMesh — green vegetation hugging the terrain, fading in with oxygen, only
 *    in habitable latitudes/elevations (baked per-vertex suitability). */
function buildTerraform(){
  seaMesh=new THREE.Mesh(new THREE.SphereGeometry(R,96,64),
    new THREE.MeshStandardMaterial({color:0x2f6fa8,roughness:0.14,metalness:0.25,transparent:true,opacity:0,depthWrite:false}));
  seaMesh.renderOrder=1;scene.add(seaMesh);

  const g=new THREE.SphereGeometry(R,180,132);const pos=g.attributes.position;
  const aVeg=new Float32Array(pos.count),cols=[];const v=new THREE.Vector3(),cg=new THREE.Color();
  for(let i=0;i<pos.count;i++){
    v.fromBufferAttribute(pos,i).normalize();
    const h=heightAt(v);const rr=R+h+0.06;pos.setXYZ(i,v.x*rr,v.y*rr,v.z*rr);
    const lat=Math.abs(v.y);
    let s=1-THREE.MathUtils.smoothstep(lat,0.52,0.82);        // lush near equator, none at poles
    s*=1-THREE.MathUtils.smoothstep(h,3.0,6.5);               // no forest on high peaks
    const n=(noise3(v.x*3.6+11,v.y*3.6,v.z*3.6)+1)*0.5;
    s*=THREE.MathUtils.smoothstep(n,0.34,0.72);               // patchy — meadows, not a paint bucket
    aVeg[i]=THREE.MathUtils.clamp(s,0,1);
    cg.setHSL(0.34-n*0.07,0.55,0.24+n*0.16);cols.push(cg.r,cg.g,cg.b);   // varied greens
  }
  g.computeVertexNormals();
  g.setAttribute('aVeg',new THREE.BufferAttribute(aVeg,1));
  g.setAttribute('aCol',new THREE.Float32BufferAttribute(cols,3));
  vegMesh=new THREE.Mesh(g,new THREE.ShaderMaterial({
    uniforms:{uOpacity:{value:0}},
    vertexShader:`attribute float aVeg;attribute vec3 aCol;varying float vV;varying vec3 vC;varying vec3 vN;
      void main(){vV=aVeg;vC=aCol;vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying float vV;varying vec3 vC;varying vec3 vN;uniform float uOpacity;
      void main(){float a=vV*uOpacity;if(a<0.01)discard;float lam=0.45+0.55*max(0.0,dot(vN,vec3(0.4,0.5,0.7)));gl_FragColor=vec4(vC*lam,a);}`,
    transparent:true,depthWrite:false}));
  vegMesh.renderOrder=2;scene.add(vegMesh);
}
// Drive the terraforming overlays from G.tf every frame — oceans rise with warmth+pressure, vegetation with oxygen.
function updateTerraform(){
  const avg=(G.tf.temp+G.tf.oxygen+G.tf.pressure)/3;
  if(vegMesh)vegMesh.material.uniforms.uOpacity.value=THREE.MathUtils.clamp(G.tf.oxygen/100,0,1)*0.92;
  if(seaMesh){const wp=THREE.MathUtils.clamp(Math.min(G.tf.temp,G.tf.pressure)/100,0,1);
    seaMesh.visible=wp>0.02;seaMesh.scale.setScalar((R+(-3+wp*4.4))/R);seaMesh.material.opacity=wp*0.8;}
  if(atmMesh&&!dustStormActive){atmMesh.material.uniforms.glow.value.copy(_atmWarm).lerp(_atmCool,avg/100);}
  if(hemi)hemi.color.setHSL(0.06+avg/100*0.34,0.6,0.55);   // sky ambience warms toward blue as the air thickens
}
function buildStars(){
  const n=3400,geo=new THREE.BufferGeometry(),arr=[],col=[];
  const c=new THREE.Color();
  // tilted galactic band: stars concentrate near a plane, rest scattered — reads as a faint Milky Way
  const bandN=new THREE.Vector3(0.3,1,0.5).normalize();
  for(let i=0;i<n;i++){
    let v=new THREE.Vector3().randomDirection();
    if(i%2===0){ // pull half the stars toward the band plane
      const along=v.clone().addScaledVector(bandN,-v.dot(bandN));
      v=v.lerp(along.normalize(),0.72+Math.random()*0.22);
    }
    v.multiplyScalar(1600);arr.push(v.x,v.y,v.z);
    const warm=Math.random();
    c.setHSL(0.55-warm*0.5,0.35*Math.random(),0.62+Math.random()*0.38);col.push(c.r,c.g,c.b);
  }

  scene.add(starField);
}

/* ============================================================= *
 *  CAMERA (orbit a fixed globe)                                  *
 * ============================================================= */
const cam={theta:Math.PI*0.25,phi:1.0,radius:R*2.0};
function initCamera(){updateCamera();}
function updateCamera(){
  cam.phi=THREE.MathUtils.clamp(cam.phi,0.12,Math.PI-0.12);
  cam.radius=THREE.MathUtils.clamp(cam.radius,R*1.28,R*4.6);
  camera.position.set(
    cam.radius*Math.sin(cam.phi)*Math.cos(cam.theta),
    cam.radius*Math.cos(cam.phi),
    cam.radius*Math.sin(cam.phi)*Math.sin(cam.theta));
  camera.lookAt(0,0,0);
}
function addEventListeners(){
  const el=renderer.domElement;let drag=false,lx=0,ly=0;
  el.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;pickDownX=e.clientX;pickDownY=e.clientY;});
  addEventListener('mouseup',()=>drag=false);
  addEventListener('mousemove',e=>{
    pointer.x=(e.clientX/innerWidth)*2-1;pointer.y=-(e.clientY/innerHeight)*2+1;
    if(!drag)return;
    const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
    cam.theta+=dx*0.005;        // FIXED: drag direction now matches the globe
    cam.phi-=dy*0.005;
    updateCamera();
  });
  el.addEventListener('wheel',e=>{e.preventDefault();cam.radius*=1+Math.sign(e.deltaY)*0.08;updateCamera();},{passive:false});
  el.addEventListener('contextmenu',e=>e.preventDefault());
  el.addEventListener('click',onClick);
  let pinch=0;
  el.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
    else if(e.touches.length===2){pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
  el.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&drag){const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;cam.theta+=dx*0.006;cam.phi-=dy*0.006;updateCamera();}
    else if(e.touches.length===2){const dd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);cam.radius*=pinch/dd;pinch=dd;updateCamera();}
  },{passive:true});
  el.addEventListener('touchend',()=>drag=false);
  const onResize=()=>{const w=G._vw(),h=G._vh();camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);};
  addEventListener('resize',onResize);requestAnimationFrame(onResize);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')onResize();});
  addEventListener('keydown',e=>{
    if(e.key==='Escape'){G.selected=null;G.demolish=false;refreshDock();updateTools();}
    if(e.key>='1'&&e.key<='3')setSpeed(+e.key);
    if(e.key===' '){e.preventDefault();togglePause();}
  });
}

/* ============================================================= *
 *  SPHERICAL GRID                                                *
 * ============================================================= */
function gridToDir(gx,gz){
  const lon=(gx+0.5)/GRID*Math.PI*2, lat=-Math.PI/2+(gz+0.5)/GRID*Math.PI, cl=Math.cos(lat);
  return new THREE.Vector3(cl*Math.cos(lon),Math.sin(lat),cl*Math.sin(lon));
}
function surfacePos(gx,gz){const d=gridToDir(gx,gz);return d.clone().multiplyScalar(R+heightAt(d));}
function dirToGrid(dir){
  const n=dir.clone().normalize();
  const lat=Math.asin(THREE.MathUtils.clamp(n.y,-1,1));let lon=Math.atan2(n.z,n.x);if(lon<0)lon+=Math.PI*2;
  let gx=Math.floor(lon/(Math.PI*2)*GRID),gz=Math.floor((lat+Math.PI/2)/Math.PI*GRID);
  gx=((gx%GRID)+GRID)%GRID;gz=THREE.MathUtils.clamp(gz,0,GRID-1);return {gx,gz};
}
function idx(gx,gz){return gz*GRID+gx;}
function inGrid(gx,gz){return gx>=0&&gz>=0&&gx<GRID&&gz<GRID;}
function orientToNormal(obj,dir){obj.quaternion.setFromUnitVectors(UP,dir.clone().normalize());}
function tangentBasis(up){
  const t1=new THREE.Vector3().crossVectors(up,Math.abs(up.y)<0.9?UP:new THREE.Vector3(1,0,0)).normalize();
  const t2=new THREE.Vector3().crossVectors(up,t1).normalize();return {t1,t2};
}
function tileSlope(gx,gz){
  const s=[gridToDir(gx,gz),gridToDir((gx+1)%GRID,gz),gridToDir((gx-1+GRID)%GRID,gz),
    gridToDir(gx,Math.min(GRID-1,gz+1)),gridToDir(gx,Math.max(0,gz-1))].map(heightAt);
  return Math.max(...s)-Math.min(...s);
}

      const fus=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.6,4.4,16),mat(0xeef2f8,0.4,0.5));fus.position.y=2.6;
      const nose=new THREE.Mesh(new THREE.ConeGeometry(0.55,1.3,16),mat(0xeef2f8,0.4,0.5));nose.position.y=5.4;
      const band=new THREE.Mesh(new THREE.CylinderGeometry(0.62,0.62,0.5,16),mat(0xff7a3c,0.5,0.3));band.position.y=3.6;
      for(let i=0;i<3;i++){const f=new THREE.Mesh(new THREE.BoxGeometry(0.1,1.0,0.7),mat(0xff7a3c,0.5,0.3));const w=new THREE.Group();w.rotation.y=i*Math.PI*2/3;f.position.set(0.55,0.8,0);w.add(f);rocket.add(w);}
      const flame=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.6,12),new THREE.MeshBasicMaterial({color:0xffb24a,transparent:true,opacity:0.9}));flame.position.y=-0.4;flame.rotation.x=Math.PI;flame.visible=false;
      rocket.add(fus,nose,band,flame);rocket.position.y=0.4;rocket.traverse(o=>{if(o.isMesh)o.castShadow=true;});
      g.add(rocket);g.userData.rocket=rocket;g.userData.flame=flame;
      break;}
    case'arcology':{
      add(new THREE.Mesh(new THREE.ConeGeometry(2.4,5.0,6),mat(0xff9d5c,0.6,0.2)),0,2.5);
      for(let i=0;i<3;i++)add(new THREE.Mesh(new THREE.TorusGeometry(2.0-i*0.55,0.12,8,6),mat(0xffd0a0,0.4,0.4,0x553311,0.3)),0,1.2+i*1.3).rotation.x=Math.PI/2;
      const top=add(new THREE.Mesh(new THREE.SphereGeometry(0.7,16,12),glass(0xaaffff,0x224466)),0,5.4);
      g.userData.win=top;g.userData.peopleCount=5;g.userData.peopleR=2.8;
      lamps.push(add(makeLamp(2.8,0)),add(makeLamp(-2.6,1)),add(makeLamp(0,2.6)));break;}
    case'algae':{
      add(new THREE.Mesh(new THREE.CylinderGeometry(1.8,1.8,0.5,20),mat(0x2a6a40,0.3,0.1,0x0a3a1a,0.3)),0,0.3);
      const water=add(new THREE.Mesh(new THREE.CylinderGeometry(1.7,1.7,0.12,20),new THREE.MeshStandardMaterial({color:0x4fd17a,emissive:0x1a6a3a,emissiveIntensity:0.5,roughness:0.2})),0,0.56);
      g.userData.glow=water;break;}
    case'heater':{
      add(new THREE.Mesh(new THREE.CylinderGeometry(1.0,1.3,2.6,12),mat(0xaa5530,0.7,0.3)),0,1.3);
      add(new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.55,1.8,10),mat(0x884422)),0.35,3.0);
      const flame=add(new THREE.Mesh(new THREE.ConeGeometry(0.45,1.1,10),new THREE.MeshBasicMaterial({color:0xff7a3c})),0.35,4.2);
      g.userData.glow=flame;break;}
    case'mirror':{
      add(new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.14,3.4,8),mat(0x888)),0,1.7);
      const disc=add(new THREE.Mesh(new THREE.CircleGeometry(1.8,32),new THREE.MeshStandardMaterial({color:0xffffff,metalness:1,roughness:0.05,side:THREE.DoubleSide})),0,3.6);disc.rotation.x=-0.7;
      g.userData.spin=disc;break;}
    case'processor':{
      add(new THREE.Mesh(new THREE.BoxGeometry(2.4,2.8,2.4),mat(0xcc7a44,0.7,0.3)),0,1.4);
      for(let i=0;i<2;i++)add(new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,2.6,10),mat(0xaa5a2a)),(i-0.5)*1.1,3.0);
      const cap=add(new THREE.Mesh(new THREE.SphereGeometry(0.55,12,8),new THREE.MeshBasicMaterial({color:0xffaa55})),0.55,4.5);
      g.userData.glow=cap;break;}
  }
  g.userData.lamps=lamps;
  // Make the template clone-safe: tag animated parts by name, keep only primitive userData
  // (Object3D refs in userData would break clone()'s JSON copy.)
  const ud=g.userData,tag=(o,n)=>{if(o)o.name=n;};
  tag(ud.spin,'p_spin');tag(ud.glow,'p_glow');tag(ud.win,'p_win');tag(ud.arm,'p_arm');
  tag(ud.panel,'p_panel');tag(ud.rocket,'p_rocket');tag(ud.flame,'p_flame');
  if(ud.lamps)ud.lamps.forEach(l=>l.name='p_lamp');
  g.userData={__prim:{peopleCount:ud.peopleCount||0,peopleR:ud.peopleR||2}};
  g.traverse(o=>{if(o.isMesh){o.receiveShadow=true;o.castShadow=o.name!=='p_lamp';}});
  return g;
}

// Build each type once, then clone() instances (shared geometry + materials = low RAM)
const TEMPLATES={};
function getTemplate(key){return TEMPLATES[key]||(TEMPLATES[key]=makeTemplate(key));}
function makeBuildingMesh(key){
  const tpl=getTemplate(key),m=tpl.clone(true),ud=m.userData={};
  ud.spin=m.getObjectByName('p_spin');ud.glow=m.getObjectByName('p_glow');ud.win=m.getObjectByName('p_win');
  ud.arm=m.getObjectByName('p_arm');ud.panel=m.getObjectByName('p_panel');
  ud.rocket=m.getObjectByName('p_rocket');ud.flame=m.getObjectByName('p_flame');
  ud.lamps=[];m.traverse(o=>{if(o.name==='p_lamp')ud.lamps.push(o);});
  const prim=tpl.userData.__prim||{};ud.peopleCount=prim.peopleCount||0;ud.peopleR=prim.peopleR||2;
  return m;
}

/* ============================================================= *

// ---- Earth Habitat Shell (v5): an activatable pallet, not an automatic discount ----
function noHabitatYet(){return !G.buildings.some(o=>o.key==='habitat');}
// Treat the legacy v2–v4 `habitatDiscountUsed` flag as "shell used" so old saves stay consistent.
function habitatShellUsedFlag(){return !!(G.campaign&&(G.campaign.habitatShellUsed||G.campaign.habitatDiscountUsed));}
function habitatShellPresent(){return !!(G.campaign&&G.campaign.habitatShellReady)&&!habitatShellUsedFlag();}
function habitatShellActivatable(){return habitatShellPresent()&&!G.campaign.habitatShellActivated;}
// Discount applies only after the player unfolds the shell, and only while no Habitat exists yet (first dome).
function habitatDiscountActive(){return !!(G.campaign&&G.campaign.habitatShellActivated&&!habitatShellUsedFlag()&&noHabitatYet());}
function effCost(b){
  const m=G.bonus.buildCost||1;const o={};
  for(const[k,v]of Object.entries(b.cost))o[k]=Math.ceil(v*m);
  if(b===BUILDINGS.habitat&&habitatDiscountActive()){            // Earth habitat-shell kit: first dome is cheaper
    if(o.materials!=null)o.materials=Math.max(0,o.materials-40);
    if(o.credits!=null)o.credits=Math.max(0,o.credits-20);
  }
  return o;
}
function canAfford(cost){return Object.entries(cost).every(([k,v])=>G.res[k]>=v);}
function spend(cost){for(const[k,v]of Object.entries(cost))G.res[k]-=v;}
function biomeOK(key,gx,gz){const b=BUILDINGS[key];return !b.biomes||b.biomes.includes(biomeAt(gx,gz));}

function placeBuilding(key,gx,gz){
  const b=BUILDINGS[key];const cost=effCost(b);
  if(!canAfford(cost)){toast("Not enough resources",'bad');return false;}
  const isFirstHabitat=(b===BUILDINGS.habitat&&noHabitatYet());
  const usedHabitatShell=(isFirstHabitat&&habitatDiscountActive());   // discount only if unfolded first
  spend(cost);
  // The Earth habitat shell is spent on the FIRST Habitat — unfolded (discount) or not (forfeited). One-time.
  if(isFirstHabitat&&habitatShellPresent()){
    G.campaign.habitatShellUsed=true;G.campaign.habitatDiscountUsed=true;
    removeHabitatShellMarker();
    toast(usedHabitatShell?'🏠 Cape Helios habitat shell folded into the first dome — built at reduced cost.':'🏠 First dome raised; the staged habitat shell was never unfolded and is now spent.','disc');
    buildDock();save(true);
  }
  const dir=gridToDir(gx,gz);const pos=dir.clone().multiplyScalar(R+heightAt(dir));
  const mesh=makeBuildingMesh(key);mesh.position.copy(pos);orientToNormal(mesh,dir);mesh.scale.y=0.01;
  scene.add(mesh);
  const {t1,t2}=tangentBasis(dir.clone().normalize());
  const obj={key,gx,gz,mesh,anim:0,dir:dir.clone().normalize(),pos,t1,t2,people:[],builder:null,builderAng:0};
  // construction drone
  const drone=makeDrone();scene.add(drone);obj.builder=drone;
  // colonists for housing/social buildings
  const pc=mesh.userData.peopleCount||0,pr=mesh.userData.peopleR||2;
  for(let i=0;i<pc&&ambientColonists.length<80;i++){
    const c=makeColonist();scene.add(c);
    const p={obj,mesh:c,ang:Math.random()*6.28,speed:(0.4+Math.random()*0.5)*(Math.random()<0.5?1:-1),rad:pr*(0.6+Math.random()*0.4)};
    obj.people.push(p);ambientColonists.push(p);
  }
  G.buildings.push(obj);tileOccupied[idx(gx,gz)]=true;
  spawnPuff(pos,dir);beep(440,0.08);toast(`${b.name} — construction started`,'good');
  if(key==='spaceport')toast('🚀 Spaceport online — Earth supply & launches unlocked!','disc');
  return true;
}
function removeColonistsOf(obj){
  for(const p of obj.people){scene.remove(p.mesh);const i=ambientColonists.indexOf(p);if(i>=0)ambientColonists.splice(i,1);}
  obj.people.length=0;
}
function demolishAt(gx,gz){
  const i=G.buildings.findIndex(o=>o.gx===gx&&o.gz===gz);if(i<0)return;
  const o=G.buildings[i];const b=BUILDINGS[o.key];
  for(const[k,v]of Object.entries(b.cost))G.res[k]+=Math.floor(v*0.4);
  spawnPuff(o.pos,o.dir);scene.remove(o.mesh);
  if(o.builder)scene.remove(o.builder);removeColonistsOf(o);
  G.buildings.splice(i,1);tileOccupied[idx(gx,gz)]=false;
  beep(220,0.1);toast(`${b.name} demolished (40% refunded)`,'warn');
}
function onClick(e){
  if(G.over)return;
  // Earth habitat shell: pick the 3D pallet to unfold it. Ignore camera drags (mouse moved since press).
  if(!G.demolish){
    const moved=e?Math.hypot((e.clientX||0)-pickDownX,(e.clientY||0)-pickDownY):0;
    if(moved<6){
      if(habitatShellMarker&&habitatShellActivatable()){
        raycaster.setFromCamera(pointer,camera);
        if(raycaster.intersectObject(habitatShellMarker,true).length){activateHabitatShell();return;}
      }
      if(dronePatternMarker&&dronePatternActivatable()){
        raycaster.setFromCamera(pointer,camera);
        if(raycaster.intersectObject(dronePatternMarker,true).length){activateDronePattern();return;}
      }
    }
  }
  if(!hoveredTile)return;
  const {gx,gz}=hoveredTile;
  if(G.demolish){demolishAt(gx,gz);return;}
  if(!G.selected)return;
  if(tileOccupied[idx(gx,gz)]){toast("Tile already occupied",'bad');return;}
  if(!biomeOK(G.selected,gx,gz)){const b=BUILDINGS[G.selected];toast(`${b.name} needs: ${b.biomes.map(x=>BIOME_LABEL[x]).join(' or ')}`,'bad');return;}
  if(tileSlope(gx,gz)>3.2){toast("Ground too steep here",'bad');return;}
  placeBuilding(G.selected,gx,gz);
}

/* ---------- puffs ---------- */
const puffs=[],PUFF_MAX=10;
function disposePuff(pf){scene.remove(pf.pts);pf.pts.geometry.dispose();pf.pts.material.dispose();}
function spawnPuff(pos,dir){
  if(puffs.length>=PUFF_MAX)disposePuff(puffs.shift()); // cap simultaneous puffs
  const up=dir.clone().normalize();const {t1,t2}=tangentBasis(up);
  const n=16,geo=new THREE.BufferGeometry(),arr=[],vel=[];
  for(let i=0;i<n;i++){arr.push(pos.x,pos.y,pos.z);const a=Math.random()*6.28,sp=2+Math.random()*3;
    const dv=t1.clone().multiplyScalar(Math.cos(a)*sp).addScaledVector(t2,Math.sin(a)*sp).addScaledVector(up,1.5+Math.random()*2);
    vel.push(dv.x,dv.y,dv.z);}
  geo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:0xd98a4a,size:0.7,transparent:true,opacity:0.9,depthWrite:false}));
  scene.add(pts);puffs.push({pts,vel,up,life:1});
}

/* ============================================================= *
 *  ECONOMY                                                       *
 * ============================================================= */
function dayFactor(){return Math.max(0,Math.sin(G.todFrac*Math.PI*2-Math.PI/2));}
function caps(){const b=G.storeBonus||0;return {power:G.powerCap||100,oxygen:STORAGE_BASE.oxygen+b,water:STORAGE_BASE.water+b,food:STORAGE_BASE.food+b,materials:STORAGE_BASE.materials+b,science:Infinity,credits:Infinity};}

function computeRates(){
  const r={power:0,oxygen:0,water:0,food:0,materials:0,science:0,credits:0};
  let powerCap=100,storeBonus=0,popCap=0,moraleSupply=0;let tfRate={temp:0,oxygen:0,pressure:0};
  const storm=dustStormActive?1:0;
  const effMult=G.techDone.efficiency?0.75:1;
  const droneMult=G.techDone.drones?1.3:1;
  const moraleMult=THREE.MathUtils.clamp(0.6+G.morale/100*0.7,0.55,1.35);
  const discMult=G.bonus.prod||1;const df=dayFactor();
  let prodPower=0,usePower=0;
  for(const o of G.buildings){const b=BUILDINGS[o.key];
    if(b.powerCap)powerCap+=b.powerCap;if(b.storage)storeBonus+=b.storage;if(b.pop)popCap+=b.pop;if(b.morale)moraleSupply+=b.morale;
    if(b.power){if(b.power.day!==undefined)prodPower+=b.power.day*df*(storm?0.25:1);if(b.power.flat!==undefined)prodPower+=b.power.flat*(storm?1.3:1);}}
  for(const o of G.buildings){const b=BUILDINGS[o.key];if(b.use&&b.use.power)usePower+=b.use.power;}
  r.power=prodPower-usePower;
  const opMult=(prodPower>=usePower)?1:Math.max(0.15,usePower>0?prodPower/usePower:1);
  for(const o of G.buildings){const b=BUILDINGS[o.key];
    if(b.prod)for(const[k,v]of Object.entries(b.prod)){let amt=v*opMult*moraleMult*discMult;if(o.key==='extractor'||o.key==='mine')amt*=droneMult;r[k]+=amt;}
    if(b.use)for(const[k,v]of Object.entries(b.use)){if(k==='power')continue;let amt=v;if(b.pop)amt*=effMult;r[k]-=amt;}
    if(b.tf)for(const[k,v]of Object.entries(b.tf))tfRate[k]+=v*opMult;}
  r.credits+=G.colonies*6;r.science+=G.colonies*3;
  r.oxygen-=G.pop*0.4;r.water-=G.pop*0.3;r.food-=G.pop*0.5;
  let techMorale=(G.techDone.vr_earth?15:0)+(G.techDone.culture?20:0);
  let mt=45+moraleSupply-G.pop*0.4+techMorale+(G.moraleBonus||0);
  if(G.res.food<=0||G.res.oxygen<=0)mt-=45;
  G.moraleTarget=THREE.MathUtils.clamp(mt,0,100);
  G.rates=r;G.powerCap=powerCap;G.popCap=popCap;G.storeBonus=storeBonus;G.tfRate=tfRate;G.opMult=opMult;G.prodPower=prodPower;G.usePower=usePower;
  return r;
}
function tickEconomy(dtSol){
  computeRates();const c=caps();
  for(const k of Object.keys(G.res)){G.res[k]+=G.rates[k]*dtSol;G.res[k]=Math.min(G.res[k],c[k]);if(k!=='power')G.res[k]=Math.max(0,G.res[k]);}
  G.res.power=THREE.MathUtils.clamp(G.res.power,0,c.power);
  for(const k of Object.keys(G.tf))G.tf[k]=THREE.MathUtils.clamp(G.tf[k]+(G.tfRate[k]||0)*dtSol,0,100);
  G.morale+=(G.moraleTarget-G.morale)*Math.min(1,dtSol*0.5);G.morale=THREE.MathUtils.clamp(G.morale,0,100);
  const lifeOK=G.res.oxygen>0&&G.res.water>0&&G.res.food>0;
  const growth=THREE.MathUtils.clamp(G.morale/70,0.3,1.5)*(G.techDone.culture?1.3:1);
  if(lifeOK&&G.pop<G.popCap)G.pop+=0.6*growth*dtSol;
  else if(!lifeOK){G.pop-=1.2*dtSol;if(Math.random()<0.35*dtSol)toast("Colonists are suffering — fix life support!",'bad');}
  G.pop=Math.max(0,Math.min(G.pop,G.popCap));
  if(G.pop<0.5&&G.popCap>0&&!G.over)gameOver(false);
  if(G.bonusT>0){G.bonusT-=dtSol;if(G.bonusT<=0){G.bonus={};G.moraleBonus=0;}}
  updatePending(dtSol);
  checkMilestones();
  if(G.tf.temp>=100&&G.tf.oxygen>=100&&G.tf.pressure>=100&&!G.over)gameOver(true,'terraform');
  maybeEvent(dtSol);
}

/* ---------- pending Earth/colony missions ---------- */
function updatePending(dtSol){
  for(let i=G.pending.length-1;i>=0;i--){
    const p=G.pending[i];p.timer-=dtSol;
    if(p.timer<=0){
      if(p.type==='supply'){for(const[k,v]of Object.entries(p.payload))G.res[k]+=v;toast(`📦 Earth delivery arrived: ${Object.entries(p.payload).map(([k,v])=>'+'+v+' '+k).join(', ')}`,'good');}
      else if(p.type==='colony'){G.colonies++;toast(`🪐 New off-world colony established! (${G.colonies} total)`,'disc');launchAnySpaceport();}
      else if(p.type==='interstellar'){gameOver(true,'interstellar');}
      G.pending.splice(i,1);
    }
  }
}

  ()=>{G.bonus={prod:1.25};G.bonusT=6;return '⚙️ AI process optimisation: +25% production (6 sols)';},

function maybeEvent(dtSol){
  eventCooldown-=dtSol;if(eventCooldown>0)return;eventCooldown=7+Math.random()*7;

  else if(roll<0.46){ // meteor
    if(G.buildings.length>3){const o=G.buildings[(Math.random()*G.buildings.length)|0];spawnPuff(o.pos,o.dir);
      if(o.builder)scene.remove(o.builder);removeColonistsOf(o);scene.remove(o.mesh);G.buildings.splice(G.buildings.indexOf(o),1);tileOccupied[idx(o.gx,o.gz)]=false;
      toast(`☄️ Meteor strike destroyed a ${BUILDINGS[o.key].name}!`,'bad');beep(120,0.25);}
  } else { // positive discovery
    const msg=DISCOVERIES[(Math.random()*DISCOVERIES.length)|0]();toast(msg,'disc');beep(720,0.12);
  }
}

function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':Math.floor(n);}
function updateResBar(){
  const c=caps();
  for(const[k]of RES_DEF){
    $('#resv-'+k).textContent=fmt(G.res[k])+(c[k]!==Infinity?` / ${fmt(c[k])}`:'');
    const rate=G.rates[k]||0,rel=$('#resr-'+k);
    if(k==='power'){rel.textContent=`${Math.round(G.prodPower||0)}/${Math.round(G.usePower||0)} ⚡`;rel.className='r '+(G.prodPower>=G.usePower?'pos':'neg');}
    else{rel.textContent=(rate>=0?'+':'')+rate.toFixed(1);rel.className='r '+(rate>0?'pos':rate<0?'neg':'');}
    const low=k!=='science'&&k!=='credits'&&k!=='materials'&&G.res[k]<15&&rate<0;

// Build the dock DOM once, with persistent handlers (no rebuild on click → no flicker)
function buildDock(){
  let html='';
  for(const key of BUILD_ORDER){
    const b=BUILDINGS[key];
    const cost=Object.entries(effCost(b)).map(([k,v])=>`${v}${k[0].toUpperCase()}`).join(' ');
    html+=`<div class="bcard" data-key="${key}"><span class="lk">🔒</span>${ICONS[b.icon]||ICONS.materials}<div class="bn">${b.name}</div><div class="bc">${cost}</div></div>`;
  }
  dock.innerHTML=html;
  dock.querySelectorAll('.bcard').forEach(el=>{
    const key=el.dataset.key,b=BUILDINGS[key];
    el.onclick=()=>{
      const locked=b.tech&&!G.techDone[b.tech];
      if(locked){toast(`Research "${TECHS[b.tech].name}" first`,'warn');return;}
      G.demolish=false;G.selected=G.selected===key?null:key;refreshDock();updateTools();
      showHint(G.selected?`Click a tile on the planet to build ${b.name}. Esc to cancel.`:'');
    };
    el.onmouseenter=e=>showBuildTip(e,key);el.onmousemove=moveTip;el.onmouseleave=hideTip;
  });
  refreshDock();
}
// Lightweight state sync — only toggles classes on existing cards
function refreshDock(){
  dock.querySelectorAll('.bcard').forEach(el=>{
    const key=el.dataset.key,b=BUILDINGS[key];
    const locked=b.tech&&!G.techDone[b.tech];
    el.classList.toggle('sel',G.selected===key);
    el.classList.toggle('locked',locked);
    el.classList.toggle('unaff',!locked&&!canAfford(effCost(b)));
    const lk=el.querySelector('.lk');if(lk)lk.style.display=locked?'':'none';
  });
}
function showBuildTip(e,key){

  if(b.power)rows+=`<div class="row"><span>Power</span><b>+${b.power.day??b.power.flat}${b.power.day!==undefined?' (sun)':''}</b></div>`;

// ORION — calm, dry operations AI. Routes through the existing log feed, styled distinctly.
function orion(text){
  const el=document.createElement('div');el.className='logitem orion';
  const tag=document.createElement('span');tag.className='otag';tag.textContent='ORION';
  el.appendChild(tag);el.appendChild(document.createTextNode(text));
  logEl.prepend(el);while(logEl.children.length>6)logEl.lastChild.remove();
  setTimeout(()=>{el.style.transition='opacity .6s';el.style.opacity=0;setTimeout(()=>el.remove(),600);},8200);
  beep(540,0.08);
}

function evApply(d){

  if(d.tfOxygen)G.tf.oxygen=(G.tf.oxygen||0)+d.tfOxygen;
  if(d.tfTemp)G.tf.temp=(G.tf.temp||0)+d.tfTemp;

  $('#modal').classList.add('show');

  });

function maybeFireEvent(){
  if(G.over||G.paused||G.pop<=0)return;                       // events begin once the colony is crewed
  if($('#modal').classList.contains('show'))return;           // never stack over another modal
  if(!G.events)G.events={next:0,log:[]};
  if(!G.events.next){scheduleNextEvent();return;}
  if(G.sol<G.events.next)return;
  const seen=new Set(G.events.log);
  let pool=SOL_EVENTS.filter(e=>!seen.has(e.id));if(!pool.length){pool=SOL_EVENTS;G.events.log=[];}  // recycle once all seen
  showEvent(pool[Math.floor(Math.random()*pool.length)]);
}

// nearest extractor-valid (polar/lowland) tile to the colony — where the survey pack flagged ice
function findSurveyTile(){
  const ref=G.buildings[0];const c=(ref?ref.dir.clone():gridToDir(0,GRID/2)).normalize();
  let best=null,bestDot=-2;
  for(let gz=0;gz<GRID;gz++)for(let gx=0;gx<GRID;gx++){
    const bio=biomeAt(gx,gz);
    if((bio==='polar'||bio==='lowland')&&!tileOccupied[idx(gx,gz)]&&tileSlope(gx,gz)<=3.2){
      const d=gridToDir(gx,gz).dot(c); if(d>bestDot){bestDot=d;best={gx,gz};}
    }
  }
  return best;
}
// Visible cargo-kit markers + survey marker. Runs every session so continuity persists across reloads.
function spawnCargoKits(){
  if(cargoKitsSpawned)return; cargoKitsSpawned=true;
  const c=(G.earthCargo&&G.earthCargo.cargo)||{};   // only spawn markers for kits actually sent
  const ref=G.buildings[0];
  let pos,t1,t2,sdir;
  if(ref){pos=ref.pos.clone();t1=ref.t1.clone();t2=ref.t2.clone();sdir=ref.dir.clone().normalize();}
  else{sdir=gridToDir(0,GRID/2).normalize();pos=sdir.clone().multiplyScalar(R+heightAt(sdir));const tb=tangentBasis(sdir);t1=tb.t1;t2=tb.t2;}
  const box=(g,w,h,d,c,x,y,z,em,ei)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(c,0.85,0.15,em||0,ei||0.6));m.position.set(x,y,z);g.add(m);return m;};
  const siteAt=(a,b)=>{let s=pos.clone().addScaledVector(t1,a).addScaledVector(t2,b);const nd=s.clone().normalize();return{site:nd.clone().multiplyScalar(R+heightAt(nd)),nd};};
  const placeKit=(a,b,build)=>{                          // a/b = offsets along the two surface tangents
    const {site,nd}=siteAt(a,b);
    const g=new THREE.Group();g.position.copy(site);orientToNormal(g,nd);build(g);
    g.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});scene.add(g);return g;
  };
  // Power Kit Crate — battery pallet
  if(c.powerKit)placeKit(3.3,-1.6,g=>{box(g,1.7,0.6,1.2,0x4a4a52,0,0.3,0);for(let i=0;i<3;i++)box(g,0.36,0.7,0.9,0xffc24d,(i-1)*0.47,0.9,0,0x553300,0.5);});
  // Habitat Shell Pallet — folded dome shell; activatable until the first Habitat is built (v5)
  if(c.habitatShellKit&&!habitatShellUsedFlag()){
    habitatShellMarker=placeKit(3.7,1.3,g=>{
      box(g,2.0,0.5,1.6,0x7a4a30,0,0.25,0);
      const dome=new THREE.Mesh(new THREE.SphereGeometry(0.9,16,10,0,Math.PI*2,0,Math.PI*0.5),glass(0xffb888,0x224466));
      dome.scale.set(1,0.45,1);dome.position.y=0.5;g.add(dome);
      const ring=new THREE.Mesh(new THREE.RingGeometry(1.25,1.55,24),new THREE.MeshBasicMaterial({color:0x7fe0ff,transparent:true,opacity:0.5,side:THREE.DoubleSide}));
      ring.rotation.x=-Math.PI/2;ring.position.y=0.07;g.add(ring);
      g.userData={dome,ring};
    });
    applyHabitatShellVisual();   // folded+pulsing if fresh, unfolded if a prior session already activated it
  }
  // Drone Pattern Core — activatable (v6): tap it to fabricate one helper drone that stabilises the cargo pad
  if(c.constructionDronePattern){
    droneCoreSite=siteAt(1.1,2.7).site;
    const pd=siteAt(2.7,1.2);dronePadSite=pd.site;dronePadNormal=pd.nd;
    if(droneJobDone()){buildDronePad();}                 // reload after the job finished — show the pad result only
    else{
      dronePatternMarker=placeKit(1.1,2.7,g=>{
        box(g,1.2,1.0,1.2,0x33414e,0,0.5,0);
        const core=new THREE.Mesh(new THREE.IcosahedronGeometry(0.34,0),mat(0x0a2630,0.3,0.4,0x2f8fb0,1.3));core.position.y=1.15;g.add(core);
        const ring=new THREE.Mesh(new THREE.RingGeometry(1.05,1.32,24),new THREE.MeshBasicMaterial({color:0x2fd0e6,transparent:true,opacity:0.5,side:THREE.DoubleSide}));ring.rotation.x=-Math.PI/2;ring.position.y=0.06;g.add(ring);
        g.userData={core,ring};
      });
      applyDronePatternVisual();
      if(G.campaign.dronePatternActivated)restoreDroneJob();  // reload mid-job → re-run to completion (reward guarded)
    }
  }
  // Water Survey Marker — at the flagged ice tile (only if the survey kit was sent)
  if(c.waterSurvey){
    surveyTile=findSurveyTile();
    if(surveyTile){
      const sd=gridToDir(surveyTile.gx,surveyTile.gz);const sp=sd.clone().multiplyScalar(R+heightAt(sd));
      const g=new THREE.Group();g.position.copy(sp);orientToNormal(g,sd);
      const ring=new THREE.Mesh(new THREE.RingGeometry(1.1,1.4,20),new THREE.MeshBasicMaterial({color:0x66c8ff,transparent:true,opacity:0.5,side:THREE.DoubleSide}));ring.rotation.x=-Math.PI/2;ring.position.y=0.06;g.add(ring);
      const mast=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.09,2.0,8),mat(0x8a929c,0.6,0.5));mast.position.y=1.0;g.add(mast);
      const flag=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.4,0.04),mat(0x66c8ff,0.5,0.3,0x224a66,0.7));flag.position.set(0.42,1.7,0);g.add(flag);
      g.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});scene.add(g);
      // survey pack improves the early water-objective hint (re-applied each session so reload keeps it)
      const w=OBJECTIVES.find(o=>o.id==='water');if(w)w.hint='A Cape Helios survey marker flags a shallow ice seam — build the Ice Extractor on the marked tile.';
    }
  }
}

function buildDronePad(){                                   // the visible completed result — a reinforced cargo pad

  const g=new THREE.Group();g.position.copy(dronePadSite);orientToNormal(g,dronePadNormal||dronePadSite.clone().normalize());
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(1.15,1.28,0.14,20),mat(0x4a5560,0.7,0.4)));
  const ring=new THREE.Mesh(new THREE.RingGeometry(0.9,1.12,24),new THREE.MeshBasicMaterial({color:0x2fd0e6,transparent:true,opacity:0.6,side:THREE.DoubleSide}));ring.rotation.x=-Math.PI/2;ring.position.y=0.1;g.add(ring);
  for(let i=0;i<4;i++){const a=i/4*Math.PI*2;const post=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,0.7,6),mat(0x8a929c,0.6,0.5));post.position.set(Math.cos(a)*1.02,0.35,Math.sin(a)*1.02);g.add(post);}
  g.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});
  scene.add(g);dronePadMesh=g;
}
function activateDronePattern(){
  if(!dronePatternActivatable())return;
  G.campaign.dronePatternActivated=true;
  applyDronePatternVisual();
  droneHelper=makeDrone();scene.add(droneHelper);
  droneJob={phase:'move',t:0};
  toast('🤖 Helper drone fabricated — dispatching to the cargo pad.','disc');
  beep(600,0.1);
  orion('Construction pattern accepted. I have fabricated one helper drone. Try not to assign it philosophy.');
  save(true);
}
function restoreDroneJob(){if(droneJobDone())return;droneHelper=makeDrone();scene.add(droneHelper);droneJob={phase:'move',t:0};}
function tickDroneJob(dt,time){
  if(!droneJob||!droneHelper||!droneCoreSite||!dronePadSite)return;
  const j=droneJob,up=dronePadNormal||dronePadSite.clone().normalize();
  if(j.phase==='move'){
    j.t+=dt/2.0;const k=Math.min(1,j.t);
    droneHelper.position.copy(droneCoreSite.clone().lerp(dronePadSite,k)).addScaledVector(up,1.2+Math.sin(time*4)*0.15);
    orientToNormal(droneHelper,up);
    if(k>=1){j.phase='work';j.t=0;}
  }else if(j.phase==='work'){
    j.t+=dt;
    droneHelper.position.copy(dronePadSite).addScaledVector(up,0.85+Math.abs(Math.sin(time*8))*0.15);
    const sp=droneHelper.userData.spark;if(sp)sp.visible=Math.sin(time*30)>0;
    if(j.t>=2.6)completeDroneJob();
  }
}
function completeDroneJob(){
  buildDronePad();
  if(droneHelper){scene.remove(droneHelper);droneHelper=null;}
  droneJob=null;
  if(!G.campaign.droneHelperJobDone){                       // grant the one-time reward exactly once
    G.campaign.droneHelperJobDone=true;G.res.materials+=20;updateResBar();
    toast('🤖 Cargo pad stabilised — +20 materials recovered.','disc');
    orion('Cargo pad reinforced. The drone performed admirably and asked for nothing. Unlike the crew.');
  }
  if(dronePatternMarker){scene.remove(dronePatternMarker);dronePatternMarker=null;}   // core is spent
  save(true);
}

function save(silent){const data={res:G.res,pop:G.pop,morale:G.morale,colonies:G.colonies,tf:G.tf,sol:G.sol,todFrac:G.todFrac,techDone:G.techDone,milestones:G.milestones,interstellar:G.interstellar,mission:G.mission,story:G.story,campaign:G.campaign,events:G.events,buildings:G.buildings.map(o=>({key:o.key,gx:o.gx,gz:o.gz}))};
  localStorage.setItem(SAVE_KEY,JSON.stringify(data));if(!silent)toast('💾 Colony saved','good');}
function load(){
  try{const d=JSON.parse(localStorage.getItem(SAVE_KEY));if(!d)return false;
    Object.assign(G.res,d.res);G.pop=d.pop;G.morale=d.morale??62;G.colonies=d.colonies||0;Object.assign(G.tf,d.tf);
    G.sol=d.sol;G.todFrac=d.todFrac;G.techDone=d.techDone||{};G.milestones=d.milestones||{};G.interstellar=d.interstellar||false;
    // campaign state — safe defaults so older saves (pre-Iteration-1) still load
    G.mission=(d.mission&&typeof d.mission.idx==='number')?d.mission:{idx:0};G.story=d.story||{};G.campaign=d.campaign||{};
    G.events=(d.events&&Array.isArray(d.events.log))?d.events:{next:0,log:[]};   // Sol Events (safe default for old saves)
    for(const b of d.buildings){if(!inGrid(b.gx,b.gz))continue;
      const dir=gridToDir(b.gx,b.gz).normalize();const pos=dir.clone().multiplyScalar(R+heightAt(dir));
      const mesh=makeBuildingMesh(b.key);mesh.position.copy(pos);orientToNormal(mesh,dir);scene.add(mesh);
      const {t1,t2}=tangentBasis(dir);
      const obj={key:b.key,gx:b.gx,gz:b.gz,mesh,anim:1,dir,pos,t1,t2,people:[],builder:null,builderAng:0};
      const pc=mesh.userData.peopleCount||0,pr=mesh.userData.peopleR||2;
      for(let i=0;i<pc&&ambientColonists.length<80;i++){const c=makeColonist();scene.add(c);const p={obj,mesh:c,ang:Math.random()*6.28,speed:(0.4+Math.random()*0.5)*(Math.random()<0.5?1:-1),rad:pr*(0.6+Math.random()*0.4)};obj.people.push(p);ambientColonists.push(p);}
      G.buildings.push(obj);tileOccupied[idx(b.gx,b.gz)]=true;}
    return true;
  }catch(e){console.warn('load failed',e);return false;}
}

/* ============================================================= *
 *  MAIN LOOP                                                     *
 * ============================================================= */
let saveAccum=0,autoLaunch=14;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const speed=G.paused?0:G.speed;const dtGame=dt*speed;

  if(dtGame>0){
    G.todFrac+=dtGame/SOL_SECONDS;
    while(G.todFrac>=1){G.todFrac-=1;G.sol++;toast(`☀️ Sol ${G.sol} begins`,'');maybeFireEvent();}
    tickEconomy(dtGame/SOL_SECONDS);
    saveAccum+=dt;if(saveAccum>20){saveAccum=0;save();}
    autoLaunch-=dtGame;if(autoLaunch<=0){autoLaunch=18+Math.random()*16;launchAnySpaceport();}
  }

  const t=performance.now()*0.001;
  const dl=dayFactor();const nightF=1-dl;

  // sun orbit (lights one hemisphere; terminator sweeps)
  const ang=G.todFrac*Math.PI*2-Math.PI/2;
  sun.position.set(Math.cos(ang)*R*4,R*1.0,Math.sin(ang)*R*4);
  sun.intensity=2.4*(dustStormActive?0.5:1);
  if(atmMesh){const s=dustStormActive?1.9:1.0;atmMesh.material.uniforms.strength.value=s;if(atmMesh2)atmMesh2.material.uniforms.strength.value=s*(0.85+dl*0.3);}
  // steady stars (no whole-sky flicker) + cinematic exposure that dips toward the night side
  if(starField)starField.material.opacity=0.82+dl*0.10;
  renderer.toneMappingExposure=1.02+dl*0.20-(dustStormActive?0.12:0);

  updateTerraform();

  // moons
  phobos.position.set(Math.cos(t*0.18)*R*2.4,Math.sin(t*0.18)*R*0.5,Math.sin(t*0.18)*R*2.4);
  deimos.position.set(Math.cos(-t*0.1+2)*R*3.0,R*0.9,Math.sin(-t*0.1+2)*R*2.7);
  phobos.rotation.y=t*0.3;deimos.rotation.y=-t*0.2;

  // dust storm
  if(dustStormActive){dustStormT+=dt;
    const intensity=Math.min(1,dustStormT/3)*(dustStormT>14?Math.max(0,1-(dustStormT-14)/4):1);
    dustParticles[0].material.opacity=intensity*0.5;dustParticles[0].rotation.y+=dt*0.3;
    if(dustStormT>18){dustStormActive=false;dustParticles[0].material.opacity=0;toast('🌤️ The dust storm has passed','good');}}

  // precompute shared (per-frame-global) emissive levels once — materials are shared across instances
  const glowI=0.4+Math.sin(t*3)*0.25, winI=0.12+nightF*0.7, lampI=nightF*1.2, panelI=dl*0.4;

  // buildings: construction, robots, spinners, glow, lights
  for(const o of G.buildings){
    if(o.anim<1){
      o.anim=Math.min(1,o.anim+dt*0.4); // ~2.5s build
      o.mesh.scale.y=1-Math.pow(1-o.anim,3);
      if(o.builder){o.builderAng+=dt*2.2;const r=TILE*0.5;
        _v1.copy(o.t1).multiplyScalar(Math.cos(o.builderAng)*r).addScaledVector(o.t2,Math.sin(o.builderAng)*r).addScaledVector(o.dir,1.4+Math.sin(t*4)*0.3);
        o.builder.position.copy(o.pos).add(_v1);orientToNormal(o.builder,o.dir);
        const sp=o.builder.userData.spark;if(sp){sp.visible=Math.sin(t*30)>0;sp.material.color.setHex(((t*7)|0)%2?0xfff0b0:0xff9a4a);}
      }
    } else if(o.builder){scene.remove(o.builder);o.builder=null;spawnPuff(o.pos,o.dir);}

    const ud=o.mesh.userData;
    if(ud.spin){const axis=ud.spin.userData&&ud.spin.userData.axis==='y'?'y':'z';const spd=(dustStormActive&&o.key==='wind')?7:1.6;ud.spin.rotation[axis]+=dt*spd;}
    if(ud.arm)ud.arm.rotation.x=-0.6+Math.sin(t*2+o.gx)*0.25;
    if(ud.glow&&ud.glow.material.emissive)ud.glow.material.emissiveIntensity=glowI;
    if(ud.win)ud.win.material.emissiveIntensity=winI;
    if(ud.lamps)for(const l of ud.lamps)l.material.emissiveIntensity=lampI;
    if(ud.panel)ud.panel.material.emissiveIntensity=panelI;

    // spaceport rocket launch animation
    if(o.key==='spaceport'&&o.launchT!==undefined&&o.anim>=1){
      o.launchT+=dt;const rk=ud.rocket,fl=ud.flame;
      if(rk){
        if(o.launchT<3.2){rk.position.y=0.4+Math.pow(o.launchT/3.2,2)*46;if(fl){fl.visible=true;fl.scale.y=1+Math.sin(t*40)*0.3;}
          if(Math.random()<0.4)spawnPuff(_v1.copy(o.pos).addScaledVector(o.dir,0.5),o.dir);}
        else {o.launchT=o.launchT<6?o.launchT:undefined;rk.position.y=0.4;if(fl)fl.visible=false;}
      }
    }
  }

  // colonists walk around their building (LOD: skip & hide when zoomed far out)
  const showPeople=cam.radius<R*3.0;
  for(const p of ambientColonists){
    const o=p.obj;
    if(o.anim<1||!showPeople){if(p.mesh.visible)p.mesh.visible=false;continue;}
    if(!p.mesh.visible)p.mesh.visible=true;
    p.ang+=p.speed*dt;
    _v1.copy(o.t1).multiplyScalar(Math.cos(p.ang)*p.rad).addScaledVector(o.t2,Math.sin(p.ang)*p.rad);
    p.mesh.position.copy(o.pos).add(_v1).addScaledVector(o.dir,0.05+Math.abs(Math.sin(t*6+p.ang))*0.05);
    _v2.copy(o.t1).multiplyScalar(-Math.sin(p.ang)).addScaledVector(o.t2,Math.cos(p.ang)*Math.sign(p.speed));
    _m4.lookAt(_ORIGIN,_v2,o.dir);p.mesh.quaternion.setFromRotationMatrix(_m4);
  }

  // puffs
  for(let i=puffs.length-1;i>=0;i--){const pf=puffs[i];pf.life-=dt*1.3;const p=pf.pts.geometry.attributes.position;
    for(let j=0;j<p.count;j++){p.setXYZ(j,p.getX(j)+pf.vel[j*3]*dt,p.getY(j)+pf.vel[j*3+1]*dt,p.getZ(j)+pf.vel[j*3+2]*dt);
      pf.vel[j*3]-=pf.up.x*dt*4;pf.vel[j*3+1]-=pf.up.y*dt*4;pf.vel[j*3+2]-=pf.up.z*dt*4;}
    p.needsUpdate=true;pf.pts.material.opacity=Math.max(0,pf.life);if(pf.life<=0){disposePuff(pf);puffs.splice(i,1);}}

  updateCursor();
  if(habitatShellMarker&&habitatShellMarker.userData.ring&&habitatShellActivatable())habitatShellMarker.userData.ring.material.opacity=0.35+Math.sin(t*4)*0.25;
  if(dronePatternMarker){const ud=dronePatternMarker.userData;if(ud.core)ud.core.rotation.y+=dt*0.8;if(ud.ring&&dronePatternActivatable())ud.ring.material.opacity=0.35+Math.sin(t*4)*0.25;}
  tickDroneJob(dt,t);
  starField.rotation.y=t*0.004;
  renderer.render(scene,camera);
}

function updateCursor(){
  if(!G.selected&&!G.demolish){cursor.visible=false;hoveredTile=null;return;}
  raycaster.setFromCamera(pointer,camera);
  const hit=raycaster.intersectObject(terrain)[0];
  if(!hit){cursor.visible=false;hoveredTile=null;return;}
  const {gx,gz}=dirToGrid(hit.point);
  if(!inGrid(gx,gz)){cursor.visible=false;hoveredTile=null;return;}
  hoveredTile={gx,gz};
  const cdir=gridToDir(gx,gz);
  cursor.position.copy(cdir.clone().multiplyScalar(R+heightAt(cdir)+0.15));orientToNormal(cursor,cdir);cursor.visible=true;
  let ok;
  if(G.demolish)ok=tileOccupied[idx(gx,gz)];
  else ok=!tileOccupied[idx(gx,gz)]&&biomeOK(G.selected,gx,gz)&&tileSlope(gx,gz)<=3.2&&canAfford(effCost(BUILDINGS[G.selected]));
  const col=G.demolish?(ok?0xff6b6b:0x888888):(ok?0x7fe08a:0xff6b6b);
  cursor.userData.ring.material.color.setHex(col);cursor.userData.box.material.color.setHex(col);
}

/* ============================================================= *
 *  BOOT                                                          *
 * ============================================================= */
function bindTools(){
  $('#tInfo').onclick=()=>openSide('info');
  $('#tMission').onclick=()=>openSide('missions');
  $('#mtrack').onclick=()=>openSide('missions');
  $('#tTech').onclick=()=>openSide('tech');
  $('#tEvo').onclick=()=>openSide('evo');
  $('#tShop').onclick=()=>openSide('shop');
  $('#tSave').onclick=()=>save();
  $('#tHelp').onclick=()=>openSide('help');
  $('#tDemo').onclick=()=>{G.demolish=!G.demolish;if(G.demolish)G.selected=null;refreshDock();updateTools();showHint(G.demolish?'Demolish mode: click a building to remove it (40% refund).':'');};
}
function boot(){let pct=0;const lbar=$('#lbar');const iv=setInterval(()=>{pct=Math.min(100,pct+12+Math.random()*18);lbar.style.width=pct+'%';if(pct>=100){clearInterval(iv);start();}},90);}
function start(){
  initScene();buildResBar();bindTools();
  const loaded=load();
  // Campaign spine: detect an authorised Earth cargo package (optional; Mars stays standalone without it)
  let ep=null;try{ep=JSON.parse(localStorage.getItem('rf_campaign_v1'));}catch(e){}
  G.earthCargo=(ep&&ep.earthComplete)?ep:null;
  if(!loaded){
    // Robotic prep only: the cargo missions left a single Solar Array online.
    // No crew shelter yet — the player builds the first Habitat to settle the crew.
    for(let gz=GRID/2-3,placed=0;gz<GRID/2+3&&!placed;gz++)for(let gx=0;gx<GRID&&!placed;gx++){
      if(biomeAt(gx,gz)==='plains'&&tileSlope(gx,gz)<2&&!tileOccupied[idx(gx,gz)]){
        placeBuilding('solar',gx,gz);placed=1;
      }
    }
    G.buildings.forEach(o=>{o.anim=1;o.mesh.scale.y=1;if(o.builder){scene.remove(o.builder);o.builder=null;}});
    toast('Robotic landers have prepped the site. Get life support online, then build the first Habitat to bring the crew down.','good');
  }
  // frame camera on the colony
  const aim=(G.buildings[0]?G.buildings[0].dir:gridToDir(0,GRID/2)).clone().normalize();
  cam.phi=Math.acos(THREE.MathUtils.clamp(aim.y,-1,1));cam.theta=Math.atan2(aim.z,aim.x);updateCamera();
  buildDock();computeRates();updateResBar();
  reconcileCampaignSilent(); // sync objectives/story to the current colony (starter buildings or loaded save) silently
  if(G.earthCargo)applyEarthCargo(); // Earth→Mars continuity: cache marker (always) + one-time bonus & ORION beat
  setTimeout(()=>{const l=$('#loader');l.style.opacity=0;setTimeout(()=>l.remove(),600);$('#hud').style.display='flex';$('#leftcol').style.display='flex';$('#mtrack').classList.add('show');},250);
  setInterval(()=>{if(!G.over){updateResBar();refreshDock();updateCampaign();if(sidePanel==='info')renderInfo();}},400);
  animate();
  const freshIntro=!loaded&&!localStorage.getItem('rf_campaign_intro');
  if(freshIntro)setTimeout(()=>showIntro(false),650);
  else if(!loaded&&!localStorage.getItem('rf_tut_done'))setTimeout(startTutorial,700);
  else if(!loaded)setTimeout(()=>showHint('Pick a building below, then click a tile. Drag to spin the globe. Press ❔ for help.'),900);
}
boot();
</script>
