<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Red Frontier — Mars Colony</title>
<style>
  :root{
    --bg:#0a0604; --panel:rgba(24,14,10,0.88); --panel-2:rgba(34,20,14,0.94);
    --line:rgba(255,150,90,0.22); --ink:#ffe9da; --muted:#c99c83;
    --rust:#ff7a3c; --rust-2:#ffb066; --good:#7fe08a; --warn:#ffd166; --bad:#ff6b6b;
    --sci:#8fd4ff; --joy:#ffcaa0; --shadow:0 18px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:"Inter","Segoe UI",system-ui,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  canvas{display:block}
  #app{position:fixed;inset:0}

  #loader{position:fixed;inset:0;z-index:50;display:grid;place-items:center;
    background:radial-gradient(circle at 50% 30%,#3a1606,#0a0604 70%);transition:opacity .6s;}
  #loader .lwrap{text-align:center}
  #loader h1{font-size:clamp(28px,6vw,64px);margin:0;letter-spacing:.18em;
    background:linear-gradient(90deg,var(--rust),var(--rust-2));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(255,120,60,.35);font-weight:800;}
  #loader p{color:var(--muted);letter-spacing:.35em;margin:.4em 0 1.4em;font-size:13px;text-transform:uppercase}
  .bar{width:min(360px,70vw);height:6px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;margin:0 auto}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rust),var(--rust-2));transition:width .3s}

  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column;justify-content:space-between}
  .topbar{pointer-events:auto;display:flex;gap:7px;flex-wrap:wrap;align-items:center;padding:10px 12px;
    background:linear-gradient(180deg,rgba(10,6,4,.85),rgba(10,6,4,0));}
  .res{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--line);border-radius:11px;
    background:var(--panel);backdrop-filter:blur(8px);font-variant-numeric:tabular-nums;min-width:0}
  .res .ic{width:17px;height:17px;flex:0 0 auto}
  .res .v{font-weight:700;font-size:13.5px}
  .res .r{font-size:10.5px;color:var(--muted)}
  .res .r.pos{color:var(--good)}.res .r.neg{color:var(--bad)}
  .res.alert{animation:pulseBad 1s infinite}
  @keyframes pulseBad{0%,100%{border-color:var(--line)}50%{border-color:var(--bad)}}
  .spacer{flex:1}
  .clock{display:flex;align-items:center;gap:10px;padding:5px 12px;border:1px solid var(--line);border-radius:11px;background:var(--panel);backdrop-filter:blur(8px)}
  .clock .sol{font-weight:800;font-size:15px}
  .clock .tod{font-size:11px;color:var(--muted);width:70px}
  .speed{display:flex;gap:4px}
  .speed button{pointer-events:auto;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
    width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:.15s}
  .speed button:hover{border-color:var(--rust)}
  .speed button.on{background:var(--rust);color:#1a0a04;border-color:var(--rust)}

  .dock{pointer-events:auto;align-self:center;margin-bottom:14px;display:flex;gap:7px;padding:10px;
    border:1px solid var(--line);border-radius:16px;background:var(--panel);backdrop-filter:blur(10px);box-shadow:var(--shadow);
    max-width:min(97vw,1240px);overflow-x:auto;scrollbar-width:thin}
  .bcard{position:relative;width:80px;flex:0 0 auto;border:1px solid transparent;border-radius:12px;padding:8px 6px 7px;
    background:rgba(255,255,255,.03);cursor:pointer;text-align:center;transition:.16s;user-select:none}
  .bcard:hover{background:rgba(255,150,90,.12);border-color:var(--line);transform:translateY(-3px)}
  .bcard.sel{border-color:var(--rust);background:rgba(255,122,60,.18);box-shadow:0 0 0 1px var(--rust) inset}
  .bcard.locked{opacity:.4;cursor:not-allowed;filter:grayscale(.6)}
  .bcard.unaff{opacity:.62}
  .bcard svg{width:36px!important;height:36px!important;margin:0 auto 4px;display:block;flex:0 0 auto}
  .bcard .bn{font-size:10.5px;line-height:1.15;color:var(--ink);font-weight:600}
  .bcard .bc{font-size:9.5px;color:var(--muted);margin-top:2px}
  .bcard .lk{position:absolute;top:4px;right:5px;font-size:11px}

  .leftcol{position:fixed;left:12px;top:92px;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .tool{pointer-events:auto;width:42px;height:42px;border:1px solid var(--line);border-radius:11px;background:var(--panel);
    color:var(--ink);cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(8px);transition:.15s;font-size:18px}
  .tool:hover{border-color:var(--rust);background:var(--panel-2)}
  .tool.on{background:var(--rust);color:#1a0a04}

  .side{position:fixed;right:12px;top:92px;width:min(360px,88vw);max-height:calc(100vh - 200px);overflow:auto;
    border:1px solid var(--line);border-radius:14px;background:var(--panel);backdrop-filter:blur(10px);box-shadow:var(--shadow);
    pointer-events:auto;padding:14px;transform:translateX(125%);transition:transform .35s cubic-bezier(.2,.8,.2,1);scrollbar-width:thin}
  .side.open{transform:none}
  .side h3{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px}
  .side .close{margin-left:auto;cursor:pointer;color:var(--muted);font-size:18px;line-height:1}
  .side .sub{color:var(--muted);font-size:12px;margin:0 0 12px}
  .stat{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px dashed rgba(255,255,255,.07)}
  .stat b{font-weight:700}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--ink);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;width:100%}
  .btn:hover{border-color:var(--rust)}
  .btn.danger:hover{border-color:var(--bad);color:var(--bad)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .tech{border:1px solid var(--line);border-radius:11px;padding:10px;margin-bottom:9px;background:rgba(255,255,255,.02)}
  .tech.done{border-color:rgba(127,224,138,.4);background:rgba(127,224,138,.06)}
  .tech h4{margin:0 0 3px;font-size:13.5px;display:flex;align-items:center;gap:6px}
  .tech p{margin:0 0 8px;font-size:11.5px;color:var(--muted);line-height:1.4}
  .tech .cost{font-size:11px;color:var(--sci);font-weight:700}
  .branchTag{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted)}

  .mile{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,.07)}
  .mile .dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;font-size:13px;
    border:1px solid var(--line);background:rgba(255,255,255,.04)}
  .mile.done .dot{background:linear-gradient(135deg,var(--rust),var(--rust-2));color:#1a0a04;border-color:transparent}
  .mile .mt{font-size:12.5px;font-weight:600}
  .mile .md{font-size:11px;color:var(--muted);line-height:1.4}
  .order{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:7px;font-size:12px}
  .order .ob{flex:0 0 auto;width:auto;padding:6px 11px}

  #tip{position:fixed;z-index:30;max-width:240px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    background:var(--panel-2);backdrop-filter:blur(8px);font-size:12px;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:var(--shadow)}
  #tip h5{margin:0 0 4px;font-size:13px;color:var(--rust-2)}
  #tip .row{display:flex;justify-content:space-between;gap:14px;color:var(--muted);line-height:1.5}
  #tip .row b{color:var(--ink)}
  #tip .desc{color:var(--muted);margin-top:6px;font-style:italic;line-height:1.4}
  #tip .biomes{margin-top:6px;font-size:11px;color:var(--rust-2)}

  #log{position:fixed;left:12px;bottom:14px;width:min(340px,72vw);pointer-events:none;display:flex;flex-direction:column;gap:5px}
  .logitem{font-size:12px;padding:7px 11px;border-radius:9px;background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(6px);animation:slideIn .35s;opacity:.96}
  .logitem.good{border-color:rgba(127,224,138,.35)}
  .logitem.warn{border-color:rgba(255,209,102,.4)}
  .logitem.bad{border-color:rgba(255,107,107,.45)}
  .logitem.disc{border-color:rgba(143,212,255,.5)}
  @keyframes slideIn{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:.96}}

  #modal{position:fixed;inset:0;z-index:40;display:none;place-items:center;background:rgba(5,3,2,.72);backdrop-filter:blur(4px)}
  #modal.show{display:grid}
  .mcard{width:min(500px,92vw);border:1px solid var(--line);border-radius:18px;background:var(--panel-2);
    box-shadow:var(--shadow);padding:26px;text-align:center;animation:pop .35s}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .mcard .emoji{font-size:46px}
  .mcard h2{margin:8px 0 6px;font-size:24px}
  .mcard p{color:var(--muted);font-size:13.5px;line-height:1.6;margin:0 0 18px}
  .mcard .mbtns{display:flex;gap:10px}

  .hint{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);pointer-events:none;
    font-size:12px;color:var(--muted);background:var(--panel);border:1px solid var(--line);
    padding:6px 14px;border-radius:20px;backdrop-filter:blur(6px);opacity:0;transition:opacity .3s;text-align:center;max-width:90vw}
  .hint.show{opacity:1}

  /* ===== Tutorial ===== */
  #tut{position:fixed;left:50%;bottom:120px;transform:translateX(-50%);z-index:46;width:min(400px,93vw);
    border:1px solid var(--rust);border-radius:14px;background:var(--panel-2);box-shadow:var(--shadow);
    padding:16px 18px;display:none;pointer-events:auto;backdrop-filter:blur(10px)}
  #tut.show{display:block;animation:pop .3s}
  #tut h4{margin:0 0 6px;font-size:15px;color:var(--rust-2)}
  #tut p{margin:0 0 13px;font-size:12.5px;color:var(--ink);line-height:1.55}
  #tut .tb{display:flex;justify-content:space-between;align-items:center;gap:10px}
  #tut .dots{display:flex;gap:5px}
  #tut .dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:.2s}
  #tut .dots i.on{background:var(--rust);transform:scale(1.2)}
  #tut .tbtns{display:flex;gap:8px}
  #tut button{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;
    padding:7px 14px;cursor:pointer;font-size:12.5px;font-weight:700;transition:.15s}
  #tut button.skip{color:var(--muted);font-weight:600}
  #tut button.next{background:var(--rust);color:#1a0a04;border-color:var(--rust)}
  #tut button:hover{filter:brightness(1.08)}
  .tut-hl{outline:3px solid var(--rust)!important;outline-offset:4px;border-radius:14px;
    animation:tutPulse 1.2s infinite;position:relative;z-index:20}
  @keyframes tutPulse{0%,100%{outline-color:rgba(255,122,60,.95)}50%{outline-color:rgba(255,122,60,.28)}}

  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(255,150,90,.3);border-radius:8px}
</style>

<script type="module">
import * as THREE from 'three';

/* ============================================================= *
 *  RED FRONTIER — 3D Mars colonization strategy (single file)    *
 * ============================================================= */

/* ---------- value noise ---------- */
function makeNoise(seed){
  const p=new Uint8Array(512);let s=seed>>>0;
  const rnd=()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};
  const perm=[...Array(256).keys()];
  for(let i=255;i>0;i--){const j=(rnd()*(i+1))|0;[perm[i],perm[j]]=[perm[j],perm[i]];}
  for(let i=0;i<512;i++)p[i]=perm[i&255];
  const fade=t=>t*t*t*(t*(t*6-15)+10);
  const lerp=(a,b,t)=>a+(b-a)*t;
  const grad=(h,x,y)=>{const u=(h&1)?x:-x,v=(h&2)?y:-y;return u+v;};
  return (x,y)=>{
    const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);
    const u=fade(x),v=fade(y);const A=p[X]+Y,B=p[X+1]+Y;
    return lerp(lerp(grad(p[A],x,y),grad(p[B],x-1,y),u),lerp(grad(p[A+1],x,y-1),grad(p[B+1],x-1,y-1),u),v);
  };
}
function fbm(n,x,y,oct=4){let v=0,a=.5,f=1;for(let i=0;i<oct;i++){v+=a*n(x*f,y*f);f*=2;a*=.5;}return v;}

/* ============================================================= *
 *  CONFIG                                                        *
 * ============================================================= */
const GRID=44;                  // lon columns & lat rows
const R=70;                     // planet radius (bigger!)
const TILE=4.0;                 // building footprint scale
const SOL_SECONDS=10;
const STORAGE_BASE={oxygen:240,water:240,food:240,materials:360,science:99999,credits:99999};
const SAVE_KEY='redfrontier3';
const noiseH=makeNoise(13577);
const UP=new THREE.Vector3(0,1,0);

function noise3(x,y,z){return (fbm(noiseH,x+11,y-7,4)+fbm(noiseH,y+5,z+3,4)+fbm(noiseH,z-9,x+2,4))/3;}
function heightAt(dir){
  const f=2.0;
  const n=noise3(dir.x*f,dir.y*f,dir.z*f);
  const ridge=Math.abs(noise3(dir.x*f*2.4+3,dir.y*f*2.4,dir.z*f*2.4));
  return (n - ridge*0.5)*5.0;
}
/* biome from latitude + elevation */
function biomeAt(gx,gz){
  const d=gridToDir(gx,gz);
  const absLat=Math.abs(Math.asin(THREE.MathUtils.clamp(d.y,-1,1)));
  const h=heightAt(d);
  if(absLat>1.15) return 'polar';
  if(h>2.4) return 'highland';
  if(h<-2.2) return 'lowland';
  return 'plains';
}
const BIOME_LABEL={polar:'❄️ Polar ice',highland:'⛰️ Highlands',lowland:'🌊 Lowland basin',plains:'🏜️ Plains'};

/* ============================================================= *
 *  BUILDINGS                                                     *
 *  biomes: allowed biomes (omit = anywhere). prod/use per Sol.   *
 * ============================================================= */
const BUILDINGS = {
  solar:{name:"Solar Array",icon:"solar",cost:{materials:30},
    desc:"Cheap power from sunlight. Drops at night & in storms.",power:{day:16,night:0}},
  wind:{name:"Wind Turbine",icon:"wind",cost:{materials:48},
    desc:"Modest but constant power, day & night. Spins up in storms.",power:{flat:8}},
  reactor:{name:"Fission Reactor",icon:"reactor",cost:{materials:240,credits:120},tech:"nuclear",

  battery:{name:"Power Cell",icon:"battery",cost:{materials:42},

  extractor:{name:"Ice Extractor",icon:"water",cost:{materials:58},biomes:['polar','lowland'],
    desc:"Mines subsurface ice — only near poles or basins.",prod:{water:11},use:{power:6}},
  moxie:{name:"Oxygenator",icon:"oxygen",cost:{materials:72},

  mine:{name:"Ore Excavator",icon:"materials",cost:{materials:52},biomes:['highland','plains'],
    desc:"Strip-mines ore from highlands or rocky plains (not ice or basins).",prod:{materials:10},use:{power:6}},
  lab:{name:"Research Lab",icon:"science",cost:{materials:92},
    desc:"Colonists generate Science for research.",prod:{science:5},use:{power:6,oxygen:1}},
  park:{name:"Bio-Dome Park",icon:"park",cost:{materials:80,credits:30},biomes:['plains','lowland'],
    desc:"Green gardens & open space. Big morale boost.",morale:10,use:{power:3,water:3,oxygen:1}},
  depot:{name:"Storage Depot",icon:"depot",cost:{materials:46},
    desc:"+180 storage for O₂, water, food & materials.",storage:180},
  market:{name:"Trade Beacon",icon:"market",cost:{materials:72},tech:"comms",
    desc:"Auto-sells surplus materials to Earth for Credits.",prod:{credits:5},use:{materials:4,power:3}},
  spaceport:{name:"Spaceport",icon:"spaceport",cost:{materials:200,credits:120},tech:"aero",biomes:['plains'],
    desc:"Launchpad for Earth supply runs and interplanetary missions. Build on plains.",use:{power:8},morale:2},
  arcology:{name:"Arcology",icon:"arcology",cost:{materials:260,credits:160},tech:"arcology",biomes:['plains','lowland'],
    desc:"Vast self-contained city. Huge housing & morale.",pop:18,morale:14,use:{oxygen:6,water:5,food:6,power:14}},
  algae:{name:"Algae Pools",icon:"algae",cost:{materials:130,credits:60},tech:"bio",biomes:['lowland','polar'],
    desc:"Cyanobacteria oxygenate the atmosphere.",use:{water:3,power:4},tf:{oxygen:0.9},prod:{oxygen:4}},
  heater:{name:"Atmos. Heater",icon:"heat",cost:{materials:160,credits:80},tech:"thermal",
    desc:"Halocarbon factory warms the planet. +Temperature.",use:{power:14},tf:{temp:1.0}},
  mirror:{name:"Orbital Mirror",icon:"mirror",cost:{materials:190,credits:140},tech:"orbital",

    desc:"Industrial pressurisation. +Air Pressure.",use:{power:20,materials:2},tf:{pressure:1.8,oxygen:0.4}},

const BUILD_ORDER=["solar","wind","reactor","battery","habitat","extractor","moxie","greenhouse","mine","lab","park","depot","market","spaceport","arcology","algae","heater","mirror","processor"];

/* ============================================================= *
 *  TECH / INVENTIONS (branches feed the Evolution tree)         *
 * ============================================================= */
const TECHS = {
  nuclear:{name:"Fission Power",branch:"Power",cost:120,req:[],desc:"Unlocks the Fission Reactor."},
  efficiency:{name:"Life-Support Mk.II",branch:"Power",cost:140,req:[],desc:"Habitats use 25% less O₂, water & food."},
  drones:{name:"Mining Drones",branch:"Power",cost:120,req:["nuclear"],desc:"Ice Extractors & Ore Excavators +30% output."},

  aero:{name:"Aerospace Eng.",branch:"Logistics",cost:160,req:["comms"],desc:"Unlocks the Spaceport — Earth supply & launches."},
  bio:{name:"Astro-Biology",branch:"Biotech",cost:160,req:["nuclear"],desc:"Unlocks Algae Pools — oxygenate Mars."},
  thermal:{name:"Thermal Eng.",branch:"Biotech",cost:200,req:["nuclear"],desc:"Unlocks the Atmospheric Heater."},
  orbital:{name:"Orbital Logistics",branch:"Biotech",cost:260,req:["thermal","aero"],desc:"Unlocks Orbital Mirrors."},
  atmo:{name:"Atmospherics",branch:"Biotech",cost:340,req:["bio","thermal"],desc:"Unlocks the Atmospheric Processor."},
  vr_earth:{name:"VR Earth Sim",branch:"Society",cost:110,req:["comms"],desc:"Invention: +15 base morale — home, away from home."},
  arcology:{name:"Arcology Design",branch:"Society",cost:240,req:["vr_earth"],desc:"Unlocks the Arcology megastructure."},
  culture:{name:"Martian Culture",branch:"Society",cost:300,req:["arcology"],desc:"Invention: born-Martians thrive. +20 morale, +pop growth."},
  interplanetary:{name:"Interplanetary Transit",branch:"Frontier",cost:320,req:["aero","arcology"],desc:"Launch colony ships to other worlds for passive income."},
  warp:{name:"Warp Drive",branch:"Frontier",cost:600,req:["interplanetary","atmo"],desc:"Bend spacetime. Enables the interstellar mission."},
};
const BRANCHES=["Power","Logistics","Biotech","Society","Frontier"];

/* ============================================================= *
 *  ICONS                                                         *

function buildTerrain(){
  const geo=new THREE.SphereGeometry(R,260,190);
  const pos=geo.attributes.position;const colors=[];
  const cLow=new THREE.Color(0x4a1e10),cMid=new THREE.Color(0x8a3a18),cHi=new THREE.Color(0xc26a38),
        cDust=new THREE.Color(0xd98a4a),cPolar=new THREE.Color(0xe8dcc8),cBasin=new THREE.Color(0x6a3320);
  const v=new THREE.Vector3();
  for(let i=0;i<pos.count;i++){
    v.fromBufferAttribute(pos,i).normalize();
    const h=heightAt(v);const rr=R+h;
    pos.setXYZ(i,v.x*rr,v.y*rr,v.z*rr);
    const t=THREE.MathUtils.clamp((h+5)/10,0,1);
    let c=cLow.clone().lerp(cMid,Math.min(1,t*2)).lerp(cHi,Math.max(0,t*2-1));
    if(h<-2.2)c.lerp(cBasin,0.5);
    const sp=(noise3(v.x*9,v.y*9,v.z*9)+1)*0.5;
    c.lerp(cDust,sp*0.16);
    const cap=THREE.MathUtils.smoothstep(Math.abs(v.y),0.86,0.97);
    c.lerp(cPolar,cap*0.85);
    colors.push(c.r,c.g,c.b);
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  terrain=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.95,metalness:0.03}));
  terrain.receiveShadow=true;scene.add(terrain);

  // craters / boulders for flair
  const rockGeo=new THREE.IcosahedronGeometry(1,0);
  const rockMat=new THREE.MeshStandardMaterial({color:0x6a3320,roughness:1,flatShading:true});
  for(let i=0;i<60;i++){
    const dir=new THREE.Vector3().randomDirection();
    const m=new THREE.Mesh(rockGeo,rockMat);
    const sc=0.6+Math.random()*2.2;m.scale.set(sc,sc*0.6,sc);
    m.position.copy(dir.multiplyScalar(R+heightAt(dir)));
    orientToNormal(m,dir);m.rotateY(Math.random()*6);m.castShadow=true;m.receiveShadow=true;
    scene.add(m);
  }

  // tile grid overlay
  const grid=new THREE.Mesh(new THREE.SphereGeometry(R+0.3,GRID,GRID),
    new THREE.MeshBasicMaterial({color:0xff8a4a,wireframe:true,transparent:true,opacity:0.05}));
  scene.add(grid);

  // Fresnel atmosphere rim glow
  atmMesh=new THREE.Mesh(new THREE.SphereGeometry(R*1.14,64,48),new THREE.ShaderMaterial({
    uniforms:{glow:{value:new THREE.Color(0xff7a3c)},strength:{value:1.0}},
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vN;uniform vec3 glow;uniform float strength;void main(){float i=pow(max(0.0,0.72-dot(vN,vec3(0.0,0.0,1.0))),2.2)*strength;gl_FragColor=vec4(glow,1.0)*i;}`,
    side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false}));
  scene.add(atmMesh);
}

    c.setHSL(0.05+Math.random()*0.12,0.4,0.6+Math.random()*0.4);col.push(c.r,c.g,c.b);

/* ============================================================= *
 *  CAMERA (orbit a fixed globe)                                  *
 * ============================================================= */
const cam={theta:Math.PI*0.25,phi:1.0,radius:R*2.0};
function initCamera(){updateCamera();}
function updateCamera(){
  cam.phi=THREE.MathUtils.clamp(cam.phi,0.12,Math.PI-0.12);
  cam.radius=THREE.MathUtils.clamp(cam.radius,R*1.28,R*4.6);
  camera.position.set(
    cam.radius*Math.sin(cam.phi)*Math.cos(cam.theta),
    cam.radius*Math.cos(cam.phi),
    cam.radius*Math.sin(cam.phi)*Math.sin(cam.theta));
  camera.lookAt(0,0,0);
}
function addEventListeners(){
  const el=renderer.domElement;let drag=false,lx=0,ly=0;
  el.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
  addEventListener('mouseup',()=>drag=false);
  addEventListener('mousemove',e=>{
    pointer.x=(e.clientX/innerWidth)*2-1;pointer.y=-(e.clientY/innerHeight)*2+1;
    if(!drag)return;
    const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
    cam.theta+=dx*0.005;        // FIXED: drag direction now matches the globe
    cam.phi-=dy*0.005;
    updateCamera();
  });
  el.addEventListener('wheel',e=>{e.preventDefault();cam.radius*=1+Math.sign(e.deltaY)*0.08;updateCamera();},{passive:false});
  el.addEventListener('contextmenu',e=>e.preventDefault());
  el.addEventListener('click',onClick);
  let pinch=0;
  el.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
    else if(e.touches.length===2){pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
  el.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&drag){const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;cam.theta+=dx*0.006;cam.phi-=dy*0.006;updateCamera();}
    else if(e.touches.length===2){const dd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);cam.radius*=pinch/dd;pinch=dd;updateCamera();}
  },{passive:true});
  el.addEventListener('touchend',()=>drag=false);
  const onResize=()=>{const w=G._vw(),h=G._vh();camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);};
  addEventListener('resize',onResize);requestAnimationFrame(onResize);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')onResize();});
  addEventListener('keydown',e=>{
    if(e.key==='Escape'){G.selected=null;G.demolish=false;refreshDock();updateTools();}
    if(e.key>='1'&&e.key<='3')setSpeed(+e.key);
    if(e.key===' '){e.preventDefault();togglePause();}
  });
}

/* ============================================================= *
 *  SPHERICAL GRID                                                *
 * ============================================================= */
function gridToDir(gx,gz){
  const lon=(gx+0.5)/GRID*Math.PI*2, lat=-Math.PI/2+(gz+0.5)/GRID*Math.PI, cl=Math.cos(lat);
  return new THREE.Vector3(cl*Math.cos(lon),Math.sin(lat),cl*Math.sin(lon));
}
function surfacePos(gx,gz){const d=gridToDir(gx,gz);return d.clone().multiplyScalar(R+heightAt(d));}
function dirToGrid(dir){
  const n=dir.clone().normalize();
  const lat=Math.asin(THREE.MathUtils.clamp(n.y,-1,1));let lon=Math.atan2(n.z,n.x);if(lon<0)lon+=Math.PI*2;
  let gx=Math.floor(lon/(Math.PI*2)*GRID),gz=Math.floor((lat+Math.PI/2)/Math.PI*GRID);
  gx=((gx%GRID)+GRID)%GRID;gz=THREE.MathUtils.clamp(gz,0,GRID-1);return {gx,gz};
}
function idx(gx,gz){return gz*GRID+gx;}
function inGrid(gx,gz){return gx>=0&&gz>=0&&gx<GRID&&gz<GRID;}
function orientToNormal(obj,dir){obj.quaternion.setFromUnitVectors(UP,dir.clone().normalize());}
function tangentBasis(up){
  const t1=new THREE.Vector3().crossVectors(up,Math.abs(up.y)<0.9?UP:new THREE.Vector3(1,0,0)).normalize();
  const t2=new THREE.Vector3().crossVectors(up,t1).normalize();return {t1,t2};
}
function tileSlope(gx,gz){
  const s=[gridToDir(gx,gz),gridToDir((gx+1)%GRID,gz),gridToDir((gx-1+GRID)%GRID,gz),
    gridToDir(gx,Math.min(GRID-1,gz+1)),gridToDir(gx,Math.max(0,gz-1))].map(heightAt);
  return Math.max(...s)-Math.min(...s);
}

/* ============================================================= *
 *  PLACEMENT                                                     *
 * ============================================================= */
function effCost(b){const m=G.bonus.buildCost||1;const o={};for(const[k,v]of Object.entries(b.cost))o[k]=Math.ceil(v*m);return o;}
function canAfford(cost){return Object.entries(cost).every(([k,v])=>G.res[k]>=v);}
function spend(cost){for(const[k,v]of Object.entries(cost))G.res[k]-=v;}
function biomeOK(key,gx,gz){const b=BUILDINGS[key];return !b.biomes||b.biomes.includes(biomeAt(gx,gz));}

function placeBuilding(key,gx,gz){
  const b=BUILDINGS[key];const cost=effCost(b);
  if(!canAfford(cost)){toast("Not enough resources",'bad');return false;}
  spend(cost);
  const dir=gridToDir(gx,gz);const pos=dir.clone().multiplyScalar(R+heightAt(dir));
  const mesh=makeBuildingMesh(key);mesh.position.copy(pos);orientToNormal(mesh,dir);mesh.scale.y=0.01;
  scene.add(mesh);
  const {t1,t2}=tangentBasis(dir.clone().normalize());
  const obj={key,gx,gz,mesh,anim:0,dir:dir.clone().normalize(),pos,t1,t2,people:[],builder:null,builderAng:0};
  // construction drone
  const drone=makeDrone();scene.add(drone);obj.builder=drone;
  // colonists for housing/social buildings
  const pc=mesh.userData.peopleCount||0,pr=mesh.userData.peopleR||2;
  for(let i=0;i<pc&&ambientColonists.length<120;i++){
    const c=makeColonist();scene.add(c);
    const p={obj,mesh:c,ang:Math.random()*6.28,speed:(0.4+Math.random()*0.5)*(Math.random()<0.5?1:-1),rad:pr*(0.6+Math.random()*0.4)};
    obj.people.push(p);ambientColonists.push(p);
  }
  G.buildings.push(obj);tileOccupied[idx(gx,gz)]=true;
  spawnPuff(pos,dir);beep(440,0.08);toast(`${b.name} — construction started`,'good');
  if(key==='spaceport')toast('🚀 Spaceport online — Earth supply & launches unlocked!','disc');
  return true;
}
function removeColonistsOf(obj){
  for(const p of obj.people){scene.remove(p.mesh);const i=ambientColonists.indexOf(p);if(i>=0)ambientColonists.splice(i,1);}
  obj.people.length=0;
}
function demolishAt(gx,gz){
  const i=G.buildings.findIndex(o=>o.gx===gx&&o.gz===gz);if(i<0)return;
  const o=G.buildings[i];const b=BUILDINGS[o.key];
  for(const[k,v]of Object.entries(b.cost))G.res[k]+=Math.floor(v*0.4);
  spawnPuff(o.pos,o.dir);scene.remove(o.mesh);
  if(o.builder)scene.remove(o.builder);removeColonistsOf(o);
  G.buildings.splice(i,1);tileOccupied[idx(gx,gz)]=false;
  beep(220,0.1);toast(`${b.name} demolished (40% refunded)`,'warn');
}
function onClick(){
  if(G.over||!hoveredTile)return;
  const {gx,gz}=hoveredTile;
  if(G.demolish){demolishAt(gx,gz);return;}
  if(!G.selected)return;
  if(tileOccupied[idx(gx,gz)]){toast("Tile already occupied",'bad');return;}
  if(!biomeOK(G.selected,gx,gz)){const b=BUILDINGS[G.selected];toast(`${b.name} needs: ${b.biomes.map(x=>BIOME_LABEL[x]).join(' or ')}`,'bad');return;}
  if(tileSlope(gx,gz)>3.2){toast("Ground too steep here",'bad');return;}
  placeBuilding(G.selected,gx,gz);
}

/* ---------- puffs ---------- */
const puffs=[];
function spawnPuff(pos,dir){
  const up=dir.clone().normalize();const {t1,t2}=tangentBasis(up);
  const n=20,geo=new THREE.BufferGeometry(),arr=[],vel=[];
  for(let i=0;i<n;i++){arr.push(pos.x,pos.y,pos.z);const a=Math.random()*6.28,sp=2+Math.random()*3;
    const dv=t1.clone().multiplyScalar(Math.cos(a)*sp).addScaledVector(t2,Math.sin(a)*sp).addScaledVector(up,1.5+Math.random()*2);
    vel.push(dv.x,dv.y,dv.z);}
  geo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:0xd98a4a,size:0.7,transparent:true,opacity:0.9,depthWrite:false}));
  scene.add(pts);puffs.push({pts,vel,up,life:1});
}

/* ============================================================= *
 *  ECONOMY                                                       *
 * ============================================================= */
function dayFactor(){return Math.max(0,Math.sin(G.todFrac*Math.PI*2-Math.PI/2));}
function caps(){const b=G.storeBonus||0;return {power:G.powerCap||100,oxygen:STORAGE_BASE.oxygen+b,water:STORAGE_BASE.water+b,food:STORAGE_BASE.food+b,materials:STORAGE_BASE.materials+b,science:Infinity,credits:Infinity};}

function computeRates(){
  const r={power:0,oxygen:0,water:0,food:0,materials:0,science:0,credits:0};
  let powerCap=100,storeBonus=0,popCap=0,moraleSupply=0;let tfRate={temp:0,oxygen:0,pressure:0};
  const storm=dustStormActive?1:0;
  const effMult=G.techDone.efficiency?0.75:1;
  const droneMult=G.techDone.drones?1.3:1;
  const moraleMult=THREE.MathUtils.clamp(0.6+G.morale/100*0.7,0.55,1.35);
  const discMult=G.bonus.prod||1;const df=dayFactor();
  let prodPower=0,usePower=0;
  for(const o of G.buildings){const b=BUILDINGS[o.key];
    if(b.powerCap)powerCap+=b.powerCap;if(b.storage)storeBonus+=b.storage;if(b.pop)popCap+=b.pop;if(b.morale)moraleSupply+=b.morale;
    if(b.power){if(b.power.day!==undefined)prodPower+=b.power.day*df*(storm?0.25:1);if(b.power.flat!==undefined)prodPower+=b.power.flat*(storm?1.3:1);}}
  for(const o of G.buildings){const b=BUILDINGS[o.key];if(b.use&&b.use.power)usePower+=b.use.power;}
  r.power=prodPower-usePower;
  const opMult=(prodPower>=usePower)?1:Math.max(0.15,usePower>0?prodPower/usePower:1);
  for(const o of G.buildings){const b=BUILDINGS[o.key];
    if(b.prod)for(const[k,v]of Object.entries(b.prod)){let amt=v*opMult*moraleMult*discMult;if(o.key==='extractor'||o.key==='mine')amt*=droneMult;r[k]+=amt;}
    if(b.use)for(const[k,v]of Object.entries(b.use)){if(k==='power')continue;let amt=v;if(b.pop)amt*=effMult;r[k]-=amt;}
    if(b.tf)for(const[k,v]of Object.entries(b.tf))tfRate[k]+=v*opMult;}
  r.credits+=G.colonies*6;r.science+=G.colonies*3;
  r.oxygen-=G.pop*0.4;r.water-=G.pop*0.3;r.food-=G.pop*0.5;
  let techMorale=(G.techDone.vr_earth?15:0)+(G.techDone.culture?20:0);
  let mt=45+moraleSupply-G.pop*0.4+techMorale+(G.moraleBonus||0);
  if(G.res.food<=0||G.res.oxygen<=0)mt-=45;
  G.moraleTarget=THREE.MathUtils.clamp(mt,0,100);
  G.rates=r;G.powerCap=powerCap;G.popCap=popCap;G.storeBonus=storeBonus;G.tfRate=tfRate;G.opMult=opMult;G.prodPower=prodPower;G.usePower=usePower;
  return r;
}
function tickEconomy(dtSol){
  computeRates();const c=caps();
  for(const k of Object.keys(G.res)){G.res[k]+=G.rates[k]*dtSol;G.res[k]=Math.min(G.res[k],c[k]);if(k!=='power')G.res[k]=Math.max(0,G.res[k]);}
  G.res.power=THREE.MathUtils.clamp(G.res.power,0,c.power);
  for(const k of Object.keys(G.tf))G.tf[k]=THREE.MathUtils.clamp(G.tf[k]+(G.tfRate[k]||0)*dtSol,0,100);
  G.morale+=(G.moraleTarget-G.morale)*Math.min(1,dtSol*0.5);G.morale=THREE.MathUtils.clamp(G.morale,0,100);
  const lifeOK=G.res.oxygen>0&&G.res.water>0&&G.res.food>0;
  const growth=THREE.MathUtils.clamp(G.morale/70,0.3,1.5)*(G.techDone.culture?1.3:1);
  if(lifeOK&&G.pop<G.popCap)G.pop+=0.6*growth*dtSol;
  else if(!lifeOK){G.pop-=1.2*dtSol;if(Math.random()<0.35*dtSol)toast("Colonists are suffering — fix life support!",'bad');}
  G.pop=Math.max(0,Math.min(G.pop,G.popCap));
  if(G.pop<0.5&&G.popCap>0&&!G.over)gameOver(false);
  if(G.bonusT>0){G.bonusT-=dtSol;if(G.bonusT<=0){G.bonus={};G.moraleBonus=0;}}
  updatePending(dtSol);
  checkMilestones();
  if(G.tf.temp>=100&&G.tf.oxygen>=100&&G.tf.pressure>=100&&!G.over)gameOver(true,'terraform');
  maybeEvent(dtSol);
}

/* ---------- pending Earth/colony missions ---------- */
function updatePending(dtSol){
  for(let i=G.pending.length-1;i>=0;i--){
    const p=G.pending[i];p.timer-=dtSol;
    if(p.timer<=0){
      if(p.type==='supply'){for(const[k,v]of Object.entries(p.payload))G.res[k]+=v;toast(`📦 Earth delivery arrived: ${Object.entries(p.payload).map(([k,v])=>'+'+v+' '+k).join(', ')}`,'good');}
      else if(p.type==='colony'){G.colonies++;toast(`🪐 New off-world colony established! (${G.colonies} total)`,'disc');launchAnySpaceport();}
      else if(p.type==='interstellar'){gameOver(true,'interstellar');}
      G.pending.splice(i,1);
    }
  }
}

function maybeEvent(dtSol){

  const roll=Math.random();

    if(G.buildings.length>3){const o=G.buildings[(Math.random()*G.buildings.length)|0];spawnPuff(o.pos,o.dir);
      if(o.builder)scene.remove(o.builder);removeColonistsOf(o);scene.remove(o.mesh);G.buildings.splice(G.buildings.indexOf(o),1);tileOccupied[idx(o.gx,o.gz)]=false;
      toast(`☄️ Meteor strike destroyed a ${BUILDINGS[o.key].name}!`,'bad');beep(120,0.25);}
  } else { // positive discovery

  }
}

// Build the dock DOM once, with persistent handlers (no rebuild on click → no flicker)
function buildDock(){
  let html='';
  for(const key of BUILD_ORDER){
    const b=BUILDINGS[key];
    const cost=Object.entries(effCost(b)).map(([k,v])=>`${v}${k[0].toUpperCase()}`).join(' ');
    html+=`<div class="bcard" data-key="${key}"><span class="lk">🔒</span>${ICONS[b.icon]||ICONS.materials}<div class="bn">${b.name}</div><div class="bc">${cost}</div></div>`;
  }
  dock.innerHTML=html;
  dock.querySelectorAll('.bcard').forEach(el=>{
    const key=el.dataset.key,b=BUILDINGS[key];
    el.onclick=()=>{
      const locked=b.tech&&!G.techDone[b.tech];
      if(locked){toast(`Research "${TECHS[b.tech].name}" first`,'warn');return;}
      G.demolish=false;G.selected=G.selected===key?null:key;refreshDock();updateTools();
      showHint(G.selected?`Click a tile on the planet to build ${b.name}. Esc to cancel.`:'');
    };
    el.onmouseenter=e=>showBuildTip(e,key);el.onmousemove=moveTip;el.onmouseleave=hideTip;

// Lightweight state sync — only toggles classes on existing cards
function refreshDock(){
  dock.querySelectorAll('.bcard').forEach(el=>{
    const key=el.dataset.key,b=BUILDINGS[key];
    const locked=b.tech&&!G.techDone[b.tech];
    el.classList.toggle('sel',G.selected===key);

}
function showBuildTip(e,key){
  const b=BUILDINGS[key];let rows='';

  if(b.prod)for(const[k,v]of Object.entries(b.prod))rows+=`<div class="row"><span>${k}</span><b>+${v}/sol</b></div>`;
  if(b.use)for(const[k,v]of Object.entries(b.use))rows+=`<div class="row"><span>${k}</span><b>−${v}/sol</b></div>`;
  if(b.pop)rows+=`<div class="row"><span>Housing</span><b>+${b.pop}</b></div>`;
  if(b.morale)rows+=`<div class="row"><span>Morale</span><b>+${b.morale}</b></div>`;
  if(b.tf)for(const[k,v]of Object.entries(b.tf))rows+=`<div class="row"><span>Terraform ${k}</span><b>+${v}/sol</b></div>`;

function toast(msg,kind=''){const el=document.createElement('div');el.className='logitem '+kind;el.textContent=msg;logEl.prepend(el);
  while(logEl.children.length>5)logEl.lastChild.remove();
  setTimeout(()=>{el.style.transition='opacity .5s';el.style.opacity=0;setTimeout(()=>el.remove(),500);},4200);}

function showHint(txt){if(!txt){hint.classList.remove('show');return;}hint.textContent=txt;hint.classList.add('show');clearTimeout(hintT);hintT=setTimeout(()=>hint.classList.remove('show'),3800);}

/* ---------- speed ---------- */
function setSpeed(s){G.speed=s;G.paused=false;for(const id of['sp0','sp1','sp2','sp3'])$('#'+id)?.classList.remove('on');$('#sp'+s)?.classList.add('on');}
function togglePause(){G.paused=!G.paused;for(const id of['sp0','sp1','sp2','sp3'])$('#'+id)?.classList.remove('on');if(G.paused)$('#sp0').classList.add('on');else $('#sp'+G.speed).classList.add('on');}

/* ---------- audio ---------- */
let actx;
function beep(freq=440,dur=0.1){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();
  o.frequency.value=freq;o.type='triangle';g.gain.setValueAtTime(0.06,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
  o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+dur);}catch{}}

/* ---------- win/lose ---------- */
function gameOver(won,kind){
  G.over=true;G.paused=true;const mc=$('#mcard');
  let title,emoji,body;
  if(!won){emoji='💀';title='Colony Lost';body=`On Sol ${G.sol}, the last colonist perished. The red dust reclaimed the domes. Mars remains unconquered… for now.`;}
  else if(kind==='interstellar'){emoji='✨';title='Beyond the Stars';body=`Sol ${G.sol}. Your warp-drive vessel has carried Martian civilization to another star. From a single lander to an interstellar species — humanity's frontier is now the galaxy.`;}
  else{emoji='🌍';title='Mars is Home';body=`After ${G.sol} sols, the atmosphere is breathable, ice has melted into rivers, and ${Math.floor(G.pop)} colonists walk under an open sky. You terraformed a planet.`;}
  mc.innerHTML=`<div class="emoji">${emoji}</div><h2>${title}</h2><p>${body}</p>
    <div class="mbtns"><button class="btn" id="again">▶ Play again</button>${won?'<button class="btn" id="keep">Keep exploring</button>':''}</div>`;
  $('#modal').classList.add('show');
  $('#again').onclick=()=>{localStorage.removeItem(SAVE_KEY);location.reload();};
  const keep=$('#keep');if(keep)keep.onclick=()=>{G.over=false;G.paused=false;$('#modal').classList.remove('show');setSpeed(1);};
}

/* ---------- save/load ---------- */
function save(){const data={res:G.res,pop:G.pop,morale:G.morale,colonies:G.colonies,tf:G.tf,sol:G.sol,todFrac:G.todFrac,techDone:G.techDone,milestones:G.milestones,interstellar:G.interstellar,buildings:G.buildings.map(o=>({key:o.key,gx:o.gx,gz:o.gz}))};
  localStorage.setItem(SAVE_KEY,JSON.stringify(data));toast('💾 Colony saved','good');}
function load(){
  try{const d=JSON.parse(localStorage.getItem(SAVE_KEY));if(!d)return false;
    Object.assign(G.res,d.res);G.pop=d.pop;G.morale=d.morale??62;G.colonies=d.colonies||0;Object.assign(G.tf,d.tf);
    G.sol=d.sol;G.todFrac=d.todFrac;G.techDone=d.techDone||{};G.milestones=d.milestones||{};G.interstellar=d.interstellar||false;
    for(const b of d.buildings){if(!inGrid(b.gx,b.gz))continue;
      const dir=gridToDir(b.gx,b.gz).normalize();const pos=dir.clone().multiplyScalar(R+heightAt(dir));
      const mesh=makeBuildingMesh(b.key);mesh.position.copy(pos);orientToNormal(mesh,dir);scene.add(mesh);
      const {t1,t2}=tangentBasis(dir);
      const obj={key:b.key,gx:b.gx,gz:b.gz,mesh,anim:1,dir,pos,t1,t2,people:[],builder:null,builderAng:0};
      const pc=mesh.userData.peopleCount||0,pr=mesh.userData.peopleR||2;
      for(let i=0;i<pc&&ambientColonists.length<120;i++){const c=makeColonist();scene.add(c);const p={obj,mesh:c,ang:Math.random()*6.28,speed:(0.4+Math.random()*0.5)*(Math.random()<0.5?1:-1),rad:pr*(0.6+Math.random()*0.4)};obj.people.push(p);ambientColonists.push(p);}
      G.buildings.push(obj);tileOccupied[idx(b.gx,b.gz)]=true;}
    return true;
  }catch(e){console.warn('load failed',e);return false;}
}

/* ============================================================= *
 *  MAIN LOOP                                                     *
 * ============================================================= */
let saveAccum=0,autoLaunch=14;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const speed=G.paused?0:G.speed;const dtGame=dt*speed;

  if(dtGame>0){
    G.todFrac+=dtGame/SOL_SECONDS;
    while(G.todFrac>=1){G.todFrac-=1;G.sol++;toast(`☀️ Sol ${G.sol} begins`,'');}
    tickEconomy(dtGame/SOL_SECONDS);
    saveAccum+=dt;if(saveAccum>20){saveAccum=0;save();}
    autoLaunch-=dtGame;if(autoLaunch<=0){autoLaunch=18+Math.random()*16;launchAnySpaceport();}
  }

  const t=performance.now()*0.001;
  const dl=dayFactor();const nightF=1-dl;

  // sun orbit (lights one hemisphere; terminator sweeps)
  const ang=G.todFrac*Math.PI*2-Math.PI/2;
  sun.position.set(Math.cos(ang)*R*4,R*1.0,Math.sin(ang)*R*4);
  sun.intensity=2.4*(dustStormActive?0.5:1);
  if(atmMesh){atmMesh.material.uniforms.strength.value=dustStormActive?1.9:1.0;}

  // moons
  phobos.position.set(Math.cos(t*0.18)*R*2.4,Math.sin(t*0.18)*R*0.5,Math.sin(t*0.18)*R*2.4);
  deimos.position.set(Math.cos(-t*0.1+2)*R*3.0,R*0.9,Math.sin(-t*0.1+2)*R*2.7);
  phobos.rotation.y=t*0.3;deimos.rotation.y=-t*0.2;

  // dust storm
  if(dustStormActive){dustStormT+=dt;
    const intensity=Math.min(1,dustStormT/3)*(dustStormT>14?Math.max(0,1-(dustStormT-14)/4):1);
    dustParticles[0].material.opacity=intensity*0.5;dustParticles[0].rotation.y+=dt*0.3;
    if(dustStormT>18){dustStormActive=false;dustParticles[0].material.opacity=0;toast('🌤️ The dust storm has passed','good');}}

  // buildings: construction, robots, spinners, glow, lights, people
  for(const o of G.buildings){
    if(o.anim<1){
      o.anim=Math.min(1,o.anim+dt*0.4); // ~2.5s build
      const e=1-Math.pow(1-o.anim,3);o.mesh.scale.y=e;
      // construction drone orbits the site
      if(o.builder){o.builderAng+=dt*2.2;const r=TILE*0.5;
        const off=o.t1.clone().multiplyScalar(Math.cos(o.builderAng)*r).addScaledVector(o.t2,Math.sin(o.builderAng)*r).addScaledVector(o.dir,1.4+Math.sin(t*4)*0.3);
        o.builder.position.copy(o.pos).add(off);orientToNormal(o.builder,o.dir);
        const sp=o.builder.userData.spark;if(sp){sp.visible=Math.sin(t*30)>0;sp.material.color.setHex(Math.random()<0.5?0xfff0b0:0xff9a4a);}
        if(Math.random()<0.04)spawnPuff(o.pos.clone().addScaledVector(o.dir,0.6),o.dir);
      }
    } else if(o.builder){scene.remove(o.builder);o.builder=null;spawnPuff(o.pos,o.dir);}

    const ud=o.mesh.userData;
    if(ud.spin){const axis=ud.spin.userData&&ud.spin.userData.axis==='y'?'y':'z';const spd=(dustStormActive&&o.key==='wind')?7:1.6;ud.spin.rotation[axis]+=dt*spd;}
    if(ud.arm)ud.arm.rotation.x=-0.6+Math.sin(t*2+o.gx)*0.25;
    if(ud.glow&&ud.glow.material.emissive)ud.glow.material.emissiveIntensity=0.4+Math.sin(t*3+o.gz)*0.25;
    if(ud.win)ud.win.material.emissiveIntensity=0.12+nightF*0.7;
    if(ud.lamps)for(const l of ud.lamps)l.material.emissiveIntensity=nightF*1.2;
    if(ud.panel){const f=o.dir.dot(sun.position.clone().normalize());ud.panel.material.emissiveIntensity=Math.max(0,f)*0.4;}

    // spaceport rocket launch animation
    if(o.key==='spaceport'&&o.launchT!==undefined&&o.anim>=1){
      o.launchT+=dt;const rk=ud.rocket,fl=ud.flame;
      if(rk){
        if(o.launchT<3.2){const h=Math.pow(o.launchT/3.2,2)*46;rk.position.y=0.4+h;if(fl){fl.visible=true;fl.scale.y=1+Math.sin(t*40)*0.3;}
          if(Math.random()<0.6)spawnPuff(o.pos.clone().addScaledVector(o.dir,0.5),o.dir);}
        else if(o.launchT<6){rk.position.y=0.4;if(fl)fl.visible=false;} // gone, off-screen
        else {o.launchT=undefined;rk.position.y=0.4;if(fl)fl.visible=false;}
      }
    }
  }

  // colonists walk around their building
  for(const p of ambientColonists){
    const o=p.obj;if(o.anim<1)continue;p.ang+=p.speed*dt;
    const off=o.t1.clone().multiplyScalar(Math.cos(p.ang)*p.rad).addScaledVector(o.t2,Math.sin(p.ang)*p.rad);
    const ppos=o.pos.clone().add(off);
    p.mesh.position.copy(ppos);
    // face walking direction, feet on ground
    const tangent=o.t1.clone().multiplyScalar(-Math.sin(p.ang)*p.speed).addScaledVector(o.t2,Math.cos(p.ang)*p.speed);
    const m=new THREE.Matrix4().lookAt(new THREE.Vector3(),tangent,o.dir);
    p.mesh.quaternion.setFromRotationMatrix(m);
    p.mesh.position.addScaledVector(o.dir,0.05+Math.abs(Math.sin(t*6+p.ang))*0.05); // little bob
  }

  // puffs
  for(let i=puffs.length-1;i>=0;i--){const pf=puffs[i];pf.life-=dt*1.3;const p=pf.pts.geometry.attributes.position;
    for(let j=0;j<p.count;j++){p.setXYZ(j,p.getX(j)+pf.vel[j*3]*dt,p.getY(j)+pf.vel[j*3+1]*dt,p.getZ(j)+pf.vel[j*3+2]*dt);
      pf.vel[j*3]-=pf.up.x*dt*4;pf.vel[j*3+1]-=pf.up.y*dt*4;pf.vel[j*3+2]-=pf.up.z*dt*4;}
    p.needsUpdate=true;pf.pts.material.opacity=Math.max(0,pf.life);if(pf.life<=0){scene.remove(pf.pts);puffs.splice(i,1);}}

  updateCursor();
  starField.rotation.y=t*0.004;
  renderer.render(scene,camera);
}

function updateCursor(){
  if(!G.selected&&!G.demolish){cursor.visible=false;hoveredTile=null;return;}
  raycaster.setFromCamera(pointer,camera);
  const hit=raycaster.intersectObject(terrain)[0];
  if(!hit){cursor.visible=false;hoveredTile=null;return;}
  const {gx,gz}=dirToGrid(hit.point);
  if(!inGrid(gx,gz)){cursor.visible=false;hoveredTile=null;return;}
  hoveredTile={gx,gz};
  const cdir=gridToDir(gx,gz);
  cursor.position.copy(cdir.clone().multiplyScalar(R+heightAt(cdir)+0.15));orientToNormal(cursor,cdir);cursor.visible=true;
  let ok;
  if(G.demolish)ok=tileOccupied[idx(gx,gz)];
  else ok=!tileOccupied[idx(gx,gz)]&&biomeOK(G.selected,gx,gz)&&tileSlope(gx,gz)<=3.2&&canAfford(effCost(BUILDINGS[G.selected]));
  const col=G.demolish?(ok?0xff6b6b:0x888888):(ok?0x7fe08a:0xff6b6b);
  cursor.userData.ring.material.color.setHex(col);cursor.userData.box.material.color.setHex(col);
}

/* ============================================================= *
 *  BOOT                                                          *
 * ============================================================= */
function bindTools(){
  $('#tInfo').onclick=()=>openSide('info');
  $('#tTech').onclick=()=>openSide('tech');
  $('#tEvo').onclick=()=>openSide('evo');
  $('#tShop').onclick=()=>openSide('shop');
  $('#tSave').onclick=save;
  $('#tHelp').onclick=()=>openSide('help');
  $('#tDemo').onclick=()=>{G.demolish=!G.demolish;if(G.demolish)G.selected=null;refreshDock();updateTools();showHint(G.demolish?'Demolish mode: click a building to remove it (40% refund).':'');};
}
function boot(){let pct=0;const lbar=$('#lbar');const iv=setInterval(()=>{pct=Math.min(100,pct+12+Math.random()*18);lbar.style.width=pct+'%';if(pct>=100){clearInterval(iv);start();}},90);}
function start(){
  initScene();buildResBar();bindTools();
  const loaded=load();
  if(!loaded){
    // find a couple of flat plains tiles near the equator for the starter colony
    let placed=0;
    for(let gz=GRID/2-3;gz<GRID/2+3&&placed<2;gz++)for(let gx=0;gx<GRID&&placed<2;gx++){
      if(biomeAt(gx,gz)==='plains'&&tileSlope(gx,gz)<2&&!tileOccupied[idx(gx,gz)]){
        placeBuilding(placed===0?'solar':'habitat',gx,gz);placed++;
      }
    }
    G.buildings.forEach(o=>{o.anim=1;o.mesh.scale.y=1;if(o.builder){scene.remove(o.builder);o.builder=null;}});
    toast('Welcome, Commander. Build power & life support to grow your colony.','good');
  }
  // frame camera on the colony
  const aim=(G.buildings[0]?G.buildings[0].dir:gridToDir(0,GRID/2)).clone().normalize();
  cam.phi=Math.acos(THREE.MathUtils.clamp(aim.y,-1,1));cam.theta=Math.atan2(aim.z,aim.x);updateCamera();
  buildDock();computeRates();updateResBar();
  setTimeout(()=>{const l=$('#loader');l.style.opacity=0;setTimeout(()=>l.remove(),600);$('#hud').style.display='flex';$('#leftcol').style.display='flex';},250);
  setInterval(()=>{if(!G.over){updateResBar();refreshDock();if(sidePanel==='info')renderInfo();}},400);
  animate();
  const firstRun=!loaded&&!localStorage.getItem('rf_tut_done');
  if(firstRun)setTimeout(startTutorial,700);
  else if(!loaded)setTimeout(()=>showHint('Pick a building below, then click a tile. Drag to spin the globe. Press ❔ for help.'),900);
}
boot();
</script>
