<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Red Frontier — Mars Colony</title>
<style>
  :root{
    --bg:#0a0604;
    --panel:rgba(24,14,10,0.86);
    --panel-2:rgba(34,20,14,0.92);
    --line:rgba(255,150,90,0.22);
    --ink:#ffe9da;
    --muted:#c99c83;
    --rust:#ff7a3c;
    --rust-2:#ffb066;
    --good:#7fe08a;
    --warn:#ffd166;
    --bad:#ff6b6b;
    --sci:#8fd4ff;
    --shadow:0 18px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:"Inter","Segoe UI",system-ui,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  canvas{display:block}
  #app{position:fixed;inset:0}

  /* ===== Loading ===== */
  #loader{position:fixed;inset:0;z-index:50;display:grid;place-items:center;
    background:radial-gradient(circle at 50% 30%,#3a1606,#0a0604 70%);transition:opacity .6s;}
  #loader .lwrap{text-align:center}
  #loader h1{font-size:clamp(28px,6vw,64px);margin:0;letter-spacing:.18em;
    background:linear-gradient(90deg,var(--rust),var(--rust-2));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(255,120,60,.35);font-weight:800;}
  #loader p{color:var(--muted);letter-spacing:.35em;margin:.4em 0 1.4em;font-size:13px;text-transform:uppercase}
  .bar{width:min(360px,70vw);height:6px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;margin:0 auto}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rust),var(--rust-2));transition:width .3s}

  /* ===== HUD ===== */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column;justify-content:space-between}
  .topbar{pointer-events:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 12px;
    background:linear-gradient(180deg,rgba(10,6,4,.85),rgba(10,6,4,0));}
  .res{display:flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--line);border-radius:11px;
    background:var(--panel);backdrop-filter:blur(8px);font-variant-numeric:tabular-nums;min-width:0}
  .res .ic{width:18px;height:18px;flex:0 0 auto}
  .res .v{font-weight:700;font-size:14px}
  .res .r{font-size:11px;color:var(--muted)}
  .res .r.pos{color:var(--good)}.res .r.neg{color:var(--bad)}
  .res.alert{animation:pulseBad 1s infinite}
  @keyframes pulseBad{0%,100%{border-color:var(--line)}50%{border-color:var(--bad)}}

  .spacer{flex:1}
  .clock{display:flex;align-items:center;gap:10px;padding:6px 12px;border:1px solid var(--line);border-radius:11px;background:var(--panel);backdrop-filter:blur(8px)}
  .clock .sol{font-weight:800;font-size:15px}
  .clock .tod{font-size:11px;color:var(--muted);width:64px}
  .speed{display:flex;gap:4px}
  .speed button{pointer-events:auto;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
    width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:.15s}
  .speed button:hover{border-color:var(--rust)}
  .speed button.on{background:var(--rust);color:#1a0a04;border-color:var(--rust)}

  /* ===== Build dock ===== */
  .dock{pointer-events:auto;align-self:center;margin-bottom:14px;display:flex;gap:8px;padding:10px;
    border:1px solid var(--line);border-radius:16px;background:var(--panel);backdrop-filter:blur(10px);box-shadow:var(--shadow);
    max-width:min(96vw,1180px);overflow-x:auto;scrollbar-width:thin}
  .bcard{position:relative;width:78px;flex:0 0 auto;border:1px solid transparent;border-radius:12px;padding:8px 6px 7px;
    background:rgba(255,255,255,.03);cursor:pointer;text-align:center;transition:.16s;user-select:none}
  .bcard:hover{background:rgba(255,150,90,.12);border-color:var(--line);transform:translateY(-3px)}
  .bcard.sel{border-color:var(--rust);background:rgba(255,122,60,.18);box-shadow:0 0 0 1px var(--rust) inset}
  .bcard.locked{opacity:.4;cursor:not-allowed;filter:grayscale(.6)}
  .bcard.unaff{opacity:.62}
  .bcard .bi{width:36px;height:36px;margin:0 auto 4px;display:block}
  .bcard .bn{font-size:10.5px;line-height:1.15;color:var(--ink);font-weight:600}
  .bcard .bc{font-size:9.5px;color:var(--muted);margin-top:2px}
  .bcard .lk{position:absolute;top:4px;right:5px;font-size:11px}

  .leftcol{position:fixed;left:12px;top:64px;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .tool{pointer-events:auto;width:42px;height:42px;border:1px solid var(--line);border-radius:11px;background:var(--panel);
    color:var(--ink);cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(8px);transition:.15s;font-size:18px}
  .tool:hover{border-color:var(--rust);background:var(--panel-2)}
  .tool.on{background:var(--rust);color:#1a0a04}

  /* ===== Side panel (info/research) ===== */
  .side{position:fixed;right:12px;top:64px;width:min(330px,86vw);max-height:calc(100vh - 180px);overflow:auto;
    border:1px solid var(--line);border-radius:14px;background:var(--panel);backdrop-filter:blur(10px);box-shadow:var(--shadow);
    pointer-events:auto;padding:14px;transform:translateX(120%);transition:transform .35s cubic-bezier(.2,.8,.2,1);scrollbar-width:thin}
  .side.open{transform:none}
  .side h3{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px}
  .side .close{margin-left:auto;cursor:pointer;color:var(--muted);font-size:18px;line-height:1}
  .side .sub{color:var(--muted);font-size:12px;margin:0 0 12px}
  .stat{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px dashed rgba(255,255,255,.07)}
  .stat b{font-weight:700}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--ink);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;width:100%}
  .btn:hover{border-color:var(--rust)}
  .btn.danger:hover{border-color:var(--bad);color:var(--bad)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .tech{border:1px solid var(--line);border-radius:11px;padding:10px;margin-bottom:9px;background:rgba(255,255,255,.02)}
  .tech.done{border-color:rgba(127,224,138,.4);background:rgba(127,224,138,.06)}
  .tech h4{margin:0 0 3px;font-size:13.5px}
  .tech p{margin:0 0 8px;font-size:11.5px;color:var(--muted);line-height:1.4}
  .tech .cost{font-size:11px;color:var(--sci);font-weight:700}

  /* ===== Tooltip ===== */
  #tip{position:fixed;z-index:30;max-width:230px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    background:var(--panel-2);backdrop-filter:blur(8px);font-size:12px;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:var(--shadow)}
  #tip h5{margin:0 0 4px;font-size:13px;color:var(--rust-2)}
  #tip .row{display:flex;justify-content:space-between;gap:14px;color:var(--muted);line-height:1.5}
  #tip .row b{color:var(--ink)}
  #tip .desc{color:var(--muted);margin-top:6px;font-style:italic;line-height:1.4}

  /* ===== Log ===== */
  #log{position:fixed;left:12px;bottom:14px;width:min(320px,70vw);pointer-events:none;display:flex;flex-direction:column;gap:5px}
  .logitem{font-size:12px;padding:7px 11px;border-radius:9px;background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(6px);animation:slideIn .35s;opacity:.96}
  .logitem.good{border-color:rgba(127,224,138,.35)}
  .logitem.warn{border-color:rgba(255,209,102,.4)}
  .logitem.bad{border-color:rgba(255,107,107,.45)}
  @keyframes slideIn{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:.96}}

  /* ===== Modal ===== */
  #modal{position:fixed;inset:0;z-index:40;display:none;place-items:center;background:rgba(5,3,2,.72);backdrop-filter:blur(4px)}
  #modal.show{display:grid}
  .mcard{width:min(480px,92vw);border:1px solid var(--line);border-radius:18px;background:var(--panel-2);
    box-shadow:var(--shadow);padding:26px;text-align:center;animation:pop .35s}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .mcard .emoji{font-size:46px}
  .mcard h2{margin:8px 0 6px;font-size:24px}
  .mcard p{color:var(--muted);font-size:13.5px;line-height:1.6;margin:0 0 18px}
  .mcard .mbtns{display:flex;gap:10px}

  .hint{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);pointer-events:none;
    font-size:12px;color:var(--muted);background:var(--panel);border:1px solid var(--line);
    padding:6px 14px;border-radius:20px;backdrop-filter:blur(6px);opacity:0;transition:opacity .3s}
  .hint.show{opacity:1}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(255,150,90,.3);border-radius:8px}
</style>
</head>
<body>
<div id="app"></div>

<div id="loader">
  <div class="lwrap">
    <h1>RED FRONTIER</h1>
    <p>Mars Colony</p>
    <div class="bar"><i id="lbar"></i></div>
  </div>
</div>

<div id="hud" style="display:none">
  <div class="topbar" id="resbar"></div>
  <div class="spacer"></div>
  <div class="dock" id="dock"></div>
</div>

<div class="leftcol" id="leftcol" style="display:none">
  <button class="tool" id="tInfo" title="Colony overview">📊</button>
  <button class="tool" id="tTech" title="Research lab">🧪</button>
  <button class="tool" id="tDemo" title="Demolish (toggle)">⛏️</button>
  <button class="tool" id="tSave" title="Save colony">💾</button>
  <button class="tool" id="tHelp" title="How to play">❔</button>
</div>

<div class="side" id="side"></div>
<div id="tip"></div>
<div id="log"></div>
<div class="hint" id="hint"></div>

<div id="modal"><div class="mcard" id="mcard"></div></div>

/* ---------- tiny deterministic value noise ---------- */
function makeNoise(seed){
  const p=new Uint8Array(512);
  let s=seed>>>0;
  const rnd=()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};
  const perm=[...Array(256).keys()];
  for(let i=255;i>0;i--){const j=(rnd()*(i+1))|0;[perm[i],perm[j]]=[perm[j],perm[i]];}
  for(let i=0;i<512;i++)p[i]=perm[i&255];
  const fade=t=>t*t*t*(t*(t*6-15)+10);
  const lerp=(a,b,t)=>a+(b-a)*t;
  const grad=(h,x,y)=>{const u=(h&1)?x:-x,v=(h&2)?y:-y;return u+v;};
  return (x,y)=>{
    const X=Math.floor(x)&255,Y=Math.floor(y)&255;
    x-=Math.floor(x);y-=Math.floor(y);
    const u=fade(x),v=fade(y);
    const A=p[X]+Y,B=p[X+1]+Y;
    return lerp(lerp(grad(p[A],x,y),grad(p[B],x-1,y),u),
                lerp(grad(p[A+1],x,y-1),grad(p[B+1],x-1,y-1),u),v);
  };
}
function fbm(n,x,y,oct=4){let v=0,a=.5,f=1;for(let i=0;i<oct;i++){v+=a*n(x*f,y*f);f*=2;a*=.5;}return v;}

/* ============================================================= *
 *  CONFIG / BALANCE                                              *
 * ============================================================= */
const GRID=26;                 // longitude columns AND latitude rows of the tile grid
const R=42;                     // planet radius (world units)
const TILE=3.0;                 // building footprint scale (decoupled from grid cell size)

const STORAGE_BASE={oxygen:200,water:200,food:200,materials:300,science:99999,credits:99999};
const SAVE_KEY='redfrontier2';  // bumped: planet build uses spherical coords

const noiseH=makeNoise(13577);
const UP=new THREE.Vector3(0,1,0);

/* seamless-ish 3D noise built from three 2D lookups (no poles/seam) */
function noise3(x,y,z){return (fbm(noiseH,x+11,y-7,4)+fbm(noiseH,y+5,z+3,4)+fbm(noiseH,z-9,x+2,4))/3;}
/* surface elevation (world units) at a unit direction on the sphere */
function heightAt(dir){
  const f=2.0;
  const n=noise3(dir.x*f,dir.y*f,dir.z*f);
  const ridge=Math.abs(noise3(dir.x*f*2.4+3,dir.y*f*2.4,dir.z*f*2.4));
  return (n - ridge*0.5)*3.0;
}

/* ---------- terrain (the planet) ---------- */
function buildTerrain(){
  const geo=new THREE.SphereGeometry(R,200,150);
  const pos=geo.attributes.position;
  const colors=[];
  const cLow=new THREE.Color(0x5a2412),cMid=new THREE.Color(0x8a3a18),cHi=new THREE.Color(0xc26a38),
        cDust=new THREE.Color(0xd98a4a),cPolar=new THREE.Color(0xe8dcc8);
  const v=new THREE.Vector3();
  for(let i=0;i<pos.count;i++){
    v.fromBufferAttribute(pos,i).normalize();
    const h=heightAt(v);
    const rr=R+h;
    pos.setXYZ(i,v.x*rr,v.y*rr,v.z*rr);
    const t=THREE.MathUtils.clamp((h+5)/10,0,1);
    const c=cLow.clone().lerp(cMid,Math.min(1,t*2)).lerp(cHi,Math.max(0,t*2-1));
    const sp=(noise3(v.x*8,v.y*8,v.z*8)+1)*0.5;
    c.lerp(cDust,sp*0.16);
    // polar ice caps
    const cap=THREE.MathUtils.smoothstep(Math.abs(v.y),0.84,0.97);
    c.lerp(cPolar,cap*0.85);
    colors.push(c.r,c.g,c.b);
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  terrain=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.95,metalness:0.02}));
  terrain.receiveShadow=true;
  scene.add(terrain);

  // tile grid overlay (lines align with tile boundaries)
  const grid=new THREE.Mesh(new THREE.SphereGeometry(R+0.25,GRID,GRID),
    new THREE.MeshBasicMaterial({color:0xff8a4a,wireframe:true,transparent:true,opacity:0.07}));
  scene.add(grid);

  // atmosphere glow shell
  const atm=new THREE.Mesh(new THREE.SphereGeometry(R*1.13,64,48),
    new THREE.MeshBasicMaterial({color:0xff6a2c,transparent:true,opacity:0.12,side:THREE.BackSide,
      blending:THREE.AdditiveBlending,depthWrite:false}));
  scene.add(atm);G.atm=atm;
}

/* ============================================================= *
 *  CAMERA CONTROLLER (orbit + pan + zoom)                       *
 * ============================================================= */
const cam={theta:Math.PI*0.25,phi:1.0,radius:R*2.0};
function initCamera(){updateCamera();}
function updateCamera(){
  cam.phi=THREE.MathUtils.clamp(cam.phi,0.12,Math.PI-0.12);
  cam.radius=THREE.MathUtils.clamp(cam.radius,R*1.28,R*4.5);
  const x=cam.radius*Math.sin(cam.phi)*Math.cos(cam.theta);
  const y=cam.radius*Math.cos(cam.phi);
  const z=cam.radius*Math.sin(cam.phi)*Math.sin(cam.theta);
  camera.position.set(x,y,z);
  camera.lookAt(0,0,0);
}
function addEventListeners(){
  const el=renderer.domElement;
  let drag=null,lx=0,ly=0;
  el.addEventListener('mousedown',e=>{drag='orbit';lx=e.clientX;ly=e.clientY;});
  addEventListener('mouseup',()=>drag=null);
  addEventListener('mousemove',e=>{
    pointer.x=(e.clientX/innerWidth)*2-1;
    pointer.y=-(e.clientY/innerHeight)*2+1;
    if(!drag)return;
    const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
    cam.theta-=dx*0.005;cam.phi-=dy*0.005;
    updateCamera();
  });
  el.addEventListener('wheel',e=>{e.preventDefault();cam.radius*=1+Math.sign(e.deltaY)*0.08;updateCamera();},{passive:false});
  el.addEventListener('contextmenu',e=>e.preventDefault());
  el.addEventListener('click',onClick);
  // touch (single finger orbit, pinch zoom)
  let pinch=0;
  el.addEventListener('touchstart',e=>{if(e.touches.length===1){drag='orbit';lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
    else if(e.touches.length===2){pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
  el.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&drag){const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;cam.theta-=dx*0.006;cam.phi-=dy*0.006;updateCamera();}
    else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);cam.radius*=pinch/d;pinch=d;updateCamera();}
  },{passive:true});
  el.addEventListener('touchend',()=>drag=null);
  const onResize=()=>{const w=G._vw(),h=G._vh();camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);};
  addEventListener('resize',onResize);
  // self-heal a zero-size init (e.g. page loaded in a backgrounded tab)
  requestAnimationFrame(onResize);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')onResize();});
  addEventListener('keydown',e=>{
    if(e.key==='Escape'){G.selected=null;G.demolish=false;refreshDock();updateTools();}
    if(e.key>='1'&&e.key<='3')setSpeed(+e.key);
    if(e.key===' '){e.preventDefault();togglePause();}
  });
}

/* ---------- spherical grid helpers ---------- */
// gx = longitude column, gz = latitude row
function gridToDir(gx,gz){
  const lon=(gx+0.5)/GRID*Math.PI*2;
  const lat=-Math.PI/2 + (gz+0.5)/GRID*Math.PI;
  const cl=Math.cos(lat);
  return new THREE.Vector3(cl*Math.cos(lon), Math.sin(lat), cl*Math.sin(lon));
}
function surfacePos(gx,gz){const d=gridToDir(gx,gz);return d.clone().multiplyScalar(R+heightAt(d));}
function dirToGrid(dir){
  const n=dir.clone().normalize();
  const lat=Math.asin(THREE.MathUtils.clamp(n.y,-1,1));
  let lon=Math.atan2(n.z,n.x); if(lon<0)lon+=Math.PI*2;
  let gx=Math.floor(lon/(Math.PI*2)*GRID);
  let gz=Math.floor((lat+Math.PI/2)/Math.PI*GRID);
  gx=((gx%GRID)+GRID)%GRID; gz=THREE.MathUtils.clamp(gz,0,GRID-1);
  return {gx,gz};
}
function idx(gx,gz){return gz*GRID+gx;}
function inGrid(gx,gz){return gx>=0&&gz>=0&&gx<GRID&&gz<GRID;}
function orientToNormal(obj,dir){obj.quaternion.setFromUnitVectors(UP,dir.clone().normalize());}
function tileSlope(gx,gz){
  const samples=[gridToDir(gx,gz),
    gridToDir((gx+1)%GRID,gz), gridToDir((gx-1+GRID)%GRID,gz),
    gridToDir(gx,Math.min(GRID-1,gz+1)), gridToDir(gx,Math.max(0,gz-1))];
  const hs=samples.map(heightAt);
  return Math.max(...hs)-Math.min(...hs);
}

/* ============================================================= *
 *  PLACEMENT / DEMOLITION                                       *
 * ============================================================= */
function canAfford(cost){return Object.entries(cost).every(([k,v])=>G.res[k]>=v);}
function spend(cost){for(const[k,v]of Object.entries(cost))G.res[k]-=v;}

function placeBuilding(key,gx,gz){
  const b=BUILDINGS[key];
  if(!canAfford(b.cost)){toast("Not enough resources",'bad');return false;}
  spend(b.cost);
  const dir=gridToDir(gx,gz);
  const pos=dir.clone().multiplyScalar(R+heightAt(dir));
  const mesh=makeBuildingMesh(key);
  mesh.position.copy(pos);
  orientToNormal(mesh,dir);
  mesh.scale.y=0.01;
  scene.add(mesh);
  const obj={key,gx,gz,mesh,t:0,anim:0};
  G.buildings.push(obj);
  tileOccupied[idx(gx,gz)]=true;
  spawnPuff(pos,dir);
  beep(440,0.08);
  toast(`${b.name} constructed`,'good');
  return true;
}

function demolishAt(gx,gz){
  const i=G.buildings.findIndex(o=>o.gx===gx&&o.gz===gz);
  if(i<0)return;
  const o=G.buildings[i];
  const b=BUILDINGS[o.key];
  // refund 40%
  for(const[k,v]of Object.entries(b.cost))G.res[k]+=Math.floor(v*0.4);
  const dir=gridToDir(gx,gz);spawnPuff(dir.clone().multiplyScalar(R+heightAt(dir)),dir);
  scene.remove(o.mesh);
  G.buildings.splice(i,1);
  tileOccupied[idx(gx,gz)]=false;
  beep(220,0.1);
  toast(`${b.name} demolished (40% refunded)`,'warn');
}

function onClick(e){
  if(G.over)return;
  if(!hoveredTile)return;
  const {gx,gz}=hoveredTile;
  if(G.demolish){demolishAt(gx,gz);return;}
  if(!G.selected)return;
  if(tileOccupied[idx(gx,gz)]){toast("Tile occupied",'bad');return;}
  if(tileSlope(gx,gz)>2.6){toast("Ground too steep here",'bad');return;}
  placeBuilding(G.selected,gx,gz);
}

/* ---------- dust puff on build ---------- */
const puffs=[];
function spawnPuff(pos,dir){
  const up=dir.clone().normalize();
  const t1=new THREE.Vector3().crossVectors(up,Math.abs(up.y)<0.9?UP:new THREE.Vector3(1,0,0)).normalize();
  const t2=new THREE.Vector3().crossVectors(up,t1).normalize();
  const n=18,geo=new THREE.BufferGeometry(),arr=[],vel=[];
  for(let i=0;i<n;i++){
    arr.push(pos.x,pos.y,pos.z);
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*3;
    const dv=t1.clone().multiplyScalar(Math.cos(a)*sp)
      .addScaledVector(t2,Math.sin(a)*sp)
      .addScaledVector(up,1.5+Math.random()*2);
    vel.push(dv.x,dv.y,dv.z);
  }
  geo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:0xd98a4a,size:0.6,transparent:true,opacity:0.9,depthWrite:false}));
  scene.add(pts);puffs.push({pts,vel,up,life:1});
}

/* ============================================================= *
 *  ECONOMY                                                      *
 * ============================================================= */
function dayFactor(){ // 1 at noon, ~0 at night, smooth
  return Math.max(0, Math.sin(G.todFrac*Math.PI*2 - Math.PI/2));
}
function computeRates(){
  const r={power:0,oxygen:0,water:0,food:0,materials:0,science:0,credits:0};
  let powerCap=100, storeBonus=0, popCap=0;
  let tfRate={temp:0,oxygen:0,pressure:0};
  const df=dayFactor();
  const storm=dustStormActive?1:0;
  const effMult=G.techDone.efficiency?0.75:1;
  const droneMult=G.techDone.drones?1.3:1;

  // potential production vs consumption — but production gated by power availability later
  let prodPower=0, usePower=0;
  for(const o of G.buildings){
    const b=BUILDINGS[o.key];
    if(b.powerCap)powerCap+=b.powerCap;
    if(b.storage)storeBonus+=b.storage;
    if(b.pop)popCap+=b.pop;
    if(b.power){
      if(b.power.day!==undefined)prodPower+=b.power.day*df*(storm?0.25:1);
      if(b.power.flat!==undefined)prodPower+=b.power.flat*(storm?1.3:1);
    }
  }
  // gather power demand
  for(const o of G.buildings){
    const b=BUILDINGS[o.key];
    if(b.use&&b.use.power)usePower+=b.use.power;
  }
  // habitat life support scales with pop housed (approx: full when occupied)
  // we treat habitat consumption at full rate; efficiency tech reduces
  const powerOK = (prodPower + Math.min(G.res.power,9999)) >= usePower; // have we got juice this tick?
  r.power = prodPower - usePower;

  // production of goods only runs if there's net power available (brownout reduces output)
  const powerRatio = usePower>0 ? THREE.MathUtils.clamp((prodPower+ (G.res.power>0?G.res.power*0.0:0))/usePower,0,1) : 1;
  const opMult = (prodPower>=usePower)?1:Math.max(0.15,powerRatio);

  for(const o of G.buildings){
    const b=BUILDINGS[o.key];
    if(b.prod)for(const[k,v]of Object.entries(b.prod)){
      let amt=v*opMult;
      if((o.key==='extractor'||o.key==='mine'))amt*=droneMult;
      r[k]+=amt;
    }
    if(b.use)for(const[k,v]of Object.entries(b.use)){
      if(k==='power')continue;
      let amt=v;
      if(b.pop)amt*=effMult; // life-support efficiency
      r[k]-=amt;
    }
    if(b.tf)for(const[k,v]of Object.entries(b.tf))tfRate[k]+=v*opMult;
  }

  // population consumption (colonists breathe/eat/drink beyond habitat base)
  r.oxygen-=G.pop*0.4;
  r.water-=G.pop*0.3;
  r.food-=G.pop*0.5;

  G.rates=r;G.powerCap=powerCap;G.popCap=popCap;
  G.storeBonus=storeBonus;G.tfRate=tfRate;G.opMult=opMult;G.prodPower=prodPower;G.usePower=usePower;
  return r;
}

function caps(){
  const b=G.storeBonus||0;
  return {
    power:G.powerCap||100,
    oxygen:STORAGE_BASE.oxygen+b, water:STORAGE_BASE.water+b,
    food:STORAGE_BASE.food+b, materials:STORAGE_BASE.materials+b,
    science:Infinity, credits:Infinity,
  };
}

function tickEconomy(dtSol){
  computeRates();
  const c=caps();
  for(const k of Object.keys(G.res)){
    G.res[k]+=G.rates[k]*dtSol;
    G.res[k]=Math.min(G.res[k],c[k]);
    if(k!=='power')G.res[k]=Math.max(0,G.res[k]); // power can show deficit handled below
  }
  // power is a flow with battery storage; clamp 0..cap
  G.res.power=THREE.MathUtils.clamp(G.res.power,0,c.power);

  // terraforming
  for(const k of Object.keys(G.tf)){
    G.tf[k]=THREE.MathUtils.clamp(G.tf[k]+(G.tfRate[k]||0)*dtSol,0,100);
  }

  // population dynamics
  const lifeOK = G.res.oxygen>0 && G.res.water>0 && G.res.food>0;
  if(lifeOK && G.pop<G.popCap){
    G.pop+=0.6*dtSol; // immigration/growth
  }else if(!lifeOK){
    G.pop-=1.2*dtSol; // people die/leave
    if(Math.random()<0.4*dtSol)toast("Colonists are suffering — fix life support!",'bad');
  }
  G.pop=Math.max(0,Math.min(G.pop,G.popCap));

  // lose condition: had people, now gone
  if(G.pop<0.5 && G.popCap>0 && !G.over){ gameOver(false); }

  // win condition
  if(G.tf.temp>=100&&G.tf.oxygen>=100&&G.tf.pressure>=100&&!G.over){ gameOver(true); }

  maybeEvent(dtSol);
}

/* ============================================================= *
 *  EVENTS                                                       *
 * ============================================================= */
let eventCooldown=6;
function maybeEvent(dtSol){
  eventCooldown-=dtSol;
  if(eventCooldown>0)return;
  eventCooldown=8+Math.random()*8;
  const roll=Math.random();
  if(roll<0.4){startDustStorm();}
  else if(roll<0.6){ // meteor — damages a random building
    if(G.buildings.length>2){
      const o=G.buildings[(Math.random()*G.buildings.length)|0];
      const dir=gridToDir(o.gx,o.gz);spawnPuff(dir.clone().multiplyScalar(R+heightAt(dir)+1),dir);
      const b=BUILDINGS[o.key];
      scene.remove(o.mesh);G.buildings.splice(G.buildings.indexOf(o),1);tileOccupied[idx(o.gx,o.gz)]=false;
      toast(`☄️ Meteor strike destroyed a ${b.name}!`,'bad');
      beep(120,0.25);
    }
  }
  else if(roll<0.75){ // supply drop
    const m=80+Math.floor(Math.random()*80);G.res.materials+=m;
    toast(`🚀 Supply drop from Earth: +${m} materials`,'good');
  }
  else if(roll<0.88){ // solar flare boosts science
    G.res.science+=40;toast("☀️ Solar flare — sensors gathered +40 Science",'good');
  }
  // else quiet sol
}
function startDustStorm(){
  if(dustStormActive)return;
  dustStormActive=true;dustStormT=0;
  toast("🌪️ Dust storm incoming — solar power will drop!",'warn');
}

function refreshDock(){
  let html='';
  for(const key of BUILD_ORDER){
    const b=BUILDINGS[key];

    const aff=canAfford(b.cost);
    const cls=['bcard'];
    if(G.selected===key)cls.push('sel');
    if(locked)cls.push('locked');else if(!aff)cls.push('unaff');

    html+=`<div class="${cls.join(' ')}" data-key="${key}">

  if(b.prod)rows+=fmtSet(b.prod,'+');

/* ============================================================= *
 *  AUDIO (tiny WebAudio blips)                                  *
 * ============================================================= */
let actx;
function beep(freq=440,dur=0.1){
  try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.frequency.value=freq;o.type='triangle';
    g.gain.setValueAtTime(0.06,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
    o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
  }catch{}
}

function save(){
  const data={res:G.res,pop:G.pop,tf:G.tf,sol:G.sol,todFrac:G.todFrac,techDone:G.techDone,
    buildings:G.buildings.map(o=>({key:o.key,gx:o.gx,gz:o.gz}))};
  localStorage.setItem(SAVE_KEY,JSON.stringify(data));
  toast('💾 Colony saved','good');
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVE_KEY));
    if(!d)return false;
    Object.assign(G.res,d.res);G.pop=d.pop;Object.assign(G.tf,d.tf);
    G.sol=d.sol;G.todFrac=d.todFrac;G.techDone=d.techDone||{};
    for(const b of d.buildings){
      if(!inGrid(b.gx,b.gz))continue;
      const dir=gridToDir(b.gx,b.gz);
      const mesh=makeBuildingMesh(b.key);
      mesh.position.copy(dir.clone().multiplyScalar(R+heightAt(dir)));
      orientToNormal(mesh,dir);scene.add(mesh);
      G.buildings.push({key:b.key,gx:b.gx,gz:b.gz,mesh,t:0,anim:1});
      tileOccupied[idx(b.gx,b.gz)]=true;
    }
    return true;
  }catch{return false;}
}

/* ============================================================= *
 *  MAIN LOOP                                                    *
 * ============================================================= */
let solAccum=0, saveAccum=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const speed=G.paused?0:G.speed;
  const dtGame=dt*speed;

  // time of day & sol
  if(dtGame>0){
    G.todFrac+=dtGame/SOL_SECONDS;
    while(G.todFrac>=1){G.todFrac-=1;G.sol++;toast(`☀️ Sol ${G.sol} begins`,'');}
    // economy in sol units
    tickEconomy(dtGame/SOL_SECONDS);
    solAccum+=dt;
    saveAccum+=dt;
    if(saveAccum>20){saveAccum=0;save();}
  }

  // sun orbits the planet, lighting one hemisphere; the terminator sweeps as the Sol advances
  const ang=G.todFrac*Math.PI*2 - Math.PI/2;
  sun.position.set(Math.cos(ang)*R*4, R*1.0, Math.sin(ang)*R*4);
  const dl=dayFactor(); // local-colony daylight, drives solar economy & window lights
  sun.intensity=2.4*(dustStormActive?0.5:1);
  ambient.intensity=0.18;
  hemi.intensity=0.4;
  sunMesh.material.color.setHSL(0.07,0.7,0.7);

  // moons orbit the planet
  const t=performance.now()*0.001;
  phobos.position.set(Math.cos(t*0.18)*R*2.4, Math.sin(t*0.18)*R*0.5, Math.sin(t*0.18)*R*2.4);
  deimos.position.set(Math.cos(-t*0.1+2)*R*3.0, R*0.9, Math.sin(-t*0.1+2)*R*2.7);
  phobos.rotation.y=t*0.3;deimos.rotation.y=-t*0.2;

  // dust storm visuals — a swirling shell + brightened atmosphere
  if(dustStormActive){
    dustStormT+=dt;
    const intensity=Math.min(1,dustStormT/3)*(dustStormT>14?Math.max(0,1-(dustStormT-14)/4):1);
    dustParticles[0].material.opacity=intensity*0.5;
    dustParticles[0].rotation.y+=dt*0.3;
    if(G.atm)G.atm.material.opacity=0.12+intensity*0.28;
    if(dustStormT>18){dustStormActive=false;dustParticles[0].material.opacity=0;if(G.atm)G.atm.material.opacity=0.12;toast('🌤️ The dust storm has passed','good');}
  }

  // building animations: rise-up + spinners + glow pulse
  for(const o of G.buildings){
    if(o.anim<1){o.anim=Math.min(1,o.anim+dt*2.2);const e=1-Math.pow(1-o.anim,3);o.mesh.scale.y=e;}
    const ud=o.mesh.userData;
    if(ud.spin){const sp=(dustStormActive&&o.key==='wind')?6:1.6;ud.spin.rotation[ud.spin.userData?.axis==='y'?'y':'z']+=dt*sp;}
    if(ud.arm){ud.arm.rotation.x=-0.6+Math.sin(t*2+o.gx)*0.25;}
    if(ud.glow){const i=0.4+Math.sin(t*3+o.gz)*0.25;if(ud.glow.material.emissive)ud.glow.material.emissiveIntensity=i;}
    if(ud.win){ud.win.material.emissiveIntensity=(G.todFrac>0.72||G.todFrac<0.22)?0.7:0.15;}
  }

  // build puffs
  for(let i=puffs.length-1;i>=0;i--){
    const pf=puffs[i];pf.life-=dt*1.3;
    const p=pf.pts.geometry.attributes.position;
    for(let j=0;j<p.count;j++){
      p.setXYZ(j,p.getX(j)+pf.vel[j*3]*dt,p.getY(j)+pf.vel[j*3+1]*dt,p.getZ(j)+pf.vel[j*3+2]*dt);
      // gravity pulls toward planet centre (along -up)
      pf.vel[j*3]-=pf.up.x*dt*4;pf.vel[j*3+1]-=pf.up.y*dt*4;pf.vel[j*3+2]-=pf.up.z*dt*4;
    }
    p.needsUpdate=true;pf.pts.material.opacity=Math.max(0,pf.life);
    if(pf.life<=0){scene.remove(pf.pts);puffs.splice(i,1);}
  }

  // cursor raycast (only when placing/demolishing)
  updateCursor();

  starField.rotation.y=t*0.005;

  renderer.render(scene,camera);
}

function updateCursor(){
  if(!G.selected&&!G.demolish){cursor.visible=false;hoveredTile=null;return;}
  raycaster.setFromCamera(pointer,camera);
  const hit=raycaster.intersectObject(terrain)[0];
  if(!hit){cursor.visible=false;hoveredTile=null;return;}
  const {gx,gz}=dirToGrid(hit.point);
  if(!inGrid(gx,gz)){cursor.visible=false;hoveredTile=null;return;}
  hoveredTile={gx,gz};
  const cdir=gridToDir(gx,gz);
  cursor.position.copy(cdir.clone().multiplyScalar(R+heightAt(cdir)+0.15));
  orientToNormal(cursor,cdir);cursor.visible=true;
  let ok;
  if(G.demolish)ok=tileOccupied[idx(gx,gz)];
  else ok=!tileOccupied[idx(gx,gz)] && tileSlope(gx,gz)<=2.6 && canAfford(BUILDINGS[G.selected].cost);
  const col=G.demolish?(ok?0xff6b6b:0x888888):(ok?0x7fe08a:0xff6b6b);
  cursor.userData.ring.material.color.setHex(col);
  cursor.userData.box.material.color.setHex(col);
}

/* ============================================================= *
 *  BOOT                                                         *
 * ============================================================= */
function bindTools(){
  $('#tInfo').onclick=()=>openSide('info');
  $('#tTech').onclick=()=>openSide('tech');
  $('#tHelp').onclick=()=>openSide('help');
  $('#tSave').onclick=save;
  $('#tDemo').onclick=()=>{G.demolish=!G.demolish;if(G.demolish)G.selected=null;refreshDock();updateTools();showHint(G.demolish?'Demolish mode: click a building to remove it (40% refund).':'');};
}

function boot(){
  // fake-load progress for polish, then init
  let pct=0;const lbar=$('#lbar');
  const iv=setInterval(()=>{pct=Math.min(100,pct+12+Math.random()*18);lbar.style.width=pct+'%';
    if(pct>=100){clearInterval(iv);start();}},90);
}
function start(){
  initScene();
  buildResBar();bindTools();
  const loaded=load();
  if(!loaded){
    // starter kit
    G.res={power:60,oxygen:120,water:120,food:120,materials:260,science:0,credits:200};
    // pre-place a couple of buildings so the colony isn't empty
    placeBuilding('solar',12,13);placeBuilding('habitat',13,13);
    G.res.materials=260;G.pop=3;
    toast('Welcome, Commander. Build power & life support to grow.','good');
  }
  // point the camera at the colony (first building) so it's framed on load
  const aim=G.buildings[0]?gridToDir(G.buildings[0].gx,G.buildings[0].gz):gridToDir(0,13);
  cam.phi=Math.acos(THREE.MathUtils.clamp(aim.y,-1,1));
  cam.theta=Math.atan2(aim.z,aim.x);
  updateCamera();
  refreshDock();computeRates();updateResBar();
  setTimeout(()=>{const l=$('#loader');l.style.opacity=0;setTimeout(()=>l.remove(),600);
    $('#hud').style.display='flex';$('#leftcol').style.display='flex';},250);
  // periodic UI refresh (cheaper than every frame)
  setInterval(()=>{if(!G.over){updateResBar();if(sidePanel==='info')renderInfo();
    dock.querySelectorAll('.bcard').forEach(el=>{const b=BUILDINGS[el.dataset.key];const locked=b.tech&&!G.techDone[b.tech];el.classList.toggle('unaff',!locked&&!canAfford(b.cost));el.classList.toggle('locked',locked);});}},400);
  animate();
  if(!loaded)setTimeout(()=>showHint('Pick a building below, then click a tile on the planet. Drag to spin the globe. Press ❔ for help.'),900);
}

boot();
</script>
