<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Invaders: Neon Siege</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #020810;
      --panel: rgba(6, 14, 28, 0.92);
      --neon-cyan: #00f0ff;
      --neon-pink: #ff2d7b;
      --neon-gold: #ffd000;
      --neon-green: #39ff14;
      --neon-purple: #b44dff;
      --ink: #e0f4ff;
      --muted: #5a7d9a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    .back-link {
      position: fixed; top: 14px; left: 14px;
      text-decoration: none; color: #071120;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
      border-radius: 9px; padding: 8px 11px;
      font-weight: 700; font-family: 'Rajdhani', sans-serif;
      border: 1px solid rgba(0, 240, 255, 0.4);
      z-index: 100;
    }

    /* ───── Starfield background ───── */
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ───── Canvas shell ───── */
    .shell {
      position: relative; z-index: 1;
      border: 1px solid rgba(0, 240, 255, 0.18);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(4, 12, 24, 0.95), var(--panel));
      box-shadow:
        0 0 40px rgba(0, 240, 255, 0.06),
        0 16px 38px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(0, 240, 255, 0.05);
      padding: 10px;
      margin-top: 10px;
    }

    canvas#game {
      display: block;
      border-radius: 8px;
      background: #010509;
      image-rendering: pixelated;
    }

    /* ───── HUD bar ───── */
    .hud {
      position: relative; z-index: 1;
      width: min(96vw, 820px);
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px;
      font-family: 'Orbitron', monospace;
      font-size: 0.82rem;
      color: var(--neon-cyan);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
    }
    .hud span { letter-spacing: 0.08em; }
    .hud .score-val { color: var(--neon-gold); text-shadow: 0 0 10px rgba(255, 208, 0, 0.5); }
    .hud .lives-val { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 45, 123, 0.5); }
    .hud .level-val { color: var(--neon-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }

    /* ───── Overlay screens ───── */
    .overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, rgba(2, 8, 16, 0.92), rgba(2, 8, 16, 0.98));
      backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .overlay.active { opacity: 1; pointer-events: all; }

    .overlay h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold));
      background-clip: text; -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      margin-bottom: 8px;
      animation: glitch 3s infinite;
    }

    .overlay .sub {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 28px;
      text-align: center;
      max-width: 420px;
    }

    .play-btn {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem; font-weight: 700;
      padding: 14px 42px;
      border: 2px solid var(--neon-cyan);
      border-radius: 12px;
      background: transparent;
      color: var(--neon-cyan);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: all 0.2s ease;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 0 20px rgba(0, 240, 255, 0.05);
    }
    .play-btn:hover {
      background: rgba(0, 240, 255, 0.1);
      box-shadow: 0 0 40px rgba(0, 240, 255, 0.3), inset 0 0 40px rgba(0, 240, 255, 0.1);
      transform: scale(1.05);
    }

    /* ───── Game-over name input ───── */
    .go-panel {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      margin-top: 18px;
    }
    .go-panel label {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      color: var(--neon-cyan);
      letter-spacing: 0.1em;
    }
    .go-panel input {
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem;
      text-align: center;
      padding: 10px 18px;
      border: 2px solid var(--neon-pink);
      border-radius: 10px;
      background: rgba(255, 45, 123, 0.06);
      color: var(--neon-gold);
      outline: none;
      width: 240px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-shadow: 0 0 8px rgba(255, 208, 0, 0.4);
    }
    .go-panel input::placeholder {
      color: var(--muted); text-shadow: none; opacity: 0.6;
    }
    .go-panel input:focus {
      border-color: var(--neon-gold);
      box-shadow: 0 0 20px rgba(255, 208, 0, 0.2);
    }

    .final-score-big {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 900;
      color: var(--neon-gold);
      text-shadow: 0 0 30px rgba(255, 208, 0, 0.4), 0 0 60px rgba(255, 208, 0, 0.15);
    }

    /* ───── Scoreboard ───── */
    .scoreboard {
      margin-top: 20px;
      width: min(380px, 90vw);
    }
    .scoreboard h3 {
      font-family: 'Orbitron', monospace;
      font-size: 0.82rem;
      color: var(--neon-purple);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      text-align: center;
      text-shadow: 0 0 10px rgba(180, 77, 255, 0.4);
    }
    .score-list {
      list-style: none;
      font-family: 'Orbitron', monospace;
      font-size: 0.78rem;
    }
    .score-list li {
      display: flex; justify-content: space-between;
      padding: 7px 14px;
      border: 1px solid rgba(180, 77, 255, 0.12);
      border-radius: 8px;
      margin-bottom: 4px;
      background: rgba(180, 77, 255, 0.04);
      color: var(--ink);
      letter-spacing: 0.06em;
    }
    .score-list li:first-child {
      border-color: rgba(255, 208, 0, 0.3);
      background: rgba(255, 208, 0, 0.06);
      color: var(--neon-gold);
    }
    .score-list .rank { color: var(--muted); width: 28px; }
    .score-list .name { flex: 1; text-align: left; margin-left: 6px; }
    .score-list .pts { color: var(--neon-cyan); }
    .score-list .lvl { color: var(--neon-green); width: 50px; text-align: right; }

    /* ───── Level banner ───── */
    .level-banner {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      z-index: 60;
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 900;
      color: var(--neon-green);
      text-shadow: 0 0 40px rgba(57, 255, 20, 0.5), 0 0 80px rgba(57, 255, 20, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }
    .level-banner.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ───── Keyframes ───── */
    @keyframes glitch {
      0%, 93%, 100% { filter: none; }
      94% { filter: hue-rotate(90deg) saturate(2); transform: translateX(-2px); }
      95% { filter: hue-rotate(-90deg); transform: translateX(2px); }
      96% { filter: none; transform: translateX(0); }
    }

    /* ───── Controls hint ───── */
    .controls-hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 14px;
      text-align: center;
      line-height: 1.6;
    }
    .controls-hint kbd {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid rgba(0, 240, 255, 0.25);
      border-radius: 5px;
      background: rgba(0, 240, 255, 0.06);
      color: var(--neon-cyan);
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
    }
  </style>
</head>
<body>
  <a class="back-link" href="../index.html">← Arcade Hub</a>
  <canvas id="starfield"></canvas>

  <!-- Start screen -->
  <div class="overlay active" id="startScreen">
    <h1>NEON SIEGE</h1>
    <p class="sub">A modern Space Invaders experience. Defend Earth against wave after wave of alien assault.</p>
    <button class="play-btn" id="startBtn">LAUNCH GAME</button>
    <div class="controls-hint" style="margin-top:22px;">
      <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd> to move &nbsp;·&nbsp; <kbd>SPACE</kbd> to fire
    </div>
    <div class="scoreboard" id="startScoreboard"></div>
  </div>

  <!-- Game Over screen -->
  <div class="overlay" id="gameOverScreen">
    <h1>GAME OVER</h1>
    <div class="final-score-big" id="finalScore">0</div>
    <div class="go-panel">
      <label for="nameInput">ENTER YOUR CALLSIGN</label>
      <input type="text" id="nameInput" maxlength="12" placeholder="PILOT" autofocus />
      <button class="play-btn" id="submitBtn">SAVE &amp; RETRY</button>
    </div>
    <div class="scoreboard" id="goScoreboard"></div>
  </div>

  <!-- Level banner -->
  <div class="level-banner" id="levelBanner"></div>

  <!-- HUD -->
  <div class="hud">
    <span>SCORE <span class="score-val" id="hudScore">0</span></span>
    <span>LEVEL <span class="level-val" id="hudLevel">1</span></span>
    <span>LIVES <span class="lives-val" id="hudLives">3</span></span>
  </div>

  <!-- Game canvas -->
  <div class="shell">
    <canvas id="game" width="800" height="600"></canvas>
  </div>

  <script>
  (() => {
    "use strict";

    // ══════════════════════════════════════════
    //  STARFIELD BACKGROUND
    // ══════════════════════════════════════════
    const sfCanvas = document.getElementById("starfield");
    const sfCtx = sfCanvas.getContext("2d");
    const stars = [];
    function resizeSF() {
      sfCanvas.width = window.innerWidth;
      sfCanvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeSF);
    resizeSF();
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * sfCanvas.width,
        y: Math.random() * sfCanvas.height,
        r: Math.random() * 1.5 + 0.3,
        speed: Math.random() * 0.4 + 0.1,
        flicker: Math.random() * Math.PI * 2
      });
    }
    function drawStarfield(t) {
      sfCtx.clearRect(0, 0, sfCanvas.width, sfCanvas.height);
      for (const s of stars) {
        s.y += s.speed;
        if (s.y > sfCanvas.height) { s.y = 0; s.x = Math.random() * sfCanvas.width; }
        const alpha = 0.4 + 0.3 * Math.sin(t * 0.002 + s.flicker);
        sfCtx.beginPath();
        sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        sfCtx.fillStyle = `rgba(200,230,255,${alpha})`;
        sfCtx.fill();
      }
      requestAnimationFrame(drawStarfield);
    }
    requestAnimationFrame(drawStarfield);

    // ══════════════════════════════════════════
    //  AUDIO ENGINE (Web Audio synth SFX)
    // ══════════════════════════════════════════
    let audioCtx;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }

    function sfxShoot() {
      const ctx = getAudio(); const t = ctx.currentTime;
      const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(220, t + 0.12);
      g.gain.setValueAtTime(0.13, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.13);
    }

    function sfxExplosion() {
      const ctx = getAudio(); const t = ctx.currentTime;
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.25, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      const src = ctx.createBufferSource(); const g = ctx.createGain();
      const f = ctx.createBiquadFilter();
      src.buffer = buf; f.type = "lowpass"; f.frequency.setValueAtTime(3000, t);
      f.frequency.exponentialRampToValueAtTime(200, t + 0.25);
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      src.connect(f); f.connect(g); g.connect(ctx.destination);
      src.start(t); src.stop(t + 0.26);
    }

    function sfxPowerup() {
      const ctx = getAudio(); const t = ctx.currentTime;
      const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.exponentialRampToValueAtTime(1200, t + 0.2);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.31);
    }

    function sfxHit() {
      const ctx = getAudio(); const t = ctx.currentTime;
      const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.3);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.31);
    }

    function sfxLevelUp() {
      const ctx = getAudio(); const t = ctx.currentTime;
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, t + i * 0.1);
        g.gain.setValueAtTime(0.1, t + i * 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.25);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 0.26);
      });
    }

    // ══════════════════════════════════════════
    //  SCOREBOARD (localStorage)
    // ══════════════════════════════════════════
    const SCOREBOARD_KEY = "neon_siege_scores_v1";
    function loadScores() {
      try { return JSON.parse(localStorage.getItem(SCOREBOARD_KEY)) || []; }
      catch { return []; }
    }
    function saveScore(name, score, level) {
      const scores = loadScores();
      scores.push({ name: name || "ANON", score, level, date: Date.now() });
      scores.sort((a, b) => b.score - a.score);
      if (scores.length > 10) scores.length = 10;
      localStorage.setItem(SCOREBOARD_KEY, JSON.stringify(scores));
    }
    function renderScoreboard(containerId) {
      const el = document.getElementById(containerId);
      const scores = loadScores();
      if (!scores.length) { el.innerHTML = ""; return; }
      let html = `<h3>⚡ TOP PILOTS ⚡</h3><ul class="score-list">`;
      scores.forEach((s, i) => {
        html += `<li>
          <span class="rank">#${i + 1}</span>
          <span class="name">${escHtml(s.name)}</span>
          <span class="pts">${s.score.toLocaleString()}</span>
          <span class="lvl">LV${s.level}</span>
        </li>`;
      });
      html += "</ul>";
      el.innerHTML = html;
    }
    function escHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // ══════════════════════════════════════════
    //  GAME ENGINE
    // ══════════════════════════════════════════
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    // DOM refs
    const hudScore = document.getElementById("hudScore");
    const hudLevel = document.getElementById("hudLevel");
    const hudLives = document.getElementById("hudLives");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const finalScoreEl = document.getElementById("finalScore");
    const nameInput = document.getElementById("nameInput");
    const levelBanner = document.getElementById("levelBanner");

    // Game state
    let state = "menu"; // menu | playing | gameover | leveltransition
    let score = 0;
    let lives = 3;
    let level = 1;
    let comboMultiplier = 1;
    let comboTimer = 0;
    let shakeTimer = 0;
    let shakeIntensity = 0;

    // Player
    const player = { x: W / 2, y: H - 50, w: 44, h: 28, speed: 5, shootCooldown: 0 };
    let playerBullets = [];
    let enemyBullets = [];
    let enemies = [];
    let particles = [];
    let powerups = [];
    let barriers = [];

    // Enemy fleet movement
    let fleetDir = 1;
    let fleetDropTimer = 0;
    let fleetSpeed = 0.6;
    let enemyShootTimer = 0;

    // Input
    const keys = {};
    window.addEventListener("keydown", e => {
      keys[e.code] = true;
      if (e.code === "Space") e.preventDefault();
    });
    window.addEventListener("keyup", e => { keys[e.code] = false; });

    // ──── Particle system ────
    function spawnParticles(x, y, color, count, spread, life) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * spread + 0.5;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: life || 30 + Math.random() * 20,
          maxLife: life || 30 + Math.random() * 20,
          color,
          size: Math.random() * 3 + 1
        });
      }
    }

    function spawnExplosion(x, y, big) {
      const colors = ["#00f0ff", "#ff2d7b", "#ffd000", "#ff8844", "#ffffff"];
      const count = big ? 40 : 18;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * (big ? 5 : 3) + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 20 + Math.random() * 30,
          maxLife: 20 + Math.random() * 30,
          color: colors[Math.floor(Math.random() * colors.length)],
          size: Math.random() * (big ? 4 : 2.5) + 1
        });
      }
    }

    // ──── Barriers ────
    function createBarriers() {
      barriers = [];
      const count = 4;
      const spacing = W / (count + 1);
      for (let i = 0; i < count; i++) {
        const bx = spacing * (i + 1);
        const by = H - 120;
        // Each barrier is a grid of small blocks
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 6; c++) {
            // Arch shape: skip top corners
            if (r === 0 && (c === 0 || c === 5)) continue;
            // Hole in bottom-middle
            if (r === 3 && (c === 2 || c === 3)) continue;
            barriers.push({
              x: bx - 18 + c * 7,
              y: by + r * 7,
              w: 6, h: 6,
              hp: 3
            });
          }
        }
      }
    }

    // ──── Enemy types ────
    const ENEMY_TYPES = [
      { name: "grunt",   w: 30, h: 22, hp: 1, points: 10,  color: "#39ff14", shootChance: 0.001 },
      { name: "scout",   w: 28, h: 20, hp: 1, points: 20,  color: "#00f0ff", shootChance: 0.002 },
      { name: "elite",   w: 32, h: 24, hp: 2, points: 40,  color: "#ff2d7b", shootChance: 0.003 },
      { name: "captain", w: 36, h: 26, hp: 3, points: 80,  color: "#ffd000", shootChance: 0.004 },
      { name: "boss",    w: 48, h: 34, hp: 6, points: 200, color: "#b44dff", shootChance: 0.006 }
    ];

    function spawnEnemies() {
      enemies = [];
      const rows = Math.min(3 + Math.floor(level / 2), 6);
      const cols = Math.min(6 + Math.floor(level / 3), 11);
      const gapX = 56;
      const gapY = 44;
      const startX = (W - (cols - 1) * gapX) / 2;
      const startY = 50;

      for (let r = 0; r < rows; r++) {
        let typeIdx;
        if (r === 0 && level >= 5) typeIdx = 4; // boss row
        else if (r === 0) typeIdx = Math.min(3, Math.floor(level / 2));
        else if (r <= 1) typeIdx = Math.min(2, Math.floor(level / 3));
        else typeIdx = r <= 2 ? 1 : 0;

        const type = ENEMY_TYPES[typeIdx];
        for (let c = 0; c < cols; c++) {
          enemies.push({
            x: startX + c * gapX,
            y: startY + r * gapY,
            w: type.w, h: type.h,
            hp: type.hp + Math.floor(level / 4),
            maxHp: type.hp + Math.floor(level / 4),
            points: type.points * (1 + Math.floor(level / 3)),
            color: type.color,
            shootChance: type.shootChance * (1 + level * 0.15),
            type: type.name,
            flash: 0,
            wobble: Math.random() * Math.PI * 2
          });
        }
      }

      fleetDir = 1;
      fleetSpeed = 0.6 + level * 0.15;
      enemyShootTimer = 0;
    }

    // ──── Powerup system ────
    const POWERUP_TYPES = ["rapid", "triple", "shield", "bomb"];
    function spawnPowerup(x, y) {
      if (Math.random() > 0.12) return; // 12% chance
      const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
      const colors = { rapid: "#ffd000", triple: "#00f0ff", shield: "#39ff14", bomb: "#ff2d7b" };
      powerups.push({ x, y, type, color: colors[type], vy: 1.5, life: 300, size: 12 });
    }

    let activeBuffs = { rapid: 0, triple: 0, shield: 0 };

    function applyPowerup(type) {
      sfxPowerup();
      if (type === "rapid") activeBuffs.rapid = 300;
      else if (type === "triple") activeBuffs.triple = 300;
      else if (type === "shield") { activeBuffs.shield = 400; }
      else if (type === "bomb") {
        // Destroy all enemies on screen with a big flash
        enemies.forEach(e => {
          score += e.points;
          spawnExplosion(e.x, e.y, true);
        });
        enemies = [];
        shakeTimer = 15; shakeIntensity = 8;
        sfxExplosion();
      }
    }

    // ──── Level transition ────
    function startLevel(lvl) {
      level = lvl;
      hudLevel.textContent = lvl;
      spawnEnemies();
      createBarriers();
      playerBullets = [];
      enemyBullets = [];
      powerups = [];
      activeBuffs = { rapid: 0, triple: 0, shield: 0 };
      player.x = W / 2;

      levelBanner.textContent = lvl === 1 ? "WAVE 1 — INCOMING" : `WAVE ${lvl} — INCOMING`;
      levelBanner.classList.add("show");
      sfxLevelUp();
      state = "leveltransition";
      setTimeout(() => {
        levelBanner.classList.remove("show");
        state = "playing";
      }, 1800);
    }

    // ──── Start / restart ────
    function startGame() {
      score = 0; lives = 3; comboMultiplier = 1; comboTimer = 0;
      particles = [];
      hudScore.textContent = "0";
      hudLives.textContent = "3";
      startScreen.classList.remove("active");
      gameOverScreen.classList.remove("active");
      startLevel(1);
    }

    function gameOver() {
      state = "gameover";
      finalScoreEl.textContent = score.toLocaleString();
      renderScoreboard("goScoreboard");
      nameInput.value = "";
      setTimeout(() => {
        gameOverScreen.classList.add("active");
        nameInput.focus();
      }, 600);
    }

    // ──── Event listeners ────
    document.getElementById("startBtn").addEventListener("click", () => { getAudio(); startGame(); });
    document.getElementById("submitBtn").addEventListener("click", () => {
      const name = nameInput.value.trim() || "ANON";
      saveScore(name, score, level);
      renderScoreboard("goScoreboard");
      renderScoreboard("startScoreboard");
      startGame();
    });
    nameInput.addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("submitBtn").click();
    });

    // Initial scoreboard render
    renderScoreboard("startScoreboard");

    // ══════════════════════════════════════════
    //  UPDATE LOOP
    // ══════════════════════════════════════════
    function update() {
      if (state !== "playing") return;

      // ── Player movement ──
      if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= player.speed;
      if (keys["ArrowRight"] || keys["KeyD"]) player.x += player.speed;
      player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));

      // ── Player shooting ──
      if (player.shootCooldown > 0) player.shootCooldown--;
      const shootDelay = activeBuffs.rapid > 0 ? 6 : 14;
      if (keys["Space"] && player.shootCooldown <= 0) {
        sfxShoot();
        player.shootCooldown = shootDelay;
        if (activeBuffs.triple > 0) {
          playerBullets.push({ x: player.x, y: player.y - 16, vx: -2, vy: -8, w: 3, h: 12 });
          playerBullets.push({ x: player.x, y: player.y - 16, vx: 0, vy: -8, w: 3, h: 12 });
          playerBullets.push({ x: player.x, y: player.y - 16, vx: 2, vy: -8, w: 3, h: 12 });
        } else {
          playerBullets.push({ x: player.x, y: player.y - 16, vx: 0, vy: -8, w: 3, h: 12 });
        }
      }

      // ── Buff timers ──
      if (activeBuffs.rapid > 0) activeBuffs.rapid--;
      if (activeBuffs.triple > 0) activeBuffs.triple--;
      if (activeBuffs.shield > 0) activeBuffs.shield--;

      // ── Combo timer ──
      if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) comboMultiplier = 1;
      }

      // ── Move player bullets ──
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < -20 || b.x < -20 || b.x > W + 20) { playerBullets.splice(i, 1); continue; }

        // Hit enemies
        let hit = false;
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (Math.abs(b.x - e.x) < (b.w + e.w) / 2 && Math.abs(b.y - e.y) < (b.h + e.h) / 2) {
            e.hp--;
            e.flash = 6;
            hit = true;
            if (e.hp <= 0) {
              const pts = Math.round(e.points * comboMultiplier);
              score += pts;
              comboMultiplier = Math.min(comboMultiplier + 0.2, 5);
              comboTimer = 90;
              spawnExplosion(e.x, e.y, e.type === "boss");
              sfxExplosion();
              spawnPowerup(e.x, e.y);
              enemies.splice(j, 1);
              shakeTimer = 4; shakeIntensity = 3;
            } else {
              spawnParticles(b.x, b.y, e.color, 6, 2, 15);
            }
            break;
          }
        }

        // Hit barriers
        if (!hit) {
          for (let j = barriers.length - 1; j >= 0; j--) {
            const br = barriers[j];
            if (b.x > br.x && b.x < br.x + br.w && b.y > br.y && b.y < br.y + br.h) {
              br.hp--;
              if (br.hp <= 0) {
                spawnParticles(br.x + 3, br.y + 3, "#39ff14", 4, 1, 10);
                barriers.splice(j, 1);
              }
              hit = true; break;
            }
          }
        }

        if (hit) playerBullets.splice(i, 1);
      }

      // ── Enemy fleet movement ──
      let edgeHit = false;
      for (const e of enemies) {
        e.x += fleetDir * fleetSpeed;
        e.wobble += 0.04;
        if (e.x - e.w / 2 < 10 || e.x + e.w / 2 > W - 10) edgeHit = true;
      }
      if (edgeHit) {
        fleetDir *= -1;
        for (const e of enemies) e.y += 12 + level;
      }

      // Check if enemies reached player
      for (const e of enemies) {
        if (e.y + e.h / 2 > player.y - 20) { gameOver(); return; }
      }

      // ── Enemy shooting ──
      enemyShootTimer++;
      if (enemyShootTimer > 10) {
        enemyShootTimer = 0;
        for (const e of enemies) {
          if (Math.random() < e.shootChance) {
            const speed = 3 + level * 0.25;
            enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vy: speed, w: 4, h: 10, color: e.color });
          }
        }
      }

      // ── Move enemy bullets ──
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.y += b.vy;
        if (b.y > H + 20) { enemyBullets.splice(i, 1); continue; }

        // Hit player
        if (Math.abs(b.x - player.x) < (b.w + player.w) / 2 &&
            Math.abs(b.y - player.y) < (b.h + player.h) / 2) {
          enemyBullets.splice(i, 1);
          if (activeBuffs.shield > 0) {
            activeBuffs.shield = 0;
            spawnParticles(player.x, player.y, "#39ff14", 20, 3, 20);
            continue;
          }
          lives--;
          hudLives.textContent = lives;
          shakeTimer = 12; shakeIntensity = 6;
          sfxHit();
          spawnExplosion(player.x, player.y, false);
          if (lives <= 0) { gameOver(); return; }
          continue;
        }

        // Hit barriers
        for (let j = barriers.length - 1; j >= 0; j--) {
          const br = barriers[j];
          if (b.x > br.x && b.x < br.x + br.w && b.y > br.y && b.y < br.y + br.h) {
            br.hp--;
            if (br.hp <= 0) {
              spawnParticles(br.x + 3, br.y + 3, "#ff2d7b", 4, 1, 10);
              barriers.splice(j, 1);
            }
            enemyBullets.splice(i, 1);
            break;
          }
        }
      }

      // ── Powerups ──
      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.vy;
        p.life--;
        if (p.life <= 0 || p.y > H + 20) { powerups.splice(i, 1); continue; }
        if (Math.abs(p.x - player.x) < (p.size + player.w) / 2 &&
            Math.abs(p.y - player.y) < (p.size + player.h) / 2) {
          applyPowerup(p.type);
          powerups.splice(i, 1);
        }
      }

      // ── Particles ──
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.97; p.vy *= 0.97;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // ── Screen shake ──
      if (shakeTimer > 0) shakeTimer--;

      // ── Update HUD ──
      hudScore.textContent = score.toLocaleString();

      // ── Level complete check ──
      if (enemies.length === 0 && state === "playing") {
        startLevel(level + 1);
      }
    }

    // ══════════════════════════════════════════
    //  DRAW
    // ══════════════════════════════════════════
    function drawPlayer() {
      const px = player.x;
      const py = player.y;
      ctx.save();

      // Shield glow
      if (activeBuffs.shield > 0) {
        const alpha = 0.15 + 0.1 * Math.sin(Date.now() * 0.01);
        ctx.beginPath();
        ctx.arc(px, py, 30, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(57,255,20,${alpha})`;
        ctx.fill();
        ctx.strokeStyle = `rgba(57,255,20,0.5)`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // Engine glow
      const engineFlicker = 6 + Math.random() * 4;
      ctx.beginPath();
      ctx.moveTo(px - 8, py + 14);
      ctx.lineTo(px, py + 14 + engineFlicker);
      ctx.lineTo(px + 8, py + 14);
      ctx.fillStyle = "rgba(0,240,255,0.6)";
      ctx.fill();

      // Ship body
      ctx.beginPath();
      ctx.moveTo(px, py - 16);
      ctx.lineTo(px + 20, py + 12);
      ctx.lineTo(px + 14, py + 14);
      ctx.lineTo(px + 6, py + 10);
      ctx.lineTo(px - 6, py + 10);
      ctx.lineTo(px - 14, py + 14);
      ctx.lineTo(px - 20, py + 12);
      ctx.closePath();

      const shipGrad = ctx.createLinearGradient(px, py - 16, px, py + 14);
      shipGrad.addColorStop(0, "#00f0ff");
      shipGrad.addColorStop(0.5, "#0088aa");
      shipGrad.addColorStop(1, "#004466");
      ctx.fillStyle = shipGrad;
      ctx.fill();

      // Cockpit
      ctx.beginPath();
      ctx.arc(px, py - 4, 4, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();

      ctx.restore();
    }

    function drawEnemy(e) {
      ctx.save();
      const wobbleY = Math.sin(e.wobble) * 2;
      const cx = e.x;
      const cy = e.y + wobbleY;

      // Flash on hit
      if (e.flash > 0) {
        e.flash--;
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 20;
      }

      // Body shape varies by type
      if (e.type === "boss") {
        // Boss: big hexagonal shape
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI / 3) * i - Math.PI / 6;
          const r = e.w / 2;
          ctx[i === 0 ? "moveTo" : "lineTo"](cx + Math.cos(a) * r, cy + Math.sin(a) * r);
        }
        ctx.closePath();
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, e.w / 2);
        g.addColorStop(0, "#e090ff");
        g.addColorStop(1, e.color);
        ctx.fillStyle = g;
        ctx.fill();
        // Eye
        ctx.beginPath();
        ctx.arc(cx, cy, 6, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, 3, 0, Math.PI * 2);
        ctx.fillStyle = "#ff0044";
        ctx.fill();
      } else if (e.type === "elite" || e.type === "captain") {
        // Diamond-ish
        ctx.beginPath();
        ctx.moveTo(cx, cy - e.h / 2);
        ctx.lineTo(cx + e.w / 2, cy);
        ctx.lineTo(cx + e.w / 3, cy + e.h / 2);
        ctx.lineTo(cx - e.w / 3, cy + e.h / 2);
        ctx.lineTo(cx - e.w / 2, cy);
        ctx.closePath();
        ctx.fillStyle = e.color;
        ctx.fill();
        // Eyes
        ctx.fillStyle = "#fff";
        ctx.fillRect(cx - 6, cy - 3, 4, 4);
        ctx.fillRect(cx + 2, cy - 3, 4, 4);
      } else {
        // Grunt/scout: rounded rect alien
        const hw = e.w / 2;
        const hh = e.h / 2;
        ctx.beginPath();
        ctx.moveTo(cx - hw, cy - hh + 4);
        ctx.quadraticCurveTo(cx - hw, cy - hh, cx - hw + 4, cy - hh);
        ctx.lineTo(cx + hw - 4, cy - hh);
        ctx.quadraticCurveTo(cx + hw, cy - hh, cx + hw, cy - hh + 4);
        ctx.lineTo(cx + hw, cy + hh - 2);
        // Tentacle effect
        ctx.lineTo(cx + hw - 4, cy + hh);
        ctx.lineTo(cx + hw - 8, cy + hh - 4);
        ctx.lineTo(cx + 4, cy + hh);
        ctx.lineTo(cx, cy + hh - 4);
        ctx.lineTo(cx - 4, cy + hh);
        ctx.lineTo(cx - hw + 8, cy + hh - 4);
        ctx.lineTo(cx - hw + 4, cy + hh);
        ctx.lineTo(cx - hw, cy + hh - 2);
        ctx.closePath();
        ctx.fillStyle = e.color;
        ctx.fill();
        // Eyes
        ctx.fillStyle = "#fff";
        ctx.fillRect(cx - 7, cy - 4, 5, 5);
        ctx.fillRect(cx + 2, cy - 4, 5, 5);
        ctx.fillStyle = "#111";
        ctx.fillRect(cx - 5, cy - 2, 2, 2);
        ctx.fillRect(cx + 4, cy - 2, 2, 2);
      }

      // HP bar for multi-hp enemies
      if (e.maxHp > 1) {
        const barW = e.w * 0.8;
        const barH = 3;
        const bx = cx - barW / 2;
        const by = cy - e.h / 2 - 6;
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fillRect(bx, by, barW, barH);
        ctx.fillStyle = e.hp / e.maxHp > 0.5 ? "#39ff14" : "#ff2d7b";
        ctx.fillRect(bx, by, barW * (e.hp / e.maxHp), barH);
      }

      ctx.restore();
    }

    function drawBullet(b, isEnemy) {
      ctx.save();
      if (isEnemy) {
        ctx.fillStyle = b.color || "#ff2d7b";
        ctx.shadowColor = b.color || "#ff2d7b";
      } else {
        ctx.fillStyle = "#00f0ff";
        ctx.shadowColor = "#00f0ff";
      }
      ctx.shadowBlur = 10;
      ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
      ctx.restore();
    }

    function drawBarrier(br) {
      const alpha = br.hp / 3;
      ctx.fillStyle = `rgba(57,255,20,${0.3 + alpha * 0.5})`;
      ctx.fillRect(br.x, br.y, br.w, br.h);
    }

    function drawPowerup(p) {
      ctx.save();
      const pulse = 1 + 0.15 * Math.sin(Date.now() * 0.008);
      ctx.translate(p.x, p.y);
      ctx.scale(pulse, pulse);
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 15;
      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(0, -p.size);
      ctx.lineTo(p.size, 0);
      ctx.lineTo(0, p.size);
      ctx.lineTo(-p.size, 0);
      ctx.closePath();
      ctx.fillStyle = p.color;
      ctx.fill();
      // Icon text
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#000";
      ctx.font = "bold 9px Orbitron, monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const icons = { rapid: "R", triple: "T", shield: "S", bomb: "B" };
      ctx.fillText(icons[p.type], 0, 1);
      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawComboIndicator() {
      if (comboMultiplier > 1 && comboTimer > 0) {
        ctx.save();
        ctx.font = "bold 16px Orbitron, monospace";
        ctx.textAlign = "right";
        ctx.fillStyle = `rgba(255,208,0,${comboTimer / 90})`;
        ctx.shadowColor = "#ffd000";
        ctx.shadowBlur = 10;
        ctx.fillText(`x${comboMultiplier.toFixed(1)} COMBO`, W - 16, 24);
        ctx.restore();
      }
    }

    function drawBuffIndicators() {
      ctx.save();
      ctx.font = "bold 10px Orbitron, monospace";
      ctx.textAlign = "left";
      let bx = 10;
      const by = 20;
      if (activeBuffs.rapid > 0) {
        ctx.fillStyle = "#ffd000";
        ctx.fillText("⚡ RAPID", bx, by);
        bx += 80;
      }
      if (activeBuffs.triple > 0) {
        ctx.fillStyle = "#00f0ff";
        ctx.fillText("◆ TRIPLE", bx, by);
        bx += 80;
      }
      if (activeBuffs.shield > 0) {
        ctx.fillStyle = "#39ff14";
        ctx.fillText("● SHIELD", bx, by);
      }
      ctx.restore();
    }

    // ──── Scanline effect ────
    function drawScanlines() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.04)";
      for (let y = 0; y < H; y += 3) {
        ctx.fillRect(0, y, W, 1);
      }
      ctx.restore();
    }

    // ──── Vignette ────
    function drawVignette() {
      const g = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.7);
      g.addColorStop(0, "rgba(0,0,0,0)");
      g.addColorStop(1, "rgba(0,0,0,0.4)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    // ══════════════════════════════════════════
    //  MAIN DRAW
    // ══════════════════════════════════════════
    function draw() {
      ctx.save();

      // Screen shake
      if (shakeTimer > 0) {
        const sx = (Math.random() - 0.5) * shakeIntensity;
        const sy = (Math.random() - 0.5) * shakeIntensity;
        ctx.translate(sx, sy);
      }

      // Clear
      ctx.fillStyle = "#010509";
      ctx.fillRect(-10, -10, W + 20, H + 20);

      // Subtle grid background
      ctx.strokeStyle = "rgba(0,240,255,0.03)";
      ctx.lineWidth = 0.5;
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      if (state === "playing" || state === "leveltransition") {
        // Barriers
        for (const br of barriers) drawBarrier(br);

        // Enemies
        for (const e of enemies) drawEnemy(e);

        // Player bullets
        for (const b of playerBullets) drawBullet(b, false);

        // Enemy bullets
        for (const b of enemyBullets) drawBullet(b, true);

        // Powerups
        for (const p of powerups) drawPowerup(p);

        // Particles
        drawParticles();

        // Player
        drawPlayer();

        // UI overlays
        drawComboIndicator();
        drawBuffIndicators();
      }

      // Post-processing
      drawScanlines();
      drawVignette();

      ctx.restore();
    }

    // ══════════════════════════════════════════
    //  GAME LOOP
    // ══════════════════════════════════════════
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

  })();
  </script>
  <script src="../shared/arcade-bgm.js"></script>
</body>
